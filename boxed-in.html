<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOXED IN — Powered by Unboxed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600&display=swap');

        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Exo 2', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* --- UI OVERLAY --- */
        #ui-layer {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            z-index: 10;
        }
        
        h1 { 
            margin: 0; 
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 6vw, 3.5rem); 
            letter-spacing: 4px;
            background: linear-gradient(180deg, #fff 0%, #a0d0ff 40%, #ff00de 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(255, 0, 222, 0.6));
            text-transform: uppercase;
        }

        #score { 
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 3vw, 1.5rem); 
            margin-top: 4px; 
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700; 
        }

        #combo-display {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            margin-top: 5px;
            color: #ff6b6b;
            min-height: 1.5rem;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: bold;
            text-shadow: 0 0 15px #ff0066;
        }
        #combo-display.active { transform: scale(1.15); }

        .controls {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: clamp(0.65rem, 1.8vw, 0.85rem);
            pointer-events: none;
            padding: 0 10px;
        }
        @media (max-width: 600px) { .controls { display: none; } }

        /* --- MENU BUTTON --- */
        #menu-button {
            position: absolute;
            top: 15px;
            right: 12px;
            width: 48px;
            height: 48px;
            background: rgba(10, 10, 25, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            padding: 12px;
            transition: all 0.2s ease;
            z-index: 20;
        }
        #menu-button:hover {
            background: rgba(30, 30, 60, 0.9);
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        #menu-button span {
            display: block;
            width: 22px;
            height: 2px;
            background: #00d4ff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        #menu-button.open span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        #menu-button.open span:nth-child(2) {
            opacity: 0;
        }
        #menu-button.open span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* --- SETTINGS OVERLAY --- */
        #settings-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 15;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #settings-overlay.visible { opacity: 1; pointer-events: auto; }

        #settings-panel {
            width: min(90vw, 360px);
            background: linear-gradient(135deg, #0d0d1a 0%, #080812 100%);
            border: 1px solid #00d4ff;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2), inset 0 0 30px rgba(0,0,0,0.5);
            padding: 0;
            overflow: hidden;
        }

        #settings-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
        }
        #settings-header h2 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff;
            letter-spacing: 2px;
        }

        #settings-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(80vh - 60px);
            overflow-y: auto;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .settings-row:last-child { border-bottom: none; }

        .settings-label {
            font-family: 'Exo 2', sans-serif;
            font-size: 0.9rem;
            color: #aaa;
            flex-shrink: 0;
        }

        .settings-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 155px;
            justify-content: flex-end;
        }

        .settings-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 12px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            width: 100%;
            text-align: center;
        }
        
        .settings-controls .settings-button {
            flex: 1;
        }
        .settings-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }
        .settings-button:active { transform: scale(0.97); }

        /* Button accent colors */
        .settings-button[data-setting="symbols"] { border-color: #00d4ff; color: #00d4ff; }
        .settings-button[data-setting="swap"] { border-color: #ff6b6b; color: #ff6b6b; }
        .settings-button[data-setting="swap"].moore-mode { border-color: #ff9f00; color: #ff9f00; }
        .settings-button[data-setting="swap"].free-mode { border-color: #00ff88; color: #00ff88; }
        .settings-button[data-setting="sound"] { border-color: #ff66cc; color: #ff66cc; }
        .settings-button[data-setting="sound"].muted { border-color: #555; color: #555; }
        .settings-button[data-setting="match"] { border-color: #88dd00; color: #88dd00; }
        .settings-button[data-setting="match"].match-4 { border-color: #ffaa00; color: #ffaa00; }
        .settings-button[data-setting="match"].match-5 { border-color: #ff4444; color: #ff4444; }
        .settings-button[data-setting="colors"] { border-color: #00ddff; color: #00ddff; }
        .settings-button[data-setting="flair"] { border-color: #ff66ff; color: #ff66ff; }
        .settings-button[data-setting="flair"].disabled { border-color: #555; color: #555; }

        #settings-goals-btn {
            margin-top: 10px;
            width: 100%;
            background: rgba(153, 102, 255, 0.1);
            border: 1px solid #9966ff;
            color: #bb99ff;
            padding: 14px;
            font-size: 1rem;
        }
        #settings-goals-btn:hover {
            background: rgba(153, 102, 255, 0.2);
            box-shadow: 0 0 15px rgba(153, 102, 255, 0.3);
        }

        #settings-colors-btn {
            background: rgba(0, 221, 255, 0.15);
            border: 1px solid #00aacc;
            color: #00ddff;
            padding: 10px 8px;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
            flex-shrink: 0;
            width: 40px;
        }
        #settings-colors-btn:hover {
            background: rgba(0, 221, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 221, 255, 0.3);
        }

        /* --- FLOATING BONUS TEXT --- */
        #bonus-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 15;
        }
        .bonus-message {
            position: absolute;
            left: 50%;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #ffd700;
            text-shadow: 0 0 15px #ffd700, 0 0 30px #ff00de;
            white-space: nowrap;
            animation: floatUp 1.5s ease-out forwards;
            opacity: 0;
        }
        .bonus-message.combo { color: #ff3366; text-shadow: 0 0 15px #ff0066, 0 0 30px #ff0000; }
        .bonus-message.combo-total { color: #00ffff; text-shadow: 0 0 20px #00ffff, 0 0 40px #0088ff; font-size: 2.2rem; }
        .bonus-message.line-clear { color: #00ff88; text-shadow: 0 0 15px #00ff88, 0 0 30px #00ffcc; }
        .bonus-message.boxed-in { color: #ff00ff; text-shadow: 0 0 15px #ff00ff, 0 0 30px #cc00ff; }
        .bonus-message.smart-move { color: #ffdd00; text-shadow: 0 0 15px #ffaa00, 0 0 30px #ff8800; }

        @keyframes floatUp {
            0% { opacity: 0; top: 55%; transform: translateX(-50%) scale(0.5); }
            12% { opacity: 1; transform: translateX(-50%) scale(1.15); }
            25% { transform: translateX(-50%) scale(1); }
            100% { opacity: 0; top: 20%; transform: translateX(-50%) scale(0.85); }
        }

        /* --- GOALS PANEL --- */
        #goals-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #goals-overlay.visible { opacity: 1; pointer-events: auto; }
        
        #goals-panel {
            width: min(90vw, 420px);
            max-height: 80vh;
            background: linear-gradient(135deg, #0d0d1a 0%, #080812 100%);
            border: 1px solid #9966ff;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(153, 102, 255, 0.25), inset 0 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        #goals-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(153, 102, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #goals-header h2 { 
            margin: 0; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.2rem;
            color: #bb99ff; 
            text-shadow: 0 0 10px #6644ff;
            letter-spacing: 2px;
        }
        #goals-close {
            background: none; border: none; color: #666; 
            font-size: 1.4rem; cursor: pointer; padding: 0;
            transition: color 0.2s;
        }
        #goals-close:hover { color: #ff6666; }

        #goals-sort {
            padding: 10px 20px;
            border-bottom: 1px solid rgba(153, 102, 255, 0.15);
            display: flex;
            gap: 8px;
        }
        .sort-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: #777;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
            font-family: 'Exo 2', sans-serif;
        }
        .sort-btn:hover { background: rgba(153, 102, 255, 0.15); border-color: #9966ff; }
        .sort-btn.active { background: rgba(153, 102, 255, 0.25); border-color: #9966ff; color: #bb99ff; }

        #goals-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
        }
        .goal-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .goal-item:last-child { border-bottom: none; }
        .goal-icon { font-size: 1.4rem; width: 36px; text-align: center; }
        .goal-info { flex: 1; }
        .goal-name { font-weight: bold; color: #fff; font-size: 0.9rem; }
        .goal-name.undiscovered { color: #555; font-style: italic; }
        .goal-detail { color: #666; font-size: 0.7rem; margin-top: 2px; }
        .goal-count { 
            font-family: 'Orbitron', sans-serif; 
            color: #00ff88; 
            font-size: 1rem;
            min-width: 40px;
            text-align: right;
        }
        .goal-count.zero { color: #333; }

        #goals-stats {
            padding: 12px 20px;
            border-top: 1px solid rgba(153, 102, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 0.75rem;
        }
        .stat-item { color: #777; }
        .stat-item span { color: #00d4ff; }

        #goals-footer {
            padding: 12px 20px;
            border-top: 1px solid rgba(153, 102, 255, 0.15);
            text-align: center;
        }
        #reset-btn {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid #993333;
            color: #cc6666;
            padding: 8px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
        }
        #reset-btn:hover { background: rgba(255, 50, 50, 0.25); border-color: #ff4444; }

        /* Reset Confirmation */
        #reset-confirm {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        #reset-confirm.visible { display: flex; pointer-events: auto; }
        #reset-dialog {
            background: #0d0d1a;
            border: 2px solid #ff4444;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            max-width: 300px;
        }
        #reset-dialog h3 { color: #ff6666; margin: 0 0 12px 0; font-family: 'Orbitron', sans-serif; }
        #reset-dialog p { color: #999; margin: 0 0 20px 0; font-size: 0.85rem; line-height: 1.5; }
        #reset-dialog .btn-group { display: flex; gap: 12px; justify-content: center; }
        #reset-cancel, #reset-confirm-btn {
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.85rem;
        }
        #reset-cancel { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #aaa; }
        #reset-cancel:hover { background: rgba(255,255,255,0.2); }
        #reset-confirm-btn { background: rgba(255,50,50,0.2); border: 1px solid #ff4444; color: #ff6666; }
        #reset-confirm-btn:hover { background: rgba(255,50,50,0.4); }

        /* --- TOAST --- */
        #goal-toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: rgba(15, 15, 30, 0.95);
            border: 1px solid #9966ff;
            box-shadow: 0 0 25px rgba(153, 102, 255, 0.4);
            padding: 12px 22px;
            border-radius: 30px;
            display: flex; align-items: center; gap: 10px;
            color: #fff;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 50;
        }
        #goal-toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
        #goal-toast .toast-icon { font-size: 1.4rem; }
        #goal-toast .toast-text { font-size: 0.85rem; }

        /* --- COLOR CUSTOMIZATION PANEL --- */
        #colors-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #colors-overlay.visible { opacity: 1; pointer-events: auto; }
        
        #colors-panel {
            width: min(90vw, 380px);
            max-height: 85vh;
            background: linear-gradient(135deg, #0d0d1a 0%, #080812 100%);
            border: 1px solid #00ddff;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 221, 255, 0.25), inset 0 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        #colors-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0, 221, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #colors-header h2 { 
            margin: 0; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.1rem;
            color: #00ddff; 
            text-shadow: 0 0 10px #0088aa;
            letter-spacing: 2px;
        }
        #colors-close {
            background: none; border: none; color: #666; 
            font-size: 1.4rem; cursor: pointer; padding: 0;
            transition: color 0.2s;
        }
        #colors-close:hover { color: #ff6666; }

        #colors-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
        }
        .color-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .color-item:last-child { border-bottom: none; }
        
        .color-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            width: 30px;
            text-align: center;
            font-weight: bold;
        }
        .color-picker-wrapper {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }
        .color-picker-wrapper:hover {
            border-color: #00ddff;
            box-shadow: 0 0 10px rgba(0, 221, 255, 0.3);
        }
        .color-picker {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 64px;
            height: 64px;
            border: none;
            cursor: pointer;
        }
        .color-hex {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: #888;
            flex: 1;
            text-transform: uppercase;
        }
        .color-name {
            font-size: 0.75rem;
            color: #555;
            width: 60px;
            text-align: right;
        }

        #colors-footer {
            padding: 15px 20px;
            border-top: 1px solid rgba(0, 221, 255, 0.15);
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        #colors-reset {
            background: rgba(255, 150, 50, 0.1);
            border: 1px solid #cc8833;
            color: #ffaa55;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
        }
        #colors-reset:hover { background: rgba(255, 150, 50, 0.25); border-color: #ffaa55; }
        #colors-apply {
            background: rgba(0, 221, 255, 0.1);
            border: 1px solid #00aacc;
            color: #00ddff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.2s;
        }
        #colors-apply:hover { background: rgba(0, 221, 255, 0.25); border-color: #00ddff; }
        #goal-toast .toast-text strong { color: #bb99ff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui-layer">
    <h1>BOXED IN</h1>
    <div id="score">Score: 0</div>
    <div id="combo-display"></div>
</div>

<!-- Menu Button -->
<button id="menu-button">
    <span></span>
    <span></span>
    <span></span>
</button>

<!-- Settings Overlay -->
<div id="settings-overlay">
    <div id="settings-panel">
        <div id="settings-header">
            <h2>SETTINGS</h2>
        </div>
        <div id="settings-content">
            <div class="settings-row">
                <span class="settings-label">Display</span>
                <div class="settings-controls">
                    <button class="settings-button" data-setting="symbols" id="toggle-symbols">Numbers</button>
                </div>
            </div>
            <div class="settings-row">
                <span class="settings-label">Swap Mode</span>
                <div class="settings-controls">
                    <button class="settings-button" data-setting="swap" id="toggle-swap-mode">4-Neighbor</button>
                </div>
            </div>
            <div class="settings-row">
                <span class="settings-label">Match Size</span>
                <div class="settings-controls">
                    <button class="settings-button" data-setting="match" id="toggle-match-mode">Match 3+</button>
                </div>
            </div>
            <div class="settings-row">
                <span class="settings-label">Colors</span>
                <div class="settings-controls">
                    <button class="settings-button" data-setting="colors" id="toggle-colors">6 Colors</button>
                    <button id="settings-colors-btn">...</button>
                </div>
            </div>
            <div class="settings-row">
                <span class="settings-label">Sound</span>
                <div class="settings-controls">
                    <button class="settings-button" data-setting="sound" id="toggle-sound">🔊 On</button>
                </div>
            </div>
            <div class="settings-row">
                <span class="settings-label">Effects</span>
                <div class="settings-controls">
                    <button class="settings-button disabled" data-setting="flair" id="toggle-flair">Off</button>
                </div>
            </div>
            <button class="settings-button" id="settings-goals-btn">📖 Collection</button>
        </div>
    </div>
</div>

<div id="bonus-container"></div>

<!-- Goals Panel -->

// ============================================
// SOUND ENGINE (Bank Pattern)
// ============================================
// Primitives: playTone, playSweep, playChord
// Games register named sounds via .register()
// and trigger them via .play()
// ============================================
class SoundEngine {
    constructor() {
        this.audioContext = null;
        this.masterGain = null;
        this.enabled = true;
        this._bank = {};
        this._initAudio();
    }
    
    _initAudio() {
        try {
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            this.masterGain = this.audioContext.createGain();
            this.masterGain.gain.value = 0.25;
            this.masterGain.connect(this.audioContext.destination);
        } catch (e) {
            console.warn('Web Audio API not supported');
            this.enabled = false;
        }
    }
    
    resume() {
        if (this.audioContext?.state === 'suspended') this.audioContext.resume();
    }
    
    setEnabled(v) { this.enabled = v; }
    isEnabled() { return this.enabled; }
    
    // --- Primitives (engine-level, always available) ---
    
    playTone(freq, dur, wave = 'square', vol = 0.1) {
        if (!this.enabled || !this.audioContext) return;
        if (this.audioContext.state === 'suspended') return;
        
        const osc = this.audioContext.createOscillator();
        const gain = this.audioContext.createGain();
        const now = this.audioContext.currentTime;
        
        osc.type = wave;
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(vol, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(now + dur);
    }
    
    playSweep(startFreq, endFreq, dur, wave = 'sawtooth', vol = 0.12) {
        if (!this.enabled || !this.audioContext) return;
        if (this.audioContext.state === 'suspended') return;
        
        const osc = this.audioContext.createOscillator();
        const gain = this.audioContext.createGain();
        const now = this.audioContext.currentTime;
        
        osc.type = wave;
        osc.frequency.setValueAtTime(startFreq, now);
        osc.frequency.exponentialRampToValueAtTime(endFreq, now + dur);
        gain.gain.setValueAtTime(vol, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(now + dur);
    }
    
    playChord(freqs, dur, wave = 'square', vol = 0.06) {
        freqs.forEach((f, i) => setTimeout(() => this.playTone(f, dur, wave, vol), i * 50));
    }
    
    // --- Sound Bank (game-level, registered at init) ---
    
    register(name, fn) {
        this._bank[name] = fn;
    }
    
    registerAll(soundDefs) {
        for (const [name, fn] of Object.entries(soundDefs)) {
            this._bank[name] = fn;
        }
    }
    
    play(name, ...args) {
        const fn = this._bank[name];
        if (fn) fn(this, ...args);
        else console.warn(`SoundEngine: unknown sound "${name}"`);
    }
}

const soundEngine = new SoundEngine();

// ============================================
// STORAGE ADAPTER
// ============================================
// Abstract interface for persistence.
// Swap LocalStorageAdapter for a cloud adapter
// later without changing any game/engine code.
// ============================================
class StorageAdapter {
    getItem(key) { throw new Error('StorageAdapter.getItem not implemented'); }
    setItem(key, value) { throw new Error('StorageAdapter.setItem not implemented'); }
    removeItem(key) { throw new Error('StorageAdapter.removeItem not implemented'); }
    keys() { throw new Error('StorageAdapter.keys not implemented'); }
}

class LocalStorageAdapter extends StorageAdapter {
    getItem(key) {
        try { return localStorage.getItem(key); }
        catch (e) { console.warn('Storage read failed:', e); return null; }
    }
    setItem(key, value) {
        try { localStorage.setItem(key, value); }
        catch (e) { console.warn('Storage write failed:', e); }
    }
    removeItem(key) {
        try { localStorage.removeItem(key); }
        catch (e) { console.warn('Storage remove failed:', e); }
    }
    keys() {
        try {
            const result = [];
            for (let i = 0; i < localStorage.length; i++) result.push(localStorage.key(i));
            return result;
        } catch (e) { console.warn('Storage keys failed:', e); return []; }
    }
}

// Global storage instance — swap this one line for cloud persistence
const storage = new LocalStorageAdapter();

// ============================================
// SETTINGS MANAGER
// ============================================
// Generic key-value settings with defaults merge.
// Games pass their own storageKey and defaults.
// ============================================
class SettingsManager {
    constructor(storageKey, defaults) {
        this.storageKey = storageKey;
        this._defaults = defaults;
        this.data = this._load();
    }
    
    _load() {
        try {
            const saved = storage.getItem(this.storageKey);
            if (saved) return { ...this._defaults, ...JSON.parse(saved) };
        } catch (e) { console.warn('Failed to load settings:', e); }
        return { ...this._defaults };
    }
    
    _save() {
        try { storage.setItem(this.storageKey, JSON.stringify(this.data)); }
        catch (e) { console.warn('Failed to save settings:', e); }
    }
    
    get(key) { return this.data[key]; }
    
    set(key, value) {
        this.data[key] = value;
        this._save();
    }
    
    reset() {
        this.data = { ...this._defaults };
        this._save();
    }
}

// ============================================
// UI MANAGER
// ============================================
// Reusable UI utilities: button setup, overlay
// open/close, toast notifications, floating
// bonus text, and confirm dialogs.
// ============================================
class UIManager {
    constructor() {
        this._toastQueue = [];
        this._isShowingToast = false;
    }

    // --- Button Setup ---
    // Handles both click and touchend, prevents ghost clicks
    setupButton(id, handler) {
        const btn = document.getElementById(id);
        if (!btn) return null;
        btn.addEventListener('click', e => { e.stopPropagation(); handler(e); });
        btn.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); handler(e); });
        return btn;
    }

    // --- Overlay System ---
    // Works with any element that uses the .visible class pattern
    openOverlay(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.display = 'flex';
        el.offsetHeight; // force reflow for transition
        el.classList.add('visible');
    }

    closeOverlay(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.remove('visible');
        setTimeout(() => el.style.display = 'none', 300);
    }

    toggleOverlay(id, opts = {}) {
        const el = document.getElementById(id);
        if (!el) return false;
        const isOpen = el.classList.contains('visible');
        if (isOpen) {
            this.closeOverlay(id);
            if (opts.onClose) opts.onClose();
        } else {
            this.openOverlay(id);
            if (opts.onOpen) opts.onOpen();
        }
        return !isOpen; // returns new state: true = now open
    }

    // Make clicking the overlay backdrop close it
    backdropClose(id, opts = {}) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('click', e => {
            if (e.target === el) {
                this.closeOverlay(id);
                if (opts.onClose) opts.onClose();
            }
        });
    }

    // --- Toast Notifications ---
    toast(icon, message, opts = {}) {
        const {
            elementId = 'goal-toast',
            duration = 2500,
        } = opts;
        this._toastQueue.push({ icon, message, elementId, duration });
        if (!this._isShowingToast) this._showNextToast();
    }

    _showNextToast() {
        if (!this._toastQueue.length) { this._isShowingToast = false; return; }
        this._isShowingToast = true;
        const { icon, message, elementId, duration } = this._toastQueue.shift();
        const el = document.getElementById(elementId);
        if (!el) { this._isShowingToast = false; return; }

        const iconEl = el.querySelector('.toast-icon');
        const textEl = el.querySelector('.toast-text');
        if (iconEl) iconEl.textContent = icon;
        if (textEl) textEl.innerHTML = message;
        el.classList.add('visible');

        setTimeout(() => {
            el.classList.remove('visible');
            setTimeout(() => this._showNextToast(), 300);
        }, duration);
    }

    // --- Floating Bonus Text ---
    floatingText(text, cssClass = '', opts = {}) {
        const {
            containerId = 'bonus-container',
            duration = 1500,
        } = opts;
        const container = document.getElementById(containerId);
        if (!container) return;
        const el = document.createElement('div');
        el.className = `bonus-message ${cssClass}`;
        el.textContent = text;
        container.appendChild(el);
        setTimeout(() => el.remove(), duration);
    }

    // --- Confirm Dialog ---
    // Shows a confirmation overlay. Returns a Promise.
    confirm(overlayId, confirmBtnId, cancelBtnId) {
        return new Promise((resolve) => {
            this.openOverlay(overlayId);
            const onConfirm = () => {
                cleanup();
                this.closeOverlay(overlayId);
                resolve(true);
            };
            const onCancel = () => {
                cleanup();
                this.closeOverlay(overlayId);
                resolve(false);
            };
            const confirmBtn = document.getElementById(confirmBtnId);
            const cancelBtn = document.getElementById(cancelBtnId);
            const cleanup = () => {
                if (confirmBtn) confirmBtn.removeEventListener('click', onConfirm);
                if (cancelBtn) cancelBtn.removeEventListener('click', onCancel);
            };
            if (confirmBtn) confirmBtn.addEventListener('click', onConfirm);
            if (cancelBtn) cancelBtn.addEventListener('click', onCancel);
        });
    }
}

const ui = new UIManager();

// ============================================
// INPUT MANAGER
// ============================================
// Unified click/touch handling with tap-vs-drag
// detection. Resumes audio context on first
// interaction. Games register an onTap callback.
// ============================================
class InputManager {
    constructor(rendererDomElement, opts = {}) {
        this.domElement = rendererDomElement;
        this.tapThreshold = opts.tapThreshold || 15; // max px movement to count as tap
        this.ghostClickDelay = opts.ghostClickDelay || 500; // ms to suppress ghost clicks
        this.excludeSelectors = opts.excludeSelectors || []; // overlay selectors to ignore touches on

        this._tapCallbacks = [];
        this._hoverCallbacks = [];
        this._lastTouchTime = 0;
        this._touchStartPos = null;
        this.hasUserInteracted = false;

        this._bindEvents();
    }

    onTap(fn) { this._tapCallbacks.push(fn); }
    onHover(fn) { this._hoverCallbacks.push(fn); }

    _fireHover(clientX, clientY) {
        for (const fn of this._hoverCallbacks) fn(clientX, clientY);
    }

    _fireTap(clientX, clientY) {
        if (!this.hasUserInteracted) {
            this.hasUserInteracted = true;
            soundEngine.resume();
        }
        for (const fn of this._tapCallbacks) fn(clientX, clientY);
    }

    _bindEvents() {
        // Click handler (suppressed after touch to prevent ghost clicks)
        window.addEventListener('click', e => {
            if (Date.now() - this._lastTouchTime < this.ghostClickDelay) return;
            this._fireTap(e.clientX, e.clientY);
        });

        // Touch start
        this.domElement.addEventListener('touchstart', e => {
            // Skip if touching an excluded overlay
            for (const sel of this.excludeSelectors) {
                if (e.target.closest(sel)) return;
            }
            e.preventDefault();
            this._lastTouchTime = Date.now();
            this._touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, { passive: false });

        // Touch end — only fires tap if finger didn't move
        this.domElement.addEventListener('touchend', e => {
            if (!this._touchStartPos) return;
            e.preventDefault();
            this._lastTouchTime = Date.now();
            const t = e.changedTouches[0];
            const dx = t.clientX - this._touchStartPos.x;
            const dy = t.clientY - this._touchStartPos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist <= this.tapThreshold) this._fireTap(t.clientX, t.clientY);
            this._touchStartPos = null;
        }, { passive: false });

        // Hover / pointer move
        window.addEventListener('mousemove', e => {
            this._fireHover(e.clientX, e.clientY);
        });
        this.domElement.addEventListener('touchmove', e => {
            if (e.touches.length > 0) {
                const t = e.touches[0];
                this._fireHover(t.clientX, t.clientY);
            }
        }, { passive: true });
    }
}

// ============================================
// COLOR PALETTE
// ============================================
// Config-driven color management with
// persistence. Games define their palette
// entries at construction time.
// ============================================
class ColorPalette {
    constructor(storageKey, entries) {
        this.storageKey = storageKey;
        this.entries = entries; // [{ key, default, label }, ...]
        this.keys = entries.map(e => e.key);
        this._defaults = {};
        for (const e of entries) this._defaults[e.key] = e.default;
        this.data = this._load();
    }

    _load() {
        try {
            const saved = storage.getItem(this.storageKey);
            if (saved) {
                const parsed = JSON.parse(saved);
                return { colors: { ...this._defaults, ...(parsed.colors || parsed) } };
            }
        } catch (e) { console.warn('ColorPalette load failed:', e); }
        return { colors: { ...this._defaults } };
    }

    save() { storage.setItem(this.storageKey, JSON.stringify(this.data)); }
    reset() { this.data = { colors: { ...this._defaults } }; this.save(); }
    getColor(key) { return this.data.colors[key]; }
    setColor(key, val) { this.data.colors[key] = val; }
    getColorMap() { return { ...this.data.colors }; }
    getLabel(key) { return (this.entries.find(e => e.key === key) || {}).label || key; }

    // Utility converters
    hexToInt(hex) { return parseInt(hex.replace('#', ''), 16); }
    intToHex(int) { return '#' + int.toString(16).padStart(6, '0'); }
}

// ============================================
// ACHIEVEMENT MANAGER
// ============================================
// Generic achievement registry + tracker.
// Games define achievements and stats at
// construction time, then call record() and
// incrementStat() during gameplay.
// ============================================
class AchievementManager {
    constructor(storageKey, achievements, statDefs = {}) {
        this.storageKey = storageKey;
        // achievements: [{ key, name, icon, description }, ...]
        this._defs = {};
        for (const a of achievements) this._defs[a.key] = a;
        this._statDefaults = statDefs; // { statKey: defaultValue, ... }
        this.data = this._load();
    }

    _getDefaultData() {
        const achievements = {};
        for (const key of Object.keys(this._defs)) {
            achievements[key] = { count: 0, firstDate: null };
        }
        return {
            achievements,
            stats: { ...this._statDefaults },
            firstPlayed: new Date().toISOString(),
            lastPlayed: new Date().toISOString()
        };
    }

    _load() {
        try {
            const saved = storage.getItem(this.storageKey);
            if (saved) {
                const data = JSON.parse(saved);
                const defaults = this._getDefaultData();
                // Merge in any new achievements added since last save
                for (const key of Object.keys(defaults.achievements)) {
                    if (!data.achievements) data.achievements = {};
                    if (!data.achievements[key]) data.achievements[key] = defaults.achievements[key];
                }
                // Handle legacy data shape (shapes → achievements)
                if (data.shapes && !data.achievements) {
                    data.achievements = data.shapes;
                    delete data.shapes;
                }
                // Merge stats
                if (!data.stats) data.stats = {};
                for (const key of Object.keys(defaults.stats)) {
                    if (data.stats[key] === undefined) data.stats[key] = defaults.stats[key];
                }
                return data;
            }
        } catch (e) { console.warn('AchievementManager load failed:', e); }
        return this._getDefaultData();
    }

    save() {
        try {
            this.data.lastPlayed = new Date().toISOString();
            storage.setItem(this.storageKey, JSON.stringify(this.data));
        } catch (e) { console.warn('AchievementManager save failed:', e); }
    }

    reset() { this.data = this._getDefaultData(); this.save(); }

    // --- Recording ---

    record(key) {
        const entry = this.data.achievements[key];
        if (!entry) { console.warn(`Achievement "${key}" not registered`); return { wasNew: false }; }
        const wasNew = entry.count === 0;
        entry.count++;
        if (!entry.firstDate) entry.firstDate = new Date().toISOString();
        this.save();
        return { wasNew, count: entry.count };
    }

    incrementStat(key, amount = 1) {
        if (this.data.stats[key] === undefined) this.data.stats[key] = 0;
        this.data.stats[key] += amount;
        this.save();
    }

    maxStat(key, value) {
        if (this.data.stats[key] === undefined) this.data.stats[key] = 0;
        if (value > this.data.stats[key]) { this.data.stats[key] = value; this.save(); }
    }

    // --- Accessors ---

    getCount(key) { return this.data.achievements[key]?.count || 0; }
    getStat(key) { return this.data.stats[key]; }
    getStats() { return { ...this.data.stats }; }

    getDef(key) { return this._defs[key]; }

    getSorted(sortBy = 'count') {
        const list = Object.entries(this.data.achievements).map(([key, data]) => ({
            key, ...this._defs[key], count: data.count, firstDate: data.firstDate
        }));
        if (sortBy === 'count') list.sort((a, b) => b.count - a.count);
        else if (sortBy === 'date') list.sort((a, b) => {
            if (!a.firstDate && !b.firstDate) return 0;
            if (!a.firstDate) return 1;
            if (!b.firstDate) return -1;
            return new Date(b.firstDate) - new Date(a.firstDate);
        });
        else if (sortBy === 'name') list.sort((a, b) => a.name.localeCompare(b.name));
        return list;
    }

    // --- Generic Panel Rendering ---

    renderPanel(listElId, statsElId, opts = {}) {
        const { sortBy = 'count', statLabels = {} } = opts;
        const listEl = document.getElementById(listElId);
        const statsEl = document.getElementById(statsElId);
        if (!listEl) return;

        const goals = this.getSorted(sortBy);
        listEl.innerHTML = goals.map(g => {
            const discovered = g.count > 0;
            const dateStr = g.firstDate ? new Date(g.firstDate).toLocaleDateString() : 'Not yet';
            return `<div class="goal-item">
                <span class="goal-icon">${discovered ? g.icon : '❓'}</span>
                <div class="goal-info">
                    <div class="goal-name ${discovered ? '' : 'undiscovered'}">${discovered ? g.name : '???'}</div>
                    <div class="goal-detail">${discovered ? dateStr : 'Keep matching!'}</div>
                </div>
                <span class="goal-count ${g.count === 0 ? 'zero' : ''}">${g.count}</span>
            </div>`;
        }).join('');

        if (statsEl) {
            const s = this.data.stats;
            statsEl.innerHTML = Object.entries(s).map(([key, val]) => {
                const label = statLabels[key] || key;
                const display = typeof val === 'number' ? val.toLocaleString() : val;
                return `<div class="stat-item">${label}: <span>${display}</span></div>`;
            }).join('');
        }
    }
}

// ============================================
// STATE MANAGER
// ============================================
// Manages game states (menu, playing, paused,
// game over). States are stacked — push/pop
// for overlays (pause), switch for transitions.
// Routes update/render/input to active state.
// ============================================
class GameState {
    // Override these in subclasses
    enter(engine) {}    // called when state becomes active
    exit(engine) {}     // called when state is deactivated
    update(delta) {}    // called each frame
    render(delta) {}    // called each frame after update
    onTap(x, y) {}      // called on input tap
    onHover(x, y) {}    // called on pointer move
    onResize() {}       // called on window resize
}

class StateManager {
    constructor() {
        this._stack = [];
        this._engine = null; // set during wire()
    }

    // Connect to SceneManager and InputManager
    wire(sceneManager, inputManager) {
        this._engine = { sceneManager, inputManager };

        sceneManager.onUpdate((delta) => {
            const state = this.current();
            if (state) state.update(delta);
        });

        sceneManager.onRender((delta) => {
            const state = this.current();
            if (state) state.render(delta);
        });

        sceneManager.onResize(() => {
            const state = this.current();
            if (state) state.onResize();
        });

        inputManager.onTap((x, y) => {
            const state = this.current();
            if (state) state.onTap(x, y);
        });

        inputManager.onHover((x, y) => {
            const state = this.current();
            if (state) state.onHover(x, y);
        });
    }

    current() {
        return this._stack.length > 0 ? this._stack[this._stack.length - 1] : null;
    }

    // Replace entire stack with a single state
    switch(state) {
        // Exit all current states
        while (this._stack.length > 0) {
            this._stack.pop().exit(this._engine);
        }
        this._stack.push(state);
        state.enter(this._engine);
    }

    // Push a state on top (e.g., pause over play)
    push(state) {
        const prev = this.current();
        if (prev && prev.pause) prev.pause(this._engine);
        this._stack.push(state);
        state.enter(this._engine);
    }

    // Pop the top state, return to previous
    pop() {
        if (this._stack.length === 0) return;
        const removed = this._stack.pop();
        removed.exit(this._engine);
        const next = this.current();
        if (next && next.resume) next.resume(this._engine);
        return removed;
    }

    // Check if a specific state type is active
    isActive(StateClass) {
        return this.current() instanceof StateClass;
    }
}

const stateManager = new StateManager();

// ============================================
// UNBOXED ENGINE — PARTICLE POOL
// ============================================
// SoA particle system with object pooling.
// Zero game knowledge — just positions,
// velocities, colors, lifetimes.
// ============================================
class ParticlePool {
    constructor(scene, maxParticles = 800) {
        this.maxParticles = maxParticles;
        this.scene = scene;
        this.activeCount = 0;
        
        // Structure of Arrays (SoA) for better memory locality
        this.positions = new Float32Array(maxParticles * 3);
        this.velocities = new Float32Array(maxParticles * 3);
        this.colors = new Float32Array(maxParticles * 3);
        this.lifes = new Float32Array(maxParticles);
        
        // Active indices tracking
        this.activeIndices = new Int16Array(maxParticles);
        this.activeCount = 0;
        
        // Geometry
        this.geometry = new THREE.BufferGeometry();
        this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
        this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));
        
        // Material
        this.material = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        this.points = new THREE.Points(this.geometry, this.material);
        this.points.frustumCulled = false;
        scene.add(this.points);
        
        this.nextFree = 0;
    }
    
    spawn(pos, colorHex) {
        const color = new THREE.Color(colorHex);
        const idx = this.nextFree;
        this.nextFree = (this.nextFree + 1) % this.maxParticles;
        
        if (this.lifes[idx] <= 0) {
            this.activeIndices[this.activeCount] = idx;
            this.activeCount++;
        }
        
        this.positions[idx * 3] = pos.x;
        this.positions[idx * 3 + 1] = pos.y;
        this.positions[idx * 3 + 2] = pos.z;
        
        this.velocities[idx * 3] = (Math.random() - 0.5) * 0.25;
        this.velocities[idx * 3 + 1] = (Math.random() - 0.5) * 0.25;
        this.velocities[idx * 3 + 2] = (Math.random() - 0.5) * 0.25;
        
        this.colors[idx * 3] = color.r;
        this.colors[idx * 3 + 1] = color.g;
        this.colors[idx * 3 + 2] = color.b;
        
        this.lifes[idx] = 1.0;
    }
    
    explode(pos, colorHex) {
        for (let i = 0; i < 12; i++) this.spawn(pos, colorHex);
    }
    
    update() {
        if (this.activeCount === 0) {
            this.points.visible = false;
            return;
        }
        this.points.visible = true;
        
        let newActiveCount = 0;
        for (let i = 0; i < this.activeCount; i++) {
            const idx = this.activeIndices[i];
            if (this.lifes[idx] > 0) {
                this.positions[idx * 3] += this.velocities[idx * 3];
                this.positions[idx * 3 + 1] += this.velocities[idx * 3 + 1];
                this.positions[idx * 3 + 2] += this.velocities[idx * 3 + 2];
                this.velocities[idx * 3 + 1] -= 0.003;
                this.lifes[idx] -= 0.025;
                this.activeIndices[newActiveCount] = idx;
                newActiveCount++;
            } else {
                this.positions[idx * 3] = 9999;
            }
        }
        
        this.activeCount = newActiveCount;
        this.geometry.attributes.position.needsUpdate = true;
        this.geometry.attributes.color.needsUpdate = true;
    }
}

// ============================================
// UNBOXED ENGINE — CAMERA SOLVER
// ============================================
// Binary-search fitter: given a bounding box,
// finds the camera distance that makes it fill
// the viewport within safe insets.
// ============================================
class CameraSolver {
    static fitToBox(camera, boundsMin, boundsMax, opts = {}) {
        const {
            direction = new THREE.Vector3(1, 1, 1).normalize(),
            screenBorder = 10,
            topPadding = null,  // pixels, or null for auto (12% of height, max 100px)
            minDist = 5,
            maxDist = 50,
            iterations = 20,
            overshoot = 1.01
        } = opts;

        const sw = window.innerWidth, sh = window.innerHeight;
        const target = new THREE.Vector3().addVectors(boundsMin, boundsMax).multiplyScalar(0.5);

        camera.aspect = sw / sh;
        camera.updateProjectionMatrix();

        const safeLeft = screenBorder;
        const safeRight = sw - screenBorder;
        const topPad = topPadding !== null ? topPadding : Math.min(100, sh * 0.12);
        const safeTop = screenBorder + topPad;
        const safeBottom = sh - screenBorder;

        const corners = [];
        for (let xi = 0; xi <= 1; xi++)
            for (let yi = 0; yi <= 1; yi++)
                for (let zi = 0; zi <= 1; zi++)
                    corners.push(new THREE.Vector3(
                        xi ? boundsMax.x : boundsMin.x,
                        yi ? boundsMax.y : boundsMin.y,
                        zi ? boundsMax.z : boundsMin.z
                    ));

        let lo = minDist, hi = maxDist, distance;
        for (let i = 0; i < iterations; i++) {
            distance = (lo + hi) / 2;
            camera.position.copy(direction).multiplyScalar(distance).add(target);
            camera.lookAt(target);
            camera.updateMatrixWorld();
            camera.updateProjectionMatrix();

            let sMinX = Infinity, sMaxX = -Infinity, sMinY = Infinity, sMaxY = -Infinity;
            corners.forEach(c => {
                const p = c.clone().project(camera);
                const sx = (p.x + 1) / 2 * sw, sy = (-p.y + 1) / 2 * sh;
                sMinX = Math.min(sMinX, sx); sMaxX = Math.max(sMaxX, sx);
                sMinY = Math.min(sMinY, sy); sMaxY = Math.max(sMaxY, sy);
            });

            if (sMinX >= safeLeft && sMaxX <= safeRight && sMinY >= safeTop && sMaxY <= safeBottom) hi = distance;
            else lo = distance;
        }

        distance = hi * overshoot;
        camera.position.copy(direction).multiplyScalar(distance).add(target);
        camera.lookAt(target);
        camera.updateMatrixWorld();

        return { distance, target, direction };
    }
}

// ============================================
// UNBOXED ENGINE — SCENE MANAGER
// ============================================
// Wraps THREE.js boilerplate: scene, renderer,
// camera, lighting, starfield, particles, and
// the animation loop with hook system.
// ============================================
class SceneManager {
    constructor(config = {}) {
        const {
            fov = 45,
            near = 0.1,
            far = 200,
            antialias = true,
            shadows = true,
            shadowMapSize = 2048,
            maxPixelRatio = 2,
            lighting = {},
            starfield = true,
            particles = true,
            maxParticles = 800,
        } = config;

        // Core THREE objects
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(fov, window.innerWidth / window.innerHeight, near, far);
        this.camera.position.set(16, 16, 16);
        this.camera.lookAt(0, 0, 0);

        this.renderer = new THREE.WebGLRenderer({ antialias, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxPixelRatio));
        if (shadows) {
            this.renderer.shadowMap.enabled = true;
            this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        }
        document.body.appendChild(this.renderer.domElement);

        // Lighting
        this._setupLighting(lighting, shadowMapSize);

        // Starfield (optional)
        this.starfield = null;
        if (starfield) this._setupStarfield(typeof starfield === 'object' ? starfield : {});

        // Particles (optional)
        this.particles = null;
        if (particles) this.particles = new ParticlePool(this.scene, maxParticles);

        // Animation hooks
        this._updateHooks = [];
        this._renderHooks = [];
        this._running = false;
        this._lastTime = 0;

        // Resize
        window.addEventListener('resize', () => this._onResize());
    }

    _setupLighting(config, shadowMapSize) {
        const {
            ambient = { color: 0xffffff, intensity: 0.4 },
            main = { color: 0xffffff, intensity: 0.7, position: [15, 20, 15], castShadow: true },
            fill = { color: 0x4488ff, intensity: 0.3, position: [-10, 5, -10] },
            rim = { color: 0xff88ff, intensity: 0.15, position: [0, -10, 0] },
        } = config;

        this.ambientLight = new THREE.AmbientLight(ambient.color, ambient.intensity);
        this.scene.add(this.ambientLight);

        this.mainLight = new THREE.DirectionalLight(main.color, main.intensity);
        this.mainLight.position.set(...main.position);
        if (main.castShadow) {
            this.mainLight.castShadow = true;
            this.mainLight.shadow.mapSize.width = shadowMapSize;
            this.mainLight.shadow.mapSize.height = shadowMapSize;
            this.mainLight.shadow.camera.near = 1;
            this.mainLight.shadow.camera.far = 50;
            this.mainLight.shadow.camera.left = -15;
            this.mainLight.shadow.camera.right = 15;
            this.mainLight.shadow.camera.top = 15;
            this.mainLight.shadow.camera.bottom = -15;
            this.mainLight.shadow.bias = -0.001;
            this.mainLight.shadow.radius = 2;
        }
        this.scene.add(this.mainLight);

        this.fillLight = new THREE.DirectionalLight(fill.color, fill.intensity);
        this.fillLight.position.set(...fill.position);
        this.scene.add(this.fillLight);

        this.rimLight = new THREE.DirectionalLight(rim.color, rim.intensity);
        this.rimLight.position.set(...rim.position);
        this.scene.add(this.rimLight);
    }

    _setupStarfield(config) {
        const {
            layers = [
                { count: 1200, baseSize: 1.0, sizeVar: 1.5, speed: 0.00015, radius: 55, color: 0xffffff },
                { count: 600, baseSize: 2.0, sizeVar: 2.5, speed: 0.0003, radius: 45, color: 0x88ccff },
                { count: 150, baseSize: 3.5, sizeVar: 4.0, speed: 0.0005, radius: 35, color: 0xffddaa }
            ]
        } = config;

        // Star texture
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
        grad.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
        grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 32, 32);
        const texture = new THREE.CanvasTexture(canvas);

        const vertexShader = `
            attribute float size; attribute vec3 customColor; varying vec3 vColor;
            void main() { vColor = customColor; vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); gl_PointSize = size * (300.0 / -mvPosition.z); gl_Position = projectionMatrix * mvPosition; }
        `;
        const fragmentShader = `
            uniform sampler2D uTexture; varying vec3 vColor;
            void main() { vec4 texColor = texture2D(uTexture, gl_PointCoord); gl_FragColor = vec4(vColor, 1.0) * texColor; gl_FragColor.rgb *= gl_FragColor.a; }
        `;

        this.starfield = new THREE.Group();
        layers.forEach(layer => {
            const geo = new THREE.BufferGeometry();
            const positions = [], colors = [], sizes = [];
            for (let i = 0; i < layer.count; i++) {
                const r = layer.radius + Math.random() * 25, theta = Math.random() * Math.PI * 2, phi = Math.acos(2 * Math.random() - 1);
                positions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
                const c = new THREE.Color(layer.color);
                c.offsetHSL(0, 0, (Math.random() - 0.5) * 0.2);
                colors.push(c.r, c.g, c.b);
                sizes.push(layer.baseSize + Math.random() * layer.sizeVar);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('customColor', new THREE.Float32BufferAttribute(colors, 3));
            geo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
            const mat = new THREE.ShaderMaterial({ uniforms: { uTexture: { value: texture } }, vertexShader, fragmentShader, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
            const points = new THREE.Points(geo, mat);
            points.userData = { speed: layer.speed };
            this.starfield.add(points);
        });
        this.scene.add(this.starfield);
    }

    // --- Hook system ---

    onUpdate(fn) { this._updateHooks.push(fn); }
    onRender(fn) { this._renderHooks.push(fn); }

    // --- Animation loop ---

    start() {
        if (this._running) return;
        this._running = true;
        this._lastTime = performance.now();
        this._tick();
    }

    _tick() {
        if (!this._running) return;
        requestAnimationFrame(() => this._tick());

        const now = performance.now();
        const delta = (now - this._lastTime) / 1000; // seconds
        this._lastTime = now;

        // Game update hooks
        for (const fn of this._updateHooks) fn(delta);

        // Engine updates: particles + starfield
        if (this.particles) this.particles.update();
        if (this.starfield) {
            this.starfield.children.forEach(l => {
                l.rotation.y += (l.userData.speed || 0.0003);
                l.rotation.x += (l.userData.speed || 0) * 0.3;
            });
        }

        // Post-update hooks (game rendering like instanced mesh updates)
        for (const fn of this._renderHooks) fn(delta);

        // Final render
        this.renderer.render(this.scene, this.camera);
    }

    stop() { this._running = false; }

    _onResize() {
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        // Fire resize hooks if any game needs them
        if (this._resizeHook) this._resizeHook();
    }

    onResize(fn) { this._resizeHook = fn; }
}

// ============================================
// UNBOXED ENGINE — LOOP MANAGER
// ============================================
// Lightweight animation loop for games that
// manage their own THREE.js. Provides the same
// hook interface as SceneManager so StateManager
// wiring works identically.
// ============================================
class LoopManager {
    constructor() {
        this._updateHooks = [];
        this._renderHooks = [];
        this._resizeHook = null;
        this._running = false;
        this._lastTime = 0;
        window.addEventListener('resize', () => this._onResize());
    }
    onUpdate(fn) { this._updateHooks.push(fn); }
    onRender(fn) { this._renderHooks.push(fn); }
    onResize(fn) { this._resizeHook = fn; }
    start() {
        if (this._running) return;
        this._running = true;
        this._lastTime = performance.now();
        this._tick();
    }
    stop() { this._running = false; }
    _tick() {
        if (!this._running) return;
        requestAnimationFrame(() => this._tick());
        const now = performance.now();
        const delta = (now - this._lastTime) / 1000;
        this._lastTime = now;
        for (const fn of this._updateHooks) fn(delta);
        for (const fn of this._renderHooks) fn(delta);
    }
    _onResize() {
        if (this._resizeHook) this._resizeHook();
    }
}

// ============================================
// UNBOXED BOOTSTRAP
// ============================================
// The main entry point. Games call Unboxed.run()
// with a config object. The bootstrap creates
// the scene, input, wires the state manager,
// then calls the game's init function.
// ============================================
const Unboxed = {
    // Expose framework classes for game-side subclassing
    GameState,
    SoundEngine,
    SettingsManager,
    UIManager,
    InputManager,
    ColorPalette,
    AchievementManager,
    StateManager,
    ParticlePool,
    CameraSolver,
    SceneManager,
    LoopManager,

    // Framework singletons (created before run)
    soundEngine,
    storage,
    ui,
    stateManager,

    // Filled by run()
    sceneManager: null,
    inputManager: null,

    // Convenience accessors (filled by run)
    scene: null,
    camera: null,
    renderer: null,
    particles: null,
    starfield: null,

    run(config = {}) {
        const {
            // Scene config — pass false to skip SceneManager entirely
            scene: sceneConfig = {},
            // Input config
            input: inputConfig = {},
            // Sound registrations
            sounds = {},
            // Raw loop callback for self-rendering games (used when scene: false)
            loop = null,
            // Game init callback — receives the engine object
            init = () => {},
        } = config;

        // Register game sounds
        if (Object.keys(sounds).length > 0) {
            soundEngine.registerAll(sounds);
        }

        if (sceneConfig === false) {
            // Bare loop mode — game manages its own THREE.js rendering
            this.sceneManager = new LoopManager();
            if (loop) {
                this.sceneManager.onUpdate(loop);
            }
            // Input: use specified domElement or fall back to document.body
            const inputDom = inputConfig.domElement || document.body;
            this.inputManager = new InputManager(inputDom, inputConfig);
        } else {
            // Full scene mode — framework manages THREE.js
            this.sceneManager = new SceneManager(sceneConfig);
            this.scene = this.sceneManager.scene;
            this.camera = this.sceneManager.camera;
            this.renderer = this.sceneManager.renderer;
            this.particles = this.sceneManager.particles;
            this.starfield = this.sceneManager.starfield;
            this.inputManager = new InputManager(this.renderer.domElement, inputConfig);
        }

        // Wire state routing
        this.stateManager.wire(this.sceneManager, this.inputManager);

        // Let the game initialize
        init(this);

        // Game calls Unboxed.start() when ready
    },

    start() {
        if (this.sceneManager) this.sceneManager.start();
    }
};

            's-shape': [[1,0], [2,0], [0,1], [1,1]],
            'plus':    [[1,0], [0,1], [1,1], [2,1], [1,2]],
            'c-shape': [[0,0], [1,0], [0,1], [0,2], [1,2]],
            'C-shape': [[0,0], [1,0], [2,0], [0,1], [0,2], [1,2], [2,2]],
            'u-shape': [[0,0], [2,0], [0,1], [1,1], [2,1]],
            'U-shape': [[0,0], [2,0], [0,1], [2,1], [0,2], [1,2], [2,2]],
        };
    }

    getLocal2D(cube) {
        const p = cube.plane;
        if (p === 'floor') return [cube.gridX, cube.gridZ];
        if (p === 'left') return [cube.gridZ, cube.gridY];
        return [cube.gridX, cube.gridY];
    }
    normalizeCoords(coords) {
        const minX = Math.min(...coords.map(c => c[0]));
        const minY = Math.min(...coords.map(c => c[1]));
        return coords.map(([x, y]) => [x - minX, y - minY]);
    }
    rotatePattern(coords) { return coords.map(([x, y]) => [-y, x]); }
    coordSetsEqual(s1, s2) {
        if (s1.size !== s2.size) return false;
        for (const item of s1) if (!s2.has(item)) return false;
        return true;
    }
    classifyShape(cubes) {
        const planes = new Set(cubes.map(c => c.plane));
        if (planes.size > 1) return planes.size === 3 ? 'trifecta' : 'bridge';
        const coords = cubes.map(c => this.getLocal2D(c));
        const normalized = this.normalizeCoords(coords);
        const coordSet = new Set(normalized.map(([x, y]) => `${x},${y}`));
        for (const [name, pattern] of Object.entries(this.patterns)) {
            let rotated = [...pattern];
            for (let r = 0; r < 4; r++) {
                const normPattern = this.normalizeCoords(rotated);
                const patternSet = new Set(normPattern.map(([x, y]) => `${x},${y}`));
                if (this.coordSetsEqual(coordSet, patternSet)) return name;
                rotated = this.rotatePattern(rotated);
            }
        }
        return cubes.length >= 6 ? 'blob' : null;
    }
    recordMatch(cubes) {
        const shape = this.classifyShape(cubes);
        if (!shape) return;
        const { wasNew, count } = this.tracker.record(shape);
        this.tracker.incrementStat('totalMatches');
        this.tracker.incrementStat('totalCubesCleared', cubes.length);
        if (wasNew) {
            const def = this.tracker.getDef(shape);
            soundManager.goalDiscovered();
            ui.toast(def.icon, `<strong>New!</strong> ${def.name} discovered`);
        }
        console.log(`📊 Shape: ${shape} (${count})`);
    }
    recordBoxedIn() { this.tracker.incrementStat('boxedInBonuses'); }
    recordSmartMove() { this.tracker.incrementStat('smartMoves'); }
    recordLineClears(count) { this.tracker.incrementStat('lineClears', count); }
    updateMaxCombo(combo) { this.tracker.maxStat('maxCombo', combo); }
    reset() { this.tracker.reset(); }
    renderPanel(sortBy = 'count') {
        this.tracker.renderPanel('goals-list', 'goals-stats', {
            sortBy, statLabels: this.statLabels
        });
    }
}

// Texture Generation
function createColorTexture(colorKey, hexColor, useNumbers = false) {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#' + hexColor.toString(16).padStart(6, '0');
    ctx.fillRect(0, 0, 128, 128);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 18;
    ctx.strokeRect(2, 2, 124, 124);
    const sym = useNumbers ? colorNumbers[colorKey] : colorManager.getLabel(colorKey);
    ctx.font = 'bold 80px Orbitron, Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 6;
    ctx.strokeText(sym, 64, 66);
    ctx.fillStyle = '#fff'; ctx.fillText(sym, 64, 66);
    return new THREE.CanvasTexture(canvas);
}

// Instanced Renderer
class InstancedCubeRenderer {
    constructor(scene) {
        this.scene = scene;
        this.meshes = {}; // Map<colorKey, InstancedMesh>
        this.geometry = new THREE.BoxGeometry(1, 1, 1);
        this.dummy = new THREE.Object3D();
        this.maxInstances = 150; // Safety buffer
        this.instanceLookup = {}; // Map<colorKey, Map<instanceId, LogicalCube>>
        
        // Selection Cursor (Single mesh)
        const edges = new THREE.EdgesGeometry(this.geometry);
        this.cursor = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2, transparent: true, opacity: 0.8 }));
        this.cursor.visible = false;
        
        // Add a glow mesh inside cursor
        const glowGeo = new THREE.BoxGeometry(1.05, 1.05, 1.05);
        const glowMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.2, depthWrite: false });
        this.cursorGlow = new THREE.Mesh(glowGeo, glowMat);
        this.cursor.add(this.cursorGlow);
        
        this.scene.add(this.cursor);
        this.updateTextures(false);
    }

    updateTextures(useNumbers) {
        // Clear existing meshes
        Object.values(this.meshes).forEach(mesh => this.scene.remove(mesh));
        this.meshes = {};

        // Create new meshes for current active colors
        activeColorKeys.forEach(key => {
            const tex = createColorTexture(key, colorManager.getColor(key), useNumbers);
            const mat = new THREE.MeshPhongMaterial({ map: tex, shininess: 100 });
            const mesh = new THREE.InstancedMesh(this.geometry, mat, this.maxInstances);
            mesh.userData = { colorKey: key }; // Identifier for raycasting
            mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            this.scene.add(mesh);
            this.meshes[key] = mesh;
        });
    }

    render(logicalCubes) {
        // Reset counts
        Object.values(this.meshes).forEach(mesh => mesh.count = 0);
        this.instanceLookup = {}; // Reset lookup map
        
        activeColorKeys.forEach(k => this.instanceLookup[k] = {});

        logicalCubes.forEach(cube => {
            if (cube.isDying && cube.scale <= 0.05) return; // Skip invisible

            const mesh = this.meshes[cube.colorKey];
            if (!mesh) return; // Should not happen unless color removed mid-game

            const idx = mesh.count;
            
            this.dummy.position.copy(cube.position);
            this.dummy.rotation.set(0, cube.rotationY, 0);
            this.dummy.scale.setScalar(cube.scale);
            this.dummy.updateMatrix();

            mesh.setMatrixAt(idx, this.dummy.matrix);
            
            // Map visual instance back to logical cube for raycasting
            this.instanceLookup[cube.colorKey][idx] = cube;

            mesh.count++;
        });

        Object.values(this.meshes).forEach(mesh => {
            mesh.instanceMatrix.needsUpdate = true;
        });
        
        // Update cursor
        const selected = logicalCubes.find(c => c.isSelected);
        if (selected) {
            this.cursor.visible = true;
            this.cursor.position.copy(selected.position);
            // Pulse effect
            const pulse = 0.4 + 0.3 * Math.sin(performance.now() * 0.008);
            this.cursorGlow.material.opacity = pulse;
            this.cursor.scale.setScalar(1.15); // Match logic
        } else {
            this.cursor.visible = false;
        }
    }
    
    getCubeFromIntersect(intersect) {
        const colorKey = intersect.object.userData.colorKey;
        const instanceId = intersect.instanceId;
        if (this.instanceLookup[colorKey]) {
            return this.instanceLookup[colorKey][instanceId];
        }
        return null;
    }
    
    getInteractableMeshes() {
        return Object.values(this.meshes);
    }
}

// Utility Functions
function wouldCreateMatch(plane, gridX, gridY, gridZ, colorKey) {
    const active = logicalCubes.filter(c => !c.isDying);
    let neighbors = 0;
    const required = minMatchSize - 1;
    for (const c of active) {
        if (c.colorKey !== colorKey) continue;
        if (isAdjacentToPosition(c, plane, gridX, gridY, gridZ)) {
            neighbors++;
            if (neighbors >= required) return true;
        }
    }
    return false;
}

function isAdjacentToPosition(cube, plane, gx, gy, gz) {
    const cp = cube.plane;
    const cx = cube.gridX, cy = cube.gridY, cz = cube.gridZ;
    if (cp === plane) {
        if (plane === 'left') return Math.abs(cy - gy) + Math.abs(cz - gz) === 1 && cx === gx;
        if (plane === 'right') return Math.abs(cx - gx) + Math.abs(cy - gy) === 1 && cz === gz;
        return Math.abs(cx - gx) + Math.abs(cz - gz) === 1 && cy === gy;
    }
    // Cross-face
    if ((cp === 'left' && plane === 'floor') || (cp === 'floor' && plane === 'left')) {
        const [ly, lz] = cp === 'left' ? [cy, cz] : [gy, gz];
        const [fx, fz] = cp === 'floor' ? [cx, cz] : [gx, gz];
        return ly === 0 && fx === 0 && lz === fz;
    }
    if ((cp === 'right' && plane === 'floor') || (cp === 'floor' && plane === 'right')) {
        const [ry, rx] = cp === 'right' ? [cy, cx] : [gy, gx];
        const [fx, fz] = cp === 'floor' ? [cx, cz] : [gx, gz];
        return ry === 0 && fz === 0 && rx === fx;
    }
    if ((cp === 'left' && plane === 'right') || (cp === 'right' && plane === 'left')) {
        const [lz, ly] = cp === 'left' ? [cz, cy] : [gz, gy];
        const [rx, ry] = cp === 'right' ? [cx, cy] : [gx, gy];
        return lz === 0 && rx === 0 && ly === ry;
    }
    return false;
}

function pickSmartColor(plane, gx, gy, gz) {
    const shuffled = [...activeColorKeys].sort(() => Math.random() - 0.5);
    if (Math.random() < 0.75) {
        for (const c of shuffled) if (!wouldCreateMatch(plane, gx, gy, gz, c)) return c;
    }
    return shuffled[0];
}

function createCube(x, y, z, plane, indexKey = null, finalGridPos = null) {
    const colorKey = finalGridPos 
        ? pickSmartColor(plane, finalGridPos.gridX, finalGridPos.gridY, finalGridPos.gridZ)
        : activeColorKeys[Math.floor(Math.random() * activeColorKeys.length)];
    
    const target = new THREE.Vector3(x, y, z);
    const gridX = Math.round((x - offset) / spacing);
    const gridY = Math.round((y - offset) / spacing);
    const gridZ = Math.round((z - offset) / spacing);
    
    const cube = new LogicalCube(gridX, gridY, gridZ, plane, colorKey, target);
    
    logicalCubes.push(cube);
    if (indexKey !== null) {
        if (plane === 'left') leftWallRows[indexKey].push(cube);
        else if (plane === 'right') rightWallRows[indexKey].push(cube);
        else if (plane === 'floor') floorStrips[indexKey].push(cube);
    }
    return cube;
}

function initBoard() {
    logicalCubes = [];
    leftWallRows = [[],[],[],[],[]]; rightWallRows = [[],[],[],[],[]]; floorStrips = [[],[],[],[],[]];
    for (let y = 0; y < gridSize; y++) for (let z = 0; z < gridSize; z++) createCube(-0.6, y * spacing + offset, z * spacing + offset, 'left', y);
    for (let y = 0; y < gridSize; y++) for (let x = 0; x < gridSize; x++) createCube(x * spacing + offset, y * spacing + offset, -0.6, 'right', y);
    for (let x = 0; x < gridSize; x++) for (let z = 0; z < gridSize; z++) createCube(x * spacing + offset, -0.6, z * spacing + offset, 'floor', x);
}
