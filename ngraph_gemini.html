<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ngraph — 3D Radial Constellation v4.3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #020406;
  --surface:  rgba(255,255,255,0.04);
  --border:   rgba(255,255,255,0.12);
  --text:     #d4cfe8;
  --muted:    rgba(255,255,255,0.35);
  --cyan:     #4ecdc4;
  --lav:      #c792ea;
  --gold:     #ffd93d;
}

html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; }

#container { position: absolute; inset: 0; cursor: grab; }
#container:active { cursor: grabbing; }

/* ── Panel ─────────────────────── */
.panel {
  position:fixed; top:20px; left:20px; width:260px; z-index:100;
  background:rgba(6,9,18,0.85); backdrop-filter:blur(24px);
  border:1px solid var(--border); border-radius:16px; overflow:hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}
.panel-header {
  padding:14px 16px 12px; display:flex; align-items:flex-start;
  justify-content:space-between; border-bottom:1px solid var(--border);
}
.panel-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:var(--cyan); letter-spacing:-.02em; }
.panel-sub   { font-size:10px; color:var(--muted); margin-top:2px; }
.min-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; padding:2px 5px; }
.panel-body { padding:12px 16px 14px; }
.gone { display: none !important; }

.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:12px; }
.stat-box  { background:var(--surface); border-radius:8px; padding:8px 10px; border:1px solid var(--border); }
.stat-num  { font-family:'Syne',sans-serif; font-weight:800; font-size:19px; line-height:1; color: #fff; }
.stat-lbl  { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-top:3px; }

.section-label { font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin:10px 0 5px; }

.edge-toggle { display:flex; align-items:center; gap:8px; padding:6px; border-radius:6px; cursor:pointer; user-select:none; }
.edge-toggle:hover { background:var(--surface); }
.edge-toggle input { display:none; }
.edge-toggle.off { opacity: 0.25; filter: grayscale(1); }
.tdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.tdot.growth   { background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
.tdot.sibling  { background:var(--lav);  box-shadow:0 0 8px var(--lav); }
.tdot.mutation { background:#fff; box-shadow:0 0 8px #fff; }
.tname { flex:1; font-size:11px; }

.cm-row { display:flex; gap:4px; flex-wrap:wrap; margin-top:5px; }
.cm-btn {
  flex: 1; padding:6px 2px; border:1px solid var(--border); border-radius:6px;
  background:none; color:var(--muted); font-size:10px; cursor:pointer;
}
.cm-btn.active { border-color:var(--cyan); color:var(--cyan); background:rgba(78,205,196,0.1); }

.btn-row { display:flex; gap:4px; margin-top:12px; }
.btn {
  flex:1; padding:8px; border:1px solid var(--border); border-radius:8px;
  background:none; color:var(--text); font-size:10px; cursor:pointer;
}
.btn.prim { border-color:var(--cyan); color:var(--cyan); }

/* ── Tooltip ──────────────────── */
#tooltip { position:fixed; pointer-events:none; z-index:200; opacity:0; transition:opacity .15s; }
#tooltip.vis { opacity:1; }
.tt-inner {
  background:rgba(6,9,18,0.96); backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.18); border-radius:12px;
  padding:14px; width:240px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
.tt-top { display:flex; align-items:center; gap:14px; margin-bottom:12px; }
#tt-cv  { 
  background: rgba(255,255,255,0.03); 
  border: 1px solid rgba(255,255,255,0.1);
  border-radius:6px; 
}
.tt-nm  { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; color: #fff; }
.tt-sg  { font-size:9px; color:var(--muted); word-break:break-all; line-height: 1.4; }
.tt-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size:10px; margin-top:10px; border-top: 1px solid var(--border); padding-top: 10px;}
.tt-row b { color:var(--cyan); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px;}

/* ── Overlays ─────────────────── */
#empty {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:20px; z-index:50;
  background: radial-gradient(circle at center, rgba(12,16,30,0.8), var(--bg));
}
.demo-btn {
  padding:14px 30px; background:rgba(78,205,196,0.15); border:1px solid var(--cyan);
  border-radius:12px; color:var(--cyan); font-family:'Syne',sans-serif; font-weight:800;
  cursor:pointer; transition: 0.2s;
}
.demo-btn:hover { background:rgba(78,205,196,0.3); transform: scale(1.05); }

#hint {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  font-size:10px; color:var(--muted); pointer-events:none; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px;
}
</style>
</head>
<body>

<div id="container"></div>

<div class="panel" id="panel">
  <div class="panel-header">
    <div><div class="panel-title">ngraph 3D</div><div class="panel-sub">v4.3 · high-contrast</div></div>
    <button class="min-btn" onclick="document.getElementById('pbody').classList.toggle('gone')">−</button>
  </div>
  <div class="panel-body" id="pbody">
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num" id="s-shapes">0</div><div class="stat-lbl">shapes</div></div>
      <div class="stat-box"><div class="stat-num" id="s-rainbows">0</div><div class="stat-lbl">rainbows</div></div>
    </div>

    <div class="section-label">relationship web</div>
    <div id="etog">
      <label class="edge-toggle" data-type="growth">
        <input type="checkbox" checked><span class="tdot growth"></span><span class="tname">growth</span>
      </label>
      <label class="edge-toggle off" data-type="sibling">
        <input type="checkbox"><span class="tdot sibling"></span><span class="tname">sibling</span>
      </label>
      <label class="edge-toggle off" data-type="mutation">
        <input type="checkbox"><span class="tdot mutation"></span><span class="tname">mutation</span>
      </label>
    </div>

    <div class="section-label">spectral analysis</div>
    <div class="cm-row">
      <button class="cm-btn active" data-mode="dominant">color</button>
      <button class="cm-btn" data-mode="frequency">finds</button>
      <button class="cm-btn" data-mode="size">cells</button>
      <button class="cm-btn" data-mode="complete">rainbows</button>
    </div>

    <div class="btn-row">
      <button class="btn prim" id="btn-fit">⊡ reset camera</button>
      <button class="btn" id="btn-load">↑ load json</button>
    </div>
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>
</div>

<div id="tooltip">
  <div class="tt-inner">
    <div class="tt-top">
      <canvas id="tt-cv" width="64" height="64"></canvas>
      <div>
        <div class="tt-nm" id="tt-nm">6-cell</div>
        <div class="tt-sg" id="tt-sg">0,0|0,1...</div>
      </div>
    </div>
    <div class="tt-grid">
      <div class="tt-row"><span>Found</span> <b id="tt-n">0</b></div>
      <div class="tt-row"><span>Symm</span> <b id="tt-or">1/8</b></div>
      <div class="tt-row"><span>Colors</span> <b id="tt-cl">0/5</b></div>
      <div class="tt-row"><span>Size</span> <b id="tt-cc">0</b></div>
    </div>
  </div>
</div>

<div id="empty">
  <div style="font-family:'Syne', sans-serif; font-size: 32px; font-weight: 800; color: #fff;">Nebula Offline</div>
  <p style="color: var(--muted); text-align: center; max-width: 300px; font-size: 13px;">Visualization initialized. Shapes will now be clearly visible in tooltips.</p>
  <button class="demo-btn" id="demo-btn">✦ Initializing Nebula</button>
</div>

<div id="hint">LMB: Orbit • RMB: Pan • Scroll: Zoom • Click Shape: Focus</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
'use strict';

const PALETTE = ['#ff6b6b','#7bed9f','#5f9ee9','#c792ea','#ffd93d'];
const COLOR_MASK = 0x001F;
const PERM_BITS = 5;

const popcnt = n => { let c=0; while(n){c+=n&1;n>>>=1;} return c; };
const parseSig = s => s.split('|').map(p=>p.split(',').map(Number));
const normCells = cells => {
  const mr = Math.min(...cells.map(c=>c[0])), mc = Math.min(...cells.map(c=>c[1]));
  return cells.map(([r,c])=>[r-mr,c-mc]).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
};
const cellsToSig = c => normCells(c).map(p=>p.join(',')).join('|');
const canonical = cells => {
  const sigs = []; let cur = cells;
  const rot = c => c.map(([r,l])=>[l,-r]);
  const refl = c => c.map(([r,l])=>[r,-l]);
  for(let i=0; i<4; i++){ sigs.push(cellsToSig(cur)); sigs.push(cellsToSig(refl(cur))); cur=rot(cur); }
  return sigs.sort()[0];
};

class Constellation3D {
  constructor() {
    this.nodes = [];
    this.edges = [];
    this.nodeMap = new Map();
    this.activeEdges = new Set(['growth']);
    this.colorMode = 'dominant';
    this.selectedNode = null;
    
    this.initScene();
    this.animate();
    this.initListeners();
  }

  initScene() {
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x020406);
    this.scene.fog = new THREE.FogExp2(0x020406, 0.0005);

    this.camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 35000);
    this.camera.position.set(0, 1000, 2000);

    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.setPixelRatio(window.devicePixelRatio);
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(this.renderer.domElement);

    this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
    this.controls.enableDamping = true;
    this.controls.dampingFactor = 0.05;

    this.scene.add(new THREE.HemisphereLight(0x445566, 0x111122, 0.7));
    const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
    mainLight.position.set(0, 2000, 1000);
    this.scene.add(mainLight);

    const p1 = new THREE.PointLight(0x5f9ee9, 1, 6000);
    p1.position.set(3000, 500, 3000);
    this.scene.add(p1);

    const p2 = new THREE.PointLight(0xff6b6b, 0.8, 6000);
    p2.position.set(-3000, 500, -3000);
    this.scene.add(p2);

    const coreGeo = new THREE.IcosahedronGeometry(25, 2);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0x4ecdc4, wireframe: true, transparent: true, opacity: 0.8 });
    this.core = new THREE.Mesh(coreGeo, coreMat);
    this.scene.add(this.core);

    const coreLight = new THREE.PointLight(0x4ecdc4, 2, 800);
    this.core.add(coreLight);

    this.raycaster = new THREE.Raycaster();
    this.mouse = new THREE.Vector2();
    this.hoveredNode = null;

    this.cubeGeo = new THREE.BoxGeometry(1, 1, 1);
    this.instanceMesh = null;
    this.edgeGroup = new THREE.Group();
    this.scene.add(this.edgeGroup);

    this.ringGroup = new THREE.Group();
    this.scene.add(this.ringGroup);
    
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = [];
    for(let i=0; i<8000; i++) {
      starsPos.push((Math.random()-0.5)*20000, (Math.random()-0.5)*20000, (Math.random()-0.5)*20000);
    }
    starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
    this.scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0x888888, size: 2.5 })));
  }

  loadData(raw) {
    const entries = raw.families ? 
      raw.families.filter(f=>f.isCanonical!==false).map(f=>({
        sig: f.sig, n: f.n, b: f.b, cellCount: f.cellCount || parseSig(f.sig).length, discoveryOrder: f.discoveryOrder || 0
      })) : 
      Object.entries(raw).map(([sig, d], i)=>({
        sig, n: d.n, b: d.b, cellCount: parseSig(sig).length, discoveryOrder: d.d || i
      }));

    this.nodes = entries.map(e => ({...e, cells: parseSig(e.sig)}));
    this.nodeMap = new Map(this.nodes.map(n => [n.sig, n]));
    
    this.buildEdges();
    this.computeLayout();
    this.renderNodes();
    this.renderEdges();
    this.updateStats();

    document.getElementById('empty').classList.add('gone');
  }

  buildEdges() {
    this.edges = [];
    const sigSet = new Set(this.nodes.map(n => n.sig));
    const bySize = {};
    const childrenOf = {};

    this.nodes.forEach(n => {
      (bySize[n.cellCount] || (bySize[n.cellCount] = [])).push(n);
      const parentSet = new Set();
      n.cells.forEach((_, i) => {
        const sub = n.cells.filter((_, j) => j !== i);
        if (sub.length > 0) {
          const can = canonical(sub);
          if (sigSet.has(can)) parentSet.add(can);
        }
      });
      parentSet.forEach(p => {
        this.edges.push({ source: p, target: n.sig, type: 'growth' });
        (childrenOf[p] || (childrenOf[p] = new Set())).add(n.sig);
      });
    });

    Object.values(childrenOf).forEach(children => {
      const arr = [...children];
      for(let i=0; i<arr.length; i++)
        for(let j=i+1; j<arr.length; j++)
          this.edges.push({ source: arr[i], target: arr[j], type: 'sibling' });
    });

    Object.keys(bySize).forEach(sz => {
      const grp = bySize[sz];
      for(let i=0; i<grp.length; i++)
        for(let j=i+1; j<grp.length; j++) {
          const setA = new Set(grp[i].cells.map(c=>c.join(',')));
          const setB = new Set(grp[j].cells.map(c=>c.join(',')));
          let common = 0; for(let k of setA) if(setB.has(k)) common++;
          if(common === sz-1) this.edges.push({ source: grp[i].sig, target: grp[j].sig, type: 'mutation' });
        }
    });
  }

  computeLayout() {
    const byRing = {};
    this.nodes.forEach(n => (byRing[n.cellCount] || (byRing[n.cellCount] = [])).push(n));
    const rings = Object.keys(byRing).map(Number).sort((a,b)=>a-b);

    const MIN_GAP = 140, SHAPE_GAP = 30;
    let prevR = 0;
    this.ringData = {};

    rings.forEach((sz, ri) => {
      const count = byRing[sz].length;
      const glyphSize = 8 + sz * 3;
      const rFit = (count * (glyphSize + SHAPE_GAP)) / (2 * Math.PI);
      const r = Math.max(rFit, prevR + MIN_GAP);
      this.ringData[sz] = r;
      prevR = r;

      const yOffset = (sz - rings[0]) * 45;
      const offset = (ri * 0.41) % (Math.PI * 2);
      byRing[sz].sort((a,b)=>a.discoveryOrder - b.discoveryOrder).forEach((node, i) => {
        const angle = (i/count) * Math.PI * 2 + offset;
        node.pos = new THREE.Vector3(Math.cos(angle)*r, yOffset, Math.sin(angle)*r);
      });
    });

    this.ringGroup.clear();
    Object.entries(this.ringData).forEach(([sz, r]) => {
      const y = (sz - rings[0]) * 45;
      const geo = new THREE.TorusGeometry(r, 0.4, 8, 128);
      const mat = new THREE.MeshBasicMaterial({ color: 0x4ecdc4, transparent: true, opacity: 0.15 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = Math.PI / 2;
      mesh.position.y = y;
      this.ringGroup.add(mesh);
    });
  }

  renderNodes() {
    if(this.instanceMesh) this.scene.remove(this.instanceMesh);

    const totalCubes = this.nodes.reduce((sum, n) => sum + n.cellCount, 0);
    const mat = new THREE.MeshStandardMaterial({ 
      metalness: 0.1, 
      roughness: 0.4, 
      emissiveIntensity: 0.4 
    });
    this.instanceMesh = new THREE.InstancedMesh(this.cubeGeo, mat, totalCubes);
    
    let idx = 0;
    const dummy = new THREE.Object3D();
    const color = new THREE.Color();
    this.instanceMap = [];

    this.nodes.forEach(node => {
      const nodeCol = this.getNodeColor(node);
      const scale = 6;
      
      node.cells.forEach(([r, c]) => {
        dummy.position.set(node.pos.x + (c * scale), node.pos.y, node.pos.z + (r * scale));
        dummy.scale.set(scale * 0.95, scale * 0.95, scale * 0.95);
        dummy.updateMatrix();
        this.instanceMesh.setMatrixAt(idx, dummy.matrix);
        this.instanceMesh.setColorAt(idx, color.set(nodeCol));
        this.instanceMap[idx] = node;
        idx++;
      });
    });

    this.instanceMesh.instanceColor.needsUpdate = true;
    this.scene.add(this.instanceMesh);
  }

  renderEdges() {
    this.edgeGroup.clear();
    const colors = { growth: 0x4ecdc4, sibling: 0xc792ea, mutation: 0xffffff };

    ['growth', 'sibling', 'mutation'].forEach(type => {
      if (!this.activeEdges.has(type)) return;

      const posArr = [];
      const filtered = this.edges.filter(e => {
        if (e.type !== type) return false;
        if (this.hoveredNode || this.selectedNode) {
          const focus = this.hoveredNode || this.selectedNode;
          return e.source === focus.sig || e.target === focus.sig;
        }
        return true; 
      });

      filtered.forEach(e => {
        const a = this.nodeMap.get(e.source), b = this.nodeMap.get(e.target);
        if(a && b) posArr.push(a.pos.x, a.pos.y, a.pos.z, b.pos.x, b.pos.y, b.pos.z);
      });

      if (posArr.length === 0) return;

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(posArr, 3));
      const opacity = (this.hoveredNode || this.selectedNode) ? 0.9 : 0.12;
      const mat = new THREE.LineBasicMaterial({ color: colors[type], transparent: true, opacity: opacity });
      this.edgeGroup.add(new THREE.LineSegments(geo, mat));
    });
  }

  getNodeColor(node) {
    if(this.colorMode === 'dominant') {
      for(let i=0; i<5; i++) if((node.b >> i) & 1) return PALETTE[i];
      return PALETTE[0];
    }
    if(this.colorMode === 'frequency') {
      const t = Math.min(1, Math.log1p(node.n) / 5);
      return new THREE.Color().setHSL(0.65 - (t * 0.5), 0.8, 0.6).getHex();
    }
    if(this.colorMode === 'size') {
      const t = Math.min(1, (node.cellCount-2)/10);
      return new THREE.Color().setHSL(0.1 + (t * 0.4), 0.7, 0.6).getHex();
    }
    if(this.colorMode === 'complete') {
      return (node.b & COLOR_MASK) === COLOR_MASK ? 0xffd93d : 0x2a3045;
    }
    return 0x4ecdc4;
  }

  updateStats() {
    document.getElementById('s-shapes').textContent = this.nodes.length;
    document.getElementById('s-rainbows').textContent = this.nodes.filter(n => (n.b & COLOR_MASK) === COLOR_MASK).length;
  }

  initListeners() {
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('mousemove', (e) => {
      this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      this.checkIntersection(e, false);
    });

    window.addEventListener('click', (e) => {
        this.checkIntersection(e, true);
    });

    document.querySelectorAll('.cm-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cm-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.colorMode = btn.dataset.mode;
        this.renderNodes();
      });
    });

    document.getElementById('etog').addEventListener('click', e => {
      const row = e.target.closest('.edge-toggle');
      if(!row) return;
      const type = row.dataset.type;
      const input = row.querySelector('input');
      input.checked = !input.checked;
      row.classList.toggle('off', !input.checked);
      if(input.checked) this.activeEdges.add(type); else this.activeEdges.delete(type);
      this.renderEdges();
    });

    document.getElementById('btn-fit').addEventListener('click', () => {
      this.selectedNode = null;
      this.flyTo(new THREE.Vector3(0, 1000, 2000), new THREE.Vector3(0, 0, 0));
    });

    document.getElementById('btn-load').addEventListener('click', () => document.getElementById('file-input').click());
    document.getElementById('file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => this.loadData(JSON.parse(ev.target.result));
      reader.readAsText(file);
    });

    document.getElementById('demo-btn').addEventListener('click', () => this.loadData(this.generateDemo()));
  }

  checkIntersection(event, isClick) {
    if(!this.instanceMesh) return;
    this.raycaster.setFromCamera(this.mouse, this.camera);
    const intersects = this.raycaster.intersectObject(this.instanceMesh);

    if(intersects.length > 0) {
      const node = this.instanceMap[intersects[0].instanceId];
      if(isClick) {
        this.selectedNode = node;
        this.flyToNode(node);
      } else if(this.hoveredNode !== node) {
        this.hoveredNode = node;
        this.renderEdges();
        this.showTooltip(node, event.clientX, event.clientY);
      }
    } else {
      if (!isClick && this.hoveredNode) {
        this.hoveredNode = null;
        this.renderEdges();
        document.getElementById('tooltip').classList.remove('vis');
      }
    }
  }

  flyToNode(node) {
    const targetPos = node.pos.clone().add(new THREE.Vector3(0, 200, 400));
    this.flyTo(targetPos, node.pos);
  }

  flyTo(camPos, lookPos) {
    new TWEEN.Tween(this.camera.position).to(camPos, 1200)
      .easing(TWEEN.Easing.Cubic.Out).start();
    new TWEEN.Tween(this.controls.target).to(lookPos, 1200)
      .easing(TWEEN.Easing.Cubic.Out).start();
  }

  showTooltip(node, x, y) {
    const tt = document.getElementById('tooltip');
    const cv = document.getElementById('tt-cv');
    const ctx = cv.getContext('2d');
    
    document.getElementById('tt-nm').textContent = `${node.cellCount}-cell shape`;
    document.getElementById('tt-sg').textContent = node.sig;
    document.getElementById('tt-n').textContent = node.n.toLocaleString();
    document.getElementById('tt-cc').textContent = node.cellCount;
    document.getElementById('tt-cl').textContent = `${popcnt(node.b & COLOR_MASK)}/5`;
    document.getElementById('tt-or').textContent = `${popcnt(node.b >> PERM_BITS)}/8`;

    // ── Tooltip Rendering ───────────────────────────
    ctx.clearRect(0,0,64,64);
    
    // Draw Background Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for(let i=0; i<=64; i+=8){
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,64); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(64,i); ctx.stroke();
    }

    const cells = normCells(node.cells);
    const maxR = Math.max(...cells.map(c=>c[0])) + 1;
    const maxC = Math.max(...cells.map(c=>c[1])) + 1;
    const maxDim = Math.max(maxR, maxC, 2);
    const sz = Math.floor(44 / maxDim);
    const offsetX = (64 - (maxC * sz)) / 2;
    const offsetY = (64 - (maxR * sz)) / 2;

    // Use dominant color even if 3D mode is "Complete"
    let drawColor = PALETTE[0];
    for(let i=0; i<5; i++) if((node.b >> i) & 1) { drawColor = PALETTE[i]; break; }

    cells.forEach(([r,c]) => {
      const px = offsetX + c*sz;
      const py = offsetY + r*sz;
      
      // Main block
      ctx.fillStyle = drawColor;
      ctx.fillRect(px, py, sz-1, sz-1);
      
      // Top/Left highlight for depth
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(px, py, sz-1, 1);
      ctx.fillRect(px, py, 1, sz-1);
    });

    tt.style.left = (x + 20) + 'px'; tt.style.top = (y - 20) + 'px';
    tt.classList.add('vis');
  }

  generateDemo() {
    const raw = {};
    const seen = new Set();
    const grow = (cells) => {
      const sig = cellsToSig(cells);
      if(seen.has(sig) || cells.length > 7) return;
      seen.add(sig);
      if(canonical(cells) === sig) {
        raw[sig] = { n: Math.floor(Math.random()*50), b: Math.floor(Math.random()*0xFFFF), d: seen.size };
      }
      const occ = new Set(cells.map(c=>c.join(',')));
      cells.forEach(([r,c]) => {
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc]) => {
          if(!occ.has(`${r+dr},${c+dc}`)) grow(normCells([...cells, [r+dr,c+dc]]));
        });
      });
    };
    grow([[0,0]]);
    return raw;
  }

  animate(time) {
    requestAnimationFrame((t) => this.animate(t));
    TWEEN.update(time);
    this.controls.update();
    if(this.core) {
        this.core.rotation.y += 0.012;
        this.core.rotation.z += 0.008;
        this.core.scale.setScalar(1 + Math.sin(time * 0.003) * 0.15);
    }
    this.renderer.render(this.scene, this.camera);
  }
}

const app = new Constellation3D();
