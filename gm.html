<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Platonic Matcher</title>
    <!-- CSS Reset and Font Styling -->
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #090a15; /* Deep space background */
            font-family: 'Segoe UI', -apple-system, Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlays */
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }

        .ui-screen.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .ui-screen.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* Frosted Light-Glassmorphism Design to match image layout */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08), inset 0 0 15px rgba(255, 255, 255, 0.6);
            border-radius: 20px;
        }

        /* Level Selection Screen */
        #menu-screen {
            background: radial-gradient(circle at center, rgba(14, 16, 32, 0.45) 0%, rgba(9, 10, 21, 0.95) 100%);
        }

        .header-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-area h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, #5e72eb, #df7adf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header-area p {
            font-size: 1rem;
            color: #8c95b3;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Carousel Layout */
        .carousel-outer {
            position: relative;
            width: 100%;
            max-width: 1100px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .carousel-viewport {
            width: calc(100% - 120px);
            overflow-x: auto;
            scroll-behavior: smooth;
            display: flex;
            gap: 30px;
            padding: 20px 10px;
            scrollbar-width: none; /* Firefox */
        }

        .carousel-viewport::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .carousel-card {
            flex: 0 0 280px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            color: #1a1a24;
        }

        .carousel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        /* Easy Tier Style */
        .carousel-card.easy {
            border-color: rgba(51, 255, 119, 0.4);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
        }
        .carousel-card.easy::before {
            background: linear-gradient(90deg, #2ecc71, #00ffcc);
        }
        .carousel-card.easy:hover {
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.2);
            border-color: rgba(46, 204, 113, 0.6);
            transform: translateY(-8px);
        }

        /* Medium Tier Style */
        .carousel-card.medium {
            border-color: rgba(51, 153, 255, 0.4);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
        }
        .carousel-card.medium::before {
            background: linear-gradient(90deg, #3498db, #2980b9);
        }
        .carousel-card.medium:hover {
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.2);
            border-color: rgba(52, 152, 219, 0.6);
            transform: translateY(-8px);
        }

        /* Hard Tier Style */
        .carousel-card.hard {
            border-color: rgba(187, 51, 255, 0.4);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
        }
        .carousel-card.hard::before {
            background: linear-gradient(90deg, #9b59b6, #e74c3c);
        }
        .carousel-card.hard:hover {
            box-shadow: 0 10px 30px rgba(155, 89, 182, 0.2);
            border-color: rgba(155, 89, 182, 0.6);
            transform: translateY(-8px);
        }

        /* Expert Tier Style */
        .carousel-card.expert {
            border-color: rgba(255, 153, 51, 0.4);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
        }
        .carousel-card.expert::before {
            background: linear-gradient(90deg, #e67e22, #d35400);
        }
        .carousel-card.expert:hover {
            box-shadow: 0 10px 30px rgba(230, 126, 34, 0.2);
            border-color: rgba(230, 126, 34, 0.6);
            transform: translateY(-8px);
        }

        /* Legendary Tier Style */
        .carousel-card.legendary {
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
        }
        .carousel-card.legendary::before {
            background: linear-gradient(90deg, #f1c40f, #e74c3c);
        }
        .carousel-card.legendary:hover {
            box-shadow: 0 10px 30px rgba(241, 196, 15, 0.3);
            border-color: rgba(241, 196, 15, 0.7);
            transform: translateY(-8px);
        }

        .card-top {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .card-difficulty {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }
        .easy .card-difficulty { color: #27ae60; }
        .medium .card-difficulty { color: #2980b9; }
        .hard .card-difficulty { color: #8e44ad; }
        .expert .card-difficulty { color: #d35400; }
        .legendary .card-difficulty { color: #d68910; }

        .card-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1a1a24;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        .card-stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding-top: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #555c70;
        }

        .stat-val {
            font-weight: 700;
            color: #1a1a24;
        }

        .card-action {
            margin-top: auto;
            text-align: center;
            background: rgba(0, 0, 0, 0.03);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
            color: #1a1a24;
        }

        .carousel-card:hover .card-action {
            background: rgba(0, 0, 0, 0.08);
            color: #000000;
        }

        /* Carousel Control Arrows */
        .arrow-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #1a1a24;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .arrow-btn:hover {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.2);
            transform: scale(1.05);
        }

        .arrow-btn:active {
            transform: scale(0.95);
        }

        /* HUD Overlay Screen */
        #hud-container {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 15;
            pointer-events: none;
        }

        .hud-left, .hud-right {
            pointer-events: auto;
        }

        .hud-panel {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .level-badge {
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.05);
        }

        .easy-badge { background: rgba(46, 204, 113, 0.15); color: #27ae60; }
        .medium-badge { background: rgba(52, 152, 219, 0.15); color: #2980b9; }
        .hard-badge { background: rgba(155, 89, 182, 0.15); color: #8e44ad; }
        .expert-badge { background: rgba(230, 126, 34, 0.15); color: #d35400; }
        .legendary-badge { background: rgba(241, 196, 15, 0.15); color: #d68910; }

        .hud-stats {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555c70;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: #1a1a24;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            color: #1a1a24;
        }

        .btn-back:hover {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.15);
            transform: translateX(-4px);
        }

        /* Toast Notifications / Message Panel */
        #game-notifications {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .notification-toast {
            padding: 12px 24px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 1rem;
            border-radius: 30px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
            animation: slideUpFade 1.6s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1a1a24;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px); }
            12% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* Match Glow Rings VFX helper class */
        .ring-count-glow {
            text-shadow: 0 0 10px rgba(170, 140, 44, 0.4);
            color: #aa8c2c;
            transform: scale(1.15);
            transition: transform 0.1s ease;
        }

        /* Loading Overlay Style */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #090a15;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .header-area h1 {
                font-size: 2rem;
            }
            .carousel-outer {
                padding: 10px 0;
            }
            .carousel-viewport {
                width: calc(100% - 60px);
                gap: 15px;
            }
            .carousel-card {
                flex: 0 0 240px;
                height: 340px;
                padding: 20px 15px;
            }
            .arrow-btn {
                width: 40px;
                height: 40px;
            }
            #hud-container {
                flex-direction: column;
                gap: 10px;
                align-items: center;
                top: 10px;
                padding: 0 10px;
            }
            .hud-panel {
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Load Progress Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; color: #8c95b3;">Calibrating Studio Environment...</p>
    </div>

    <!-- WebGL Rendering Space -->
    <div id="webgl-container"></div>

    <!-- MAIN MENU (Screen 1) -->
    <div id="menu-screen" class="ui-screen active">
        <div class="header-area">
            <h1>3D Platonic Matcher</h1>
            <p>Harmonize the Geometry. Collect the Satellites.</p>
        </div>

        <div class="carousel-outer">
            <button class="arrow-btn" id="prev-btn" style="margin-right: 10px;">&#9664;</button>
            <div class="carousel-viewport" id="level-carousel">
                <!-- Cards injected programmatically -->
            </div>
            <button class="arrow-btn" id="next-btn" style="margin-left: 10px;">&#9654;</button>
        </div>
    </div>

    <!-- IN-GAME INTERACTIVE HUD (Screen 2) -->
    <div id="hud-screen" class="ui-screen hidden">
        <div id="hud-container">
            <div class="hud-left">
                <button class="glass-panel btn-back" id="back-to-menu-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Leave Level
                </button>
            </div>
            
            <div class="hud-right">
                <div class="glass-panel hud-panel">
                    <span id="hud-level-tier" class="level-badge">Easy</span>
                    <div class="hud-stats">
                        <div class="stat-box">
                            <span class="stat-label">Grid Layout</span>
                            <span id="hud-grid-dim" class="stat-value">5x5</span>
                        </div>
                        <div style="width: 1px; height: 30px; background: rgba(255,255,255,0.15);"></div>
                        <div class="stat-box">
                            <span class="stat-label">Torus Targets</span>
                            <span id="hud-ring-ratio" class="stat-value">0 / 10</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Alert Area -->
    <div id="game-notifications"></div>

    <!-- CDN Imports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        // CONFIG & LEVEL SPECS
        const LEVELS_DATA = [
            { id: 1, name: "Novice Array", size: 5, target: 10, chance: 0.35, difficulty: "easy" },
            { id: 2, name: "Vector Matrix", size: 7, target: 15, chance: 0.30, difficulty: "medium" },
            { id: 3, name: "Hyper Lattice", size: 9, target: 25, chance: 0.25, difficulty: "hard" },
            { id: 4, name: "Platonic Nexus", size: 11, target: 35, chance: 0.20, difficulty: "expert" },
            { id: 5, name: "Cosmic Core", size: 13, target: 50, chance: 0.15, difficulty: "legendary" }
        ];

        // SHAPE DICTIONARY - Exactly matched to the visual palette
        const SHAPE_SPECS = [
            { type: 0, color: 0xd84343, name: "Tetrahedron" }, // Matte Red
            { type: 1, color: 0x6bc96b, name: "Cube" },        // Pastel Green
            { type: 2, color: 0x3b4cd4, name: "Octahedron" },  // Royal Blue
            { type: 3, color: 0xdad283, name: "Dodecahedron"},// Pale Beige Yellow
            { type: 4, color: 0xd05ad0, name: "Icosahedron" }, // Violet Purple
            { type: 5, color: 0xe5e5e5, name: "Sphere" }       // Porcelain White
        ];

        // ============================================================
        //  LOW-POLY SPACE BACKGROUND
        //  Faceted nebula asteroid fields, sparkle starfield, a ringed
        //  gas giant, low-poly ship traffic and a drifting satellite.
        //  Palette + silhouettes tuned to the reference art board.
        // ============================================================
        class SpaceBackground {
            constructor(scene) {
                this.scene = scene;
                this.group = new THREE.Group();
                this.group.name = "SpaceBackground";
                this.scene.add(this.group);

                this.stars = [];
                this.clouds = [];
                this.ships = [];
                this.glows = [];
                this.planet = null;
                this.satellite = null;

                // Shared procedural textures (built once)
                this.texGlow = this.makeGlowTexture();
                this.texGrid = this.makeGridTexture();
                this.texPanel = this.makePanelTexture();

                this.buildBackdrop();
                this.buildAtmosphere();
                this.buildStars();
                this.buildNebulaClouds();
                this.buildPlanet();
                this.buildShips();
                this.buildSatellite();
            }

            /* ---------- procedural textures ---------- */

            makeGlowTexture() {
                const c = document.createElement('canvas');
                c.width = c.height = 128;
                const ctx = c.getContext('2d');
                const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
                g.addColorStop(0.0, 'rgba(255,255,255,1)');
                g.addColorStop(0.22, 'rgba(255,255,255,0.55)');
                g.addColorStop(0.55, 'rgba(255,255,255,0.12)');
                g.addColorStop(1.0, 'rgba(255,255,255,0)');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, 128, 128);
                const tex = new THREE.CanvasTexture(c);
                return tex;
            }

            makeGridTexture() {
                const S = 1024;
                const c = document.createElement('canvas');
                c.width = c.height = S;
                const ctx = c.getContext('2d');
                ctx.clearRect(0, 0, S, S);

                // soft central glow gives the scene a luminous core like the ref
                const g = ctx.createRadialGradient(S * 0.5, S * 0.52, 0, S * 0.5, S * 0.52, S * 0.62);
                g.addColorStop(0.0, 'rgba(46,104,120,0.30)');
                g.addColorStop(0.45, 'rgba(24,52,82,0.12)');
                g.addColorStop(1.0, 'rgba(8,10,21,0)');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, S, S);

                // faint triangular tessellation
                ctx.strokeStyle = 'rgba(126,158,190,0.045)';
                ctx.lineWidth = 1;
                const step = 74;
                const h = step * Math.sqrt(3) / 2;
                for (let row = 0, y = 0; y <= S + h; y += h, row++) {
                    const xo = (row % 2) ? step / 2 : 0;
                    for (let x = -step; x <= S + step; x += step) {
                        ctx.beginPath();
                        ctx.moveTo(x + xo, y);
                        ctx.lineTo(x + xo + step / 2, y + h);
                        ctx.lineTo(x + xo - step / 2, y + h);
                        ctx.closePath();
                        ctx.stroke();
                    }
                }
                return new THREE.CanvasTexture(c);
            }

            makePanelTexture() {
                const W = 256, H = 128;
                const c = document.createElement('canvas');
                c.width = W; c.height = H;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#16224f';
                ctx.fillRect(0, 0, W, H);
                // cell grid
                ctx.strokeStyle = '#3a55a8';
                ctx.lineWidth = 3;
                const cols = 8, rows = 4;
                for (let i = 0; i <= cols; i++) {
                    const x = (i / cols) * W;
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
                }
                for (let j = 0; j <= rows; j++) {
                    const y = (j / rows) * H;
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
                }
                // subtle highlight glints on a few cells
                ctx.fillStyle = 'rgba(120,160,255,0.18)';
                for (let k = 0; k < 6; k++) {
                    const cx = Math.floor(Math.random() * cols) * (W / cols);
                    const cy = Math.floor(Math.random() * rows) * (H / rows);
                    ctx.fillRect(cx + 2, cy + 2, W / cols - 4, H / rows - 4);
                }
                return new THREE.CanvasTexture(c);
            }

            /* ---------- backdrop & atmosphere ---------- */

            buildBackdrop() {
                const geo = new THREE.PlaneGeometry(150, 95);
                const mat = new THREE.MeshBasicMaterial({
                    map: this.texGrid,
                    transparent: true,
                    depthWrite: false,
                    opacity: 0.9
                });
                const plane = new THREE.Mesh(geo, mat);
                plane.position.set(0, 0, -46);
                this.group.add(plane);
            }

            addGlowSprite(color, x, y, z, size, opacity) {
                const mat = new THREE.SpriteMaterial({
                    map: this.texGlow,
                    color: color,
                    transparent: true,
                    opacity: opacity,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                const s = new THREE.Sprite(mat);
                s.position.set(x, y, z);
                s.scale.set(size, size, 1);
                this.group.add(s);
                return s;
            }

            buildAtmosphere() {
                // cool nebula haze sitting behind the rock fields
                const core = this.addGlowSprite(0x3a6f9a, -2, 1, -34, 46, 0.40);
                const left = this.addGlowSprite(0x4a5786, -16, 7, -30, 30, 0.32);
                const right = this.addGlowSprite(0x3a738c, 17, -7, -30, 30, 0.30);
                this.glows.push(
                    { sprite: core, base: 0.40, speed: 0.0006, off: 0 },
                    { sprite: left, base: 0.32, speed: 0.0009, off: 2 },
                    { sprite: right, base: 0.30, speed: 0.0008, off: 4 }
                );
            }

            /* ---------- starfield ---------- */

            getRandomHemispherePoint(R) {
                const theta = Math.random() * Math.PI * 2;
                const cosPhi = -Math.random();
                const sinPhi = Math.sqrt(1 - cosPhi * cosPhi);
                return new THREE.Vector3(
                    R * sinPhi * Math.cos(theta),
                    R * sinPhi * Math.sin(theta),
                    R * cosPhi
                );
            }

            makeSparkleGeometry() {
                // four-pointed sparkle, concave sides
                const shape = new THREE.Shape();
                const outer = 1.0, inner = 0.16;
                for (let i = 0; i < 8; i++) {
                    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
                    const r = (i % 2 === 0) ? outer : inner;
                    const x = Math.cos(a) * r, y = Math.sin(a) * r;
                    if (i === 0) shape.moveTo(x, y); else shape.lineTo(x, y);
                }
                shape.closePath();
                const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.05, bevelEnabled: false });
                geo.center();
                return geo;
            }

            buildStars() {
                const camPos = new THREE.Vector3(0, 0, 15);

                // big four-pointed sparkles
                const sparkleGeo = this.makeSparkleGeometry();
                const sparkleMat = new THREE.MeshBasicMaterial({
                    color: 0xfff2cf, transparent: true, opacity: 0.9, side: THREE.DoubleSide
                });
                for (let i = 0; i < 34; i++) {
                    const star = new THREE.Mesh(sparkleGeo, sparkleMat.clone());
                    star.position.copy(this.getRandomHemispherePoint(30 + Math.random() * 4));
                    const s = 0.16 + Math.random() * 0.26;
                    star.scale.set(s, s, s);
                    star.lookAt(camPos);
                    star.rotation.z += (Math.random() - 0.5) * 0.4;
                    star.userData = {
                        base: s,
                        speed: 0.0012 + Math.random() * 0.0022,
                        off: Math.random() * Math.PI * 2,
                        sparkle: true
                    };
                    this.group.add(star);
                    this.stars.push(star);
                }

                // fine dust dots for density
                const dotGeo = new THREE.SphereGeometry(1, 6, 6);
                const dotMat = new THREE.MeshBasicMaterial({
                    color: 0xdfe7ff, transparent: true, opacity: 0.5
                });
                for (let i = 0; i < 130; i++) {
                    const dot = new THREE.Mesh(dotGeo, dotMat.clone());
                    dot.position.copy(this.getRandomHemispherePoint(27 + Math.random() * 7));
                    const s = 0.02 + Math.random() * 0.05;
                    dot.scale.set(s, s, s);
                    dot.material.opacity = 0.25 + Math.random() * 0.45;
                    dot.userData = {
                        base: dot.material.opacity,
                        speed: 0.001 + Math.random() * 0.003,
                        off: Math.random() * Math.PI * 2,
                        sparkle: false
                    };
                    this.group.add(dot);
                    this.stars.push(dot);
                }
            }

            /* ---------- nebula rock fields ---------- */

            // Build a single merged, vertex-coloured low-poly rock cluster.
            makeRockCluster(cfg) {
                const colTop = new THREE.Color(cfg.top);
                const colBot = new THREE.Color(cfg.bottom);
                const axis = new THREE.Vector3(cfg.axis ? cfg.axis[0] : 0.25,
                                               cfg.axis ? cfg.axis[1] : 1.0,
                                               0).normalize();
                const spread = cfg.spread;
                const count = cfg.count;

                const chunks = [];
                for (let i = 0; i < count; i++) {
                    const r = cfg.sizeMin + Math.random() * (cfg.sizeMax - cfg.sizeMin);
                    let geo;
                    const pick = Math.random();
                    // dodecahedrons read as rounded gas-cloud lumps (no sharp spikes)
                    if (pick < 0.7) geo = new THREE.DodecahedronGeometry(r, 0);
                    else if (pick < 0.9) geo = new THREE.DodecahedronGeometry(r, 1);
                    else geo = new THREE.IcosahedronGeometry(r, 1); // occasional rounder icosphere

                    if (geo.index !== null) geo = geo.toNonIndexed();

                    // gentle non-uniform squash for organic variety (faces stay rounded)
                    geo.scale(
                        0.82 + Math.random() * 0.36,
                        0.82 + Math.random() * 0.36,
                        0.82 + Math.random() * 0.36
                    );

                    // pack chunks tightly so the cluster reads as one cohesive cloud
                    const ox = (Math.random() - 0.5) * spread * 1.3;
                    const oy = (Math.random() - 0.5) * spread * 1.0;
                    const oz = (Math.random() - 0.5) * spread * 0.7;
                    geo.translate(ox, oy, oz);
                    chunks.push(geo);
                }

                // merge into flat arrays with per-facet gradient colouring
                const positions = [];
                const colors = [];
                const c = new THREE.Color();
                const denom = spread * 1.6;

                chunks.forEach(geo => {
                    const arr = geo.attributes.position.array;
                    for (let f = 0; f < arr.length; f += 9) {
                        const cx = (arr[f] + arr[f + 3] + arr[f + 6]) / 3;
                        const cy = (arr[f + 1] + arr[f + 4] + arr[f + 7]) / 3;
                        let t = (cx * axis.x + cy * axis.y) / denom + 0.5;
                        t = Math.max(0, Math.min(1, t));
                        c.copy(colBot).lerp(colTop, t);
                        // per-facet brightness variation so facets read even in flat light
                        const b = 0.86 + Math.random() * 0.30;
                        c.multiplyScalar(b);
                        for (let k = 0; k < 9; k++) positions.push(arr[f + k]);
                        for (let k = 0; k < 3; k++) colors.push(c.r, c.g, c.b);
                    }
                });

                const merged = new THREE.BufferGeometry();
                merged.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                merged.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                merged.computeVertexNormals();

                const mat = new THREE.MeshStandardMaterial({
                    vertexColors: true,
                    roughness: 0.95,
                    metalness: 0.0,
                    flatShading: true
                });

                const mesh = new THREE.Mesh(merged, mat);
                const cluster = new THREE.Group();
                cluster.add(mesh);
                return cluster;
            }

            buildNebulaClouds() {
                // cool blue-gray palette with gentle temperature variation
                const STEEL_HI   = 0x8593b0;  // light steel blue-gray
                const BLUEGRAY_HI= 0x6f86a8;  // mid blue-gray
                const SLATE_LO   = 0x3a4661;  // dark slate blue
                const INDIGO_GY  = 0x434f73;  // muted indigo-gray
                const TEAL_GY    = 0x5c8a98;  // muted blue-teal gray (hint of warmth)
                const VIOLET_GY  = 0x6c6a98;  // faint violet-gray (hint the other way)

                // hand-placed out on the left/right margins so the play grid
                // (always ~±5.5 around centre) stays clear; top/bottom centre is
                // left open because the grid fills the frame vertically.
                const configs = [
                    // LEFT — upper steel-gray mass
                    { x: -20, y: 5.5, z: -20, count: 12, spread: 3.2, sizeMin: 1.5, sizeMax: 2.7,
                      top: STEEL_HI, bottom: INDIGO_GY, axis: [-0.25, 1] },
                    // LEFT — lower blue-gray mass
                    { x: -20, y: -6.5, z: -19, count: 12, spread: 3.2, sizeMin: 1.4, sizeMax: 2.6,
                      top: BLUEGRAY_HI, bottom: SLATE_LO, axis: [0.2, 1] },
                    // RIGHT — upper violet-gray mass
                    { x: 20, y: 6.5, z: -21, count: 12, spread: 3.2, sizeMin: 1.4, sizeMax: 2.6,
                      top: VIOLET_GY, bottom: INDIGO_GY, axis: [0.3, 1] },
                    // RIGHT — lower big teal-gray mass
                    { x: 20.5, y: -5, z: -19, count: 14, spread: 3.6, sizeMin: 1.5, sizeMax: 2.8,
                      top: TEAL_GY, bottom: SLATE_LO, axis: [0.25, 1] },
                    // far side accents for depth (smaller, pushed further back/out)
                    { x: -23.5, y: 0, z: -25, count: 6, spread: 2.4, sizeMin: 1.0, sizeMax: 1.8,
                      top: INDIGO_GY, bottom: SLATE_LO, axis: [0.1, 1] },
                    { x: 23.5, y: 1, z: -25, count: 6, spread: 2.4, sizeMin: 1.0, sizeMax: 1.8,
                      top: TEAL_GY, bottom: BLUEGRAY_HI, axis: [0.1, 1] }
                ];

                configs.forEach(cfg => {
                    const cluster = this.makeRockCluster(cfg);
                    cluster.position.set(cfg.x, cfg.y, cfg.z);
                    cluster.rotation.set(
                        Math.random() * Math.PI,
                        Math.random() * Math.PI,
                        Math.random() * Math.PI
                    );
                    cluster.userData = {
                        rotSpeed: (Math.random() - 0.5) * 0.0006,
                        bobSpeed: 0.0003 + Math.random() * 0.0004,
                        bobAmp: 0.25 + Math.random() * 0.4,
                        baseY: cfg.y,
                        off: Math.random() * Math.PI * 2
                    };
                    this.group.add(cluster);
                    this.clouds.push(cluster);

                    // soft gaseous halo so the mass reads as glowing cloud, not bare rock
                    const hc = new THREE.Color(cfg.top).lerp(new THREE.Color(cfg.bottom), 0.5);
                    const halo = this.addGlowSprite(hc.getHex(), cfg.x, cfg.y, cfg.z - 4,
                                                    cfg.spread * 4.4, 0.20);
                    this.glows.push({
                        sprite: halo, base: 0.20,
                        speed: 0.0005 + Math.random() * 0.0005,
                        off: Math.random() * Math.PI * 2
                    });
                });
            }

            /* ---------- ringed gas giant ---------- */

            buildPlanet() {
                this.planet = new THREE.Group();
                // tucked into the top-right corner, well clear of the play grid
                this.planet.position.set(25, 13, -27);

                // body with soft latitudinal banding via vertex colours
                let bodyGeo = new THREE.IcosahedronGeometry(3.6, 2);
                if (bodyGeo.index !== null) bodyGeo = bodyGeo.toNonIndexed();
                const pos = bodyGeo.attributes.position;
                const cols = [];
                const cA = new THREE.Color(0xe7dcb4); // light cream
                const cB = new THREE.Color(0xc9b483); // tan band
                const tmp = new THREE.Color();
                for (let i = 0; i < pos.count; i += 3) {
                    const yAvg = (pos.getY(i) + pos.getY(i + 1) + pos.getY(i + 2)) / 3;
                    const band = 0.5 + 0.5 * Math.sin(yAvg * 2.1);
                    tmp.copy(cB).lerp(cA, band);
                    tmp.multiplyScalar(0.92 + Math.random() * 0.12);
                    for (let k = 0; k < 3; k++) cols.push(tmp.r, tmp.g, tmp.b);
                }
                bodyGeo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
                bodyGeo.computeVertexNormals();
                const bodyMat = new THREE.MeshStandardMaterial({
                    vertexColors: true, roughness: 0.85, metalness: 0.05, flatShading: true
                });
                this.planet.add(new THREE.Mesh(bodyGeo, bodyMat));

                // two-tone ring with a thin gap
                const ringMatInner = new THREE.MeshStandardMaterial({
                    color: 0xd8cb9c, roughness: 0.9, metalness: 0.05,
                    side: THREE.DoubleSide, flatShading: true
                });
                const ringMatOuter = new THREE.MeshStandardMaterial({
                    color: 0xbfb084, roughness: 0.95, metalness: 0.05,
                    side: THREE.DoubleSide, flatShading: true
                });
                const ringInner = new THREE.RingGeometry(4.5, 5.9, 48);
                ringInner.rotateX(Math.PI / 2);
                this.planet.add(new THREE.Mesh(ringInner, ringMatInner));
                const ringOuter = new THREE.RingGeometry(6.2, 7.9, 48);
                ringOuter.rotateX(Math.PI / 2);
                this.planet.add(new THREE.Mesh(ringOuter, ringMatOuter));

                this.planet.rotation.x = 0.42;
                this.planet.rotation.z = -0.28;
                this.planet.scale.setScalar(0.92);
                this.group.add(this.planet);
            }

            /* ---------- low-poly ship traffic ---------- */

            makeShip(hullColor, accentColor) {
                const ship = new THREE.Group();
                const hullMat = new THREE.MeshStandardMaterial({ color: hullColor, roughness: 0.55, metalness: 0.1, flatShading: true });
                const accMat = new THREE.MeshStandardMaterial({ color: accentColor, roughness: 0.5, metalness: 0.15, flatShading: true });
                const glassMat = new THREE.MeshStandardMaterial({ color: 0x1b2a66, roughness: 0.2, metalness: 0.3, flatShading: true, emissive: 0x101d4d, emissiveIntensity: 0.5 });

                // nose cone (points +x = forward)
                const nose = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.7, 8), hullMat);
                nose.rotation.z = -Math.PI / 2;
                nose.position.x = 0.5;
                ship.add(nose);

                // main fuselage
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.2, 0.7, 8), hullMat);
                body.rotation.z = Math.PI / 2;
                ship.add(body);

                // tail taper
                const tail = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.35, 8), hullMat);
                tail.rotation.z = Math.PI / 2;
                tail.position.x = -0.5;
                ship.add(tail);

                // cockpit canopy
                const canopy = new THREE.Mesh(new THREE.SphereGeometry(0.17, 12, 8), glassMat);
                canopy.scale.set(1.1, 0.6, 0.85);
                canopy.position.set(0.12, 0.14, 0);
                ship.add(canopy);

                // delta wings (swept)
                const wing = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.04, 1.25), accMat);
                wing.position.set(-0.08, -0.02, 0);
                wing.rotation.y = 0.32;
                ship.add(wing);

                // wing-tip accents
                const tipGeo = new THREE.BoxGeometry(0.16, 0.06, 0.18);
                const tipL = new THREE.Mesh(tipGeo, hullMat);
                tipL.position.set(-0.34, 0, 0.62);
                ship.add(tipL);
                const tipR = new THREE.Mesh(tipGeo, hullMat);
                tipR.position.set(-0.34, 0, -0.62);
                ship.add(tipR);

                // vertical stabiliser
                const fin = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.28, 0.04), accMat);
                fin.position.set(-0.42, 0.16, 0);
                fin.rotation.z = 0.3;
                ship.add(fin);

                // engine nozzle + glow
                const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.16, 0.16, 8), accMat);
                nozzle.rotation.z = Math.PI / 2;
                nozzle.position.x = -0.7;
                ship.add(nozzle);

                const glowMat = new THREE.SpriteMaterial({
                    map: this.texGlow, color: 0x6fd8ff, transparent: true,
                    opacity: 0.85, blending: THREE.AdditiveBlending, depthWrite: false
                });
                const glow = new THREE.Sprite(glowMat);
                glow.scale.set(0.7, 0.7, 1);
                glow.position.set(-0.85, 0, 0);
                ship.add(glow);
                ship.userData.glow = glow;

                return ship;
            }

            buildShips() {
                const palettes = [
                    { hull: 0xe9e9ee, accent: 0x3b4cd4 },  // white / royal blue
                    { hull: 0xe7eeec, accent: 0x2aa39a },  // white / teal
                    { hull: 0xeae6f0, accent: 0x6a5ad0 }   // white / violet
                ];

                for (let i = 0; i < 3; i++) {
                    const pal = palettes[i % palettes.length];
                    const model = this.makeShip(pal.hull, pal.accent);
                    // present a top-3/4 view toward the camera; nose stays +x so it
                    // can be aimed along the travel heading by the carrier
                    model.rotation.x = 1.3;
                    model.rotation.y = (Math.random() - 0.5) * 0.3; // slight bank variety

                    const carrier = new THREE.Group();
                    carrier.add(model);
                    carrier.position.z = -10 - Math.random() * 5;
                    carrier.scale.setScalar(1.0 + Math.random() * 0.3);
                    carrier.userData = {
                        glow: model.userData.glow,
                        speed: 0.04 + Math.random() * 0.05,
                        heading: 0,
                        curve: (Math.random() - 0.5) * 0.0007,
                        off: Math.random() * Math.PI * 2
                    };

                    this.spawnShip(carrier, true);
                    this.group.add(carrier);
                    this.ships.push(carrier);
                }
            }

            // place a ship on an elliptical ring around the scene, aimed across the
            // frame at a random heading; on initial spawn, start partway along.
            spawnShip(carrier, initial) {
                const RX = 30, RY = 18;
                const a = Math.random() * Math.PI * 2;
                let sx = Math.cos(a) * RX;
                let sy = Math.sin(a) * RY;

                const tx = (Math.random() - 0.5) * 14;
                const ty = (Math.random() - 0.5) * 10;
                const h = Math.atan2(ty - sy, tx - sx);

                carrier.userData.heading = h;
                carrier.userData.curve = (Math.random() - 0.5) * 0.0007;
                carrier.userData.speed = 0.04 + Math.random() * 0.05;
                carrier.rotation.z = h;

                if (initial) {
                    const t = Math.random() * 0.7;
                    sx += Math.cos(h) * RX * t;
                    sy += Math.sin(h) * RY * t;
                }
                carrier.position.x = sx;
                carrier.position.y = sy;
            }

            /* ---------- drifting satellite ---------- */

            buildSatellite() {
                const sat = new THREE.Group();
                const goldMat = new THREE.MeshStandardMaterial({ color: 0xcaa94e, roughness: 0.6, metalness: 0.35, flatShading: true });
                const foilMat = new THREE.MeshStandardMaterial({ color: 0xb9a25a, roughness: 0.4, metalness: 0.5, flatShading: true });
                const greyMat = new THREE.MeshStandardMaterial({ color: 0xb6bcc7, roughness: 0.5, metalness: 0.4, flatShading: true, side: THREE.DoubleSide });
                const panelMat = new THREE.MeshStandardMaterial({
                    map: this.texPanel, roughness: 0.35, metalness: 0.45, flatShading: true,
                    emissive: 0x1a2b66, emissiveIntensity: 0.35
                });

                // central bus (octagonal)
                const bus = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.55, 8), foilMat);
                bus.rotation.z = Math.PI / 2;
                sat.add(bus);

                // booms + solar wings
                for (const side of [-1, 1]) {
                    const boom = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5, 6), greyMat);
                    boom.rotation.x = Math.PI / 2;
                    boom.position.set(0, 0, side * 0.55);
                    sat.add(boom);

                    const panel = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.03, 1.0), panelMat);
                    panel.position.set(0, 0, side * 1.3);
                    sat.add(panel);
                }

                // dish antenna on a mast
                const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.4, 6), greyMat);
                mast.position.set(0, 0.4, 0);
                sat.add(mast);
                const dish = new THREE.Mesh(new THREE.ConeGeometry(0.26, 0.18, 14, 1, true), greyMat);
                dish.position.set(0, 0.62, 0.05);
                dish.rotation.x = -0.5;
                sat.add(dish);
                const feed = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), goldMat);
                feed.position.set(0, 0.74, 0.18);
                sat.add(feed);

                // a couple of antennae
                const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.5, 4), greyMat);
                antenna.position.set(0.3, -0.3, 0);
                antenna.rotation.z = 0.5;
                sat.add(antenna);

                sat.position.set(-10.5, -1.5, -15);
                sat.scale.setScalar(1.3);
                sat.userData = {
                    spinX: 0.0011, spinY: 0.0016,
                    baseX: -10.5, baseY: -1.5,
                    driftSpeed: 0.00022, off: Math.random() * Math.PI * 2
                };
                this.satellite = sat;
                this.group.add(sat);
            }

            /* ---------- per-frame animation ---------- */

            update(time) {
                // twinkle
                this.stars.forEach(star => {
                    const u = star.userData;
                    const tw = Math.sin(time * u.speed + u.off);
                    if (u.sparkle) {
                        const s = u.base * (0.82 + (tw + 1) * 0.14);
                        star.scale.set(s, s, s);
                        star.material.opacity = 0.55 + (tw + 1) * 0.22;
                    } else {
                        star.material.opacity = Math.max(0.1, u.base * (0.6 + (tw + 1) * 0.35));
                    }
                });

                // breathing nebula haze
                this.glows.forEach(g => {
                    g.sprite.material.opacity = g.base * (0.78 + 0.22 * Math.sin(time * g.speed + g.off));
                });

                // gas giant slow spin
                if (this.planet) this.planet.rotation.y += 0.0014;

                // rock fields: slow tumble + gentle bob
                this.clouds.forEach(cl => {
                    const u = cl.userData;
                    cl.rotation.y += u.rotSpeed;
                    cl.rotation.z += u.rotSpeed * 0.5;
                    cl.position.y = u.baseY + Math.sin(time * u.bobSpeed + u.off) * u.bobAmp;
                });

                // ship traffic — each flies along its own heading, gently curving,
                // and respawns from a new direction when it leaves the scene
                this.ships.forEach(carrier => {
                    const u = carrier.userData;
                    u.heading += u.curve;
                    carrier.rotation.z = u.heading;
                    carrier.position.x += Math.cos(u.heading) * u.speed;
                    carrier.position.y += Math.sin(u.heading) * u.speed;

                    if (u.glow) {
                        const pulse = 0.6 + 0.4 * Math.abs(Math.sin(time * 0.012 + u.off));
                        u.glow.scale.set(0.55 + pulse * 0.4, 0.55 + pulse * 0.4, 1);
                        u.glow.material.opacity = 0.5 + pulse * 0.4;
                    }

                    const px = carrier.position.x, py = carrier.position.y;
                    if (px < -34 || px > 34 || py < -22 || py > 22) {
                        this.spawnShip(carrier, false);
                    }
                });

                // satellite tumble + drift
                if (this.satellite) {
                    const u = this.satellite.userData;
                    this.satellite.rotation.x += u.spinX;
                    this.satellite.rotation.y += u.spinY;
                    this.satellite.position.x = u.baseX + Math.sin(time * u.driftSpeed + u.off) * 1.2;
                    this.satellite.position.y = u.baseY + Math.cos(time * u.driftSpeed * 0.8 + u.off) * 0.8;
                }
            }
        }

        class Engine {
            constructor() {
                this.container = document.getElementById('webgl-container');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                
                this.camera.position.set(0, 0, 15);
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.container.appendChild(this.renderer.domElement);

                this.setupLights();
                this.spaceBg = new SpaceBackground(this.scene);
                this.setupResizeHandler();
                this.animate();
            }

            setupLights() {
                this.ambientLight = new THREE.AmbientLight(0xffffff, 0.75); // Softened ambient light
                this.scene.add(this.ambientLight);

                this.dirLight1 = new THREE.DirectionalLight(0xffffff, 0.9);
                this.dirLight1.position.set(6, 12, 10);
                this.scene.add(this.dirLight1);

                this.dirLight2 = new THREE.DirectionalLight(0xecf3ff, 0.35);
                this.dirLight2.position.set(-6, -6, 5);
                this.scene.add(this.dirLight2);
            }

            setupResizeHandler() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                TWEEN.update();
                
                const time = performance.now();
                if (this.spaceBg) {
                    this.spaceBg.update(time);
                }

                this.scene.traverse((obj) => {
                    if (obj.userData && obj.userData.isRotatable) {
                        obj.rotation.z += 0.02;
                    }
                    if (obj.userData && obj.userData.isSlowIdle) {
                        obj.rotation.x += 0.005;
                        obj.rotation.y += 0.008;
                    }
                });

                this.renderer.render(this.scene, this.camera);
            }
        }

        class Tile {
            constructor(row, col, shapeType, spacing, hasRing, totalSize) {
                this.row = row;
                this.col = col;
                this.shapeType = shapeType;
                this.spacing = spacing;
                this.hasRing = hasRing;
                this.totalSize = totalSize;

                this.group = new THREE.Group();
                this.group.name = `Tile_${row}_${col}`;

                this.calcVisualPosition();
                this.group.position.set(this.targetX, this.targetY, 0);

                this.mesh = null;
                this.ring = null;
                
                this.buildShapes();
            }

            calcVisualPosition() {
                this.targetX = (this.col - (this.totalSize - 1) / 2) * this.spacing;
                this.targetY = ((this.totalSize - 1) / 2 - this.row) * this.spacing;
            }

            buildShapes() {
                const spec = SHAPE_SPECS[this.shapeType];
                
                const material = new THREE.MeshStandardMaterial({
                    color: spec.color,
                    metalness: 0.15,
                    roughness: 0.25,
                    flatShading: (spec.type !== 5)
                });

                let geometry;
                const baseScale = this.spacing * 0.38;

                switch (spec.type) {
                    case 0:
                        geometry = new THREE.TetrahedronGeometry(baseScale);
                        break;
                    case 1:
                        geometry = new THREE.BoxGeometry(baseScale * 1.5, baseScale * 1.5, baseScale * 1.5);
                        break;
                    case 2:
                        geometry = new THREE.OctahedronGeometry(baseScale * 1.1);
                        break;
                    case 3:
                        geometry = new THREE.DodecahedronGeometry(baseScale * 1.15);
                        break;
                    case 4:
                        geometry = new THREE.IcosahedronGeometry(baseScale * 1.2);
                        break;
                    case 5:
                    default:
                        geometry = new THREE.SphereGeometry(baseScale * 1.1, 32, 32);
                        break;
                }

                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.userData = { parentTile: this, isSlowIdle: true };
                this.group.add(this.mesh);

                if (this.hasRing) {
                    // Create a tilted local container for the satellites
                    this.ring = new THREE.Group();
                    this.ring.name = "SatelliteOrbitGroup";
                    this.ring.rotation.x = Math.PI / 4;
                    this.ring.rotation.y = Math.PI / 8;
                    this.ring.userData = { isRotatable: true };

                    // Satellites match the geometry and basic color of the central shape
                    const satelliteMat = new THREE.MeshStandardMaterial({
                        color: spec.color,
                        metalness: 0.15,
                        roughness: 0.25,
                        transparent: true,
                        flatShading: (spec.type !== 5)
                    });

                    // Define dynamically tighter binding radii based on geometry dimensions
                    let orbitRadius = baseScale * 1.22;
                    if (spec.type === 1) orbitRadius = baseScale * 1.5; // Cube needs a wider path to clear vertices
                    if (spec.type === 3) orbitRadius = baseScale * 1.32; // Dodecahedron
                    if (spec.type === 4) orbitRadius = baseScale * 1.35; // Icosahedron

                    const numSatellites = 7;
                    const satScale = 0.20;

                    for (let i = 0; i < numSatellites; i++) {
                        const angle = (i / numSatellites) * Math.PI * 2;
                        const moon = new THREE.Mesh(geometry, satelliteMat);
                        moon.scale.set(satScale, satScale, satScale);
                        
                        // Distribute evenly in the orbital plane
                        moon.position.set(Math.cos(angle) * orbitRadius, Math.sin(angle) * orbitRadius, 0);
                        moon.userData = { isSlowIdle: true };
                        this.ring.add(moon);
                    }
                    
                    this.group.add(this.ring);
                }
            }

            setSelected(isSelected) {
                this.scaleTo(isSelected ? 1.2 : 1.0, 150);
            }

            scaleTo(scale, duration = 200) {
                new TWEEN.Tween(this.group.scale)
                    .to({ x: scale, y: scale, z: scale }, duration)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            }

            moveTo(r, c, duration = 300) {
                this.row = r;
                this.col = c;
                this.calcVisualPosition();
                this.group.name = `Tile_${r}_${c}`;

                new TWEEN.Tween(this.group.position)
                    .to({ x: this.targetX, y: this.targetY, z: 0 }, duration)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            }

            destroy(onComplete) {
                if (this.ring) {
                    new TWEEN.Tween(this.ring.scale)
                        .to({ x: 2.2, y: 2.2, z: 2.2 }, 350)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .start();
                    this.ring.traverse((child) => {
                        if (child.isMesh && child.material) {
                            child.material.transparent = true;
                            new TWEEN.Tween(child.material)
                                .to({ opacity: 0 }, 350)
                                .start();
                        }
                    });
                }

                new TWEEN.Tween(this.group.scale)
                    .to({ x: 0, y: 0, z: 0 }, 400)
                    .easing(TWEEN.Easing.Back.In)
                    .onComplete(() => {
                        this.group.traverse((child) => {
                            if (child.isMesh) {
                                if (child.geometry) child.geometry.dispose();
                                if (child.material) {
                                    if (Array.isArray(child.material)) {
                                        child.material.forEach(m => m.dispose());
                                    } else {
                                        child.material.dispose();
                                    }
                                }
                            }
                        });
                        if (onComplete) onComplete();
                    })
                    .start();
            }
        }

        // GRID & GAMEPLAY MANAGEMENT
        class Board {
            constructor(engine, level, onRingsCollected, onStateReset) {
                this.engine = engine;
                this.level = level;
                this.onRingsCollected = onRingsCollected;
                this.onStateReset = onStateReset;

                this.size = level.size;
                this.grid = [];
                this.gridSpacing = 11.0 / this.size;

                this.selectedTile = null;
                this.interactionLocked = false;
                this.activeTimeouts = [];

                this.setupInteraction();
                this.initializeBoard();
            }

            schedule(callback, delay) {
                const id = setTimeout(callback, delay);
                this.activeTimeouts.push(id);
                return id;
            }

            clearAllTimeouts() {
                this.activeTimeouts.forEach(id => clearTimeout(id));
                this.activeTimeouts = [];
            }

            clearAllSceneTiles() {
                TWEEN.removeAll();
                const toRemove = [];
                this.engine.scene.traverse((obj) => {
                    if (obj instanceof THREE.Group && obj.name && obj.name.startsWith('Tile_')) {
                        toRemove.push(obj);
                    }
                });
                toRemove.forEach((tileGroup) => {
                    this.engine.scene.remove(tileGroup);
                    tileGroup.traverse((child) => {
                        if (child.isMesh) {
                            if (child.geometry) child.geometry.dispose();
                            if (child.material) {
                                if (Array.isArray(child.material)) {
                                    child.material.forEach(m => m.dispose());
                                } else {
                                    child.material.dispose();
                                }
                            }
                        }
                    });
                });
            }

            initializeBoard() {
                this.clearAllTimeouts();
                this.clearGridVisuals();

                for (let r = 0; r < this.size; r++) {
                    this.grid[r] = [];
                    for (let c = 0; c < this.size; c++) {
                        let attempts = 0;
                        let type = 0;
                        do {
                            type = Math.floor(Math.random() * SHAPE_SPECS.length);
                            attempts++;
                        } while (this.wouldFormInitialMatch(r, c, type) && attempts < 50);

                        const rollRing = Math.random() < this.level.chance;
                        const tile = new Tile(r, c, type, this.gridSpacing, rollRing, this.size);
                        
                        this.grid[r][c] = tile;
                        this.engine.scene.add(tile.group);
                        
                        tile.group.scale.set(0, 0, 0);
                        this.schedule(() => {
                            if (!this.grid || this.grid.length === 0) return;
                            tile.scaleTo(1.0, 400);
                        }, (r + c) * 35);
                    }
                }

                this.schedule(() => {
                    if (!this.grid || this.grid.length === 0) return;
                    if (!this.hasValidMoves()) {
                        this.initializeBoard();
                    }
                }, (this.size * 2) * 35 + 450);
            }

            wouldFormInitialMatch(row, col, type) {
                if (col >= 2) {
                    if (this.grid[row][col-1] && this.grid[row][col-1].shapeType === type &&
                        this.grid[row][col-2] && this.grid[row][col-2].shapeType === type) {
                        return true;
                    }
                }
                if (row >= 2) {
                    if (this.grid[row-1] && this.grid[row-1][col] && this.grid[row-1][col].shapeType === type &&
                        this.grid[row-2] && this.grid[row-2][col] && this.grid[row-2][col].shapeType === type) {
                        return true;
                    }
                }
                return false;
            }

            setupInteraction() {
                this.raycaster = new THREE.Raycaster();
                this.pointer = new THREE.Vector2();

                this.onPointerDown = (event) => {
                    if (this.interactionLocked) return;

                    const clientX = event.touches ? event.touches[0].clientX : event.clientX;
                    const clientY = event.touches ? event.touches[0].clientY : event.clientY;

                    this.pointer.x = (clientX / window.innerWidth) * 2 - 1;
                    this.pointer.y = -(clientY / window.innerHeight) * 2 + 1;

                    this.raycaster.setFromCamera(this.pointer, this.engine.camera);
                    const intersects = this.raycaster.intersectObjects(this.engine.scene.children, true);

                    for (let hit of intersects) {
                        let item = hit.object;
                        while (item && !item.userData.parentTile) {
                            item = item.parent;
                        }
                        if (item && item.userData.parentTile) {
                            this.handleSelection(item.userData.parentTile);
                            break;
                        }
                    }
                };

                window.addEventListener('mousedown', this.onPointerDown);
                window.addEventListener('touchstart', this.onPointerDown);
            }

            handleSelection(tile) {
                if (!tile || tile.row < 0 || tile.row >= this.size || tile.col < 0 || tile.col >= this.size) {
                    return;
                }
                if (this.grid[tile.row][tile.col] !== tile) {
                    return; // Prevent interactions with stale, out-of-bounds tiles
                }

                if (!this.selectedTile) {
                    this.selectedTile = tile;
                    tile.setSelected(true);
                } else {
                    if (this.selectedTile === tile) {
                        tile.setSelected(false);
                        this.selectedTile = null;
                        return;
                    }

                    const prevTile = this.selectedTile;
                    if (prevTile.row < 0 || prevTile.row >= this.size || prevTile.col < 0 || prevTile.col >= this.size ||
                        this.grid[prevTile.row][prevTile.col] !== prevTile) {
                        prevTile.setSelected(false);
                        this.selectedTile = tile;
                        tile.setSelected(true);
                        return;
                    }

                    const dRow = Math.abs(prevTile.row - tile.row);
                    const dCol = Math.abs(prevTile.col - tile.col);
                    const isAdjacent = (dRow + dCol === 1);

                    if (isAdjacent) {
                        this.executeSwap(prevTile, tile);
                    } else {
                        prevTile.setSelected(false);
                        this.selectedTile = tile;
                        tile.setSelected(true);
                    }
                }
            }

            executeSwap(t1, t2) {
                this.interactionLocked = true;
                
                t1.setSelected(false);
                t2.setSelected(false);
                this.selectedTile = null;

                const r1 = t1.row, c1 = t1.col;
                const r2 = t2.row, c2 = t2.col;

                t1.moveTo(r2, c2, 300);
                t2.moveTo(r1, c1, 300);

                this.grid[r1][c1] = t2;
                this.grid[r2][c2] = t1;

                this.schedule(() => {
                    if (!this.grid || this.grid.length === 0) return;
                    const matches = this.scanForMatches();
                    if (matches.size > 0) {
                        this.resolveMatches(matches);
                    } else {
                        // Revert Swap
                        t1.moveTo(r1, c1, 250);
                        t2.moveTo(r2, c2, 250);
                        this.grid[r1][c1] = t1;
                        this.grid[r2][c2] = t2;
                        
                        this.schedule(() => {
                            this.interactionLocked = false;
                        }, 260);
                    }
                }, 310);
            }

            scanForMatches() {
                const matchedSet = new Set();

                // Horizontal
                for (let r = 0; r < this.size; r++) {
                    let col = 0;
                    while (col < this.size) {
                        const currentTile = this.grid[r][col];
                        if (!currentTile) {
                            col++;
                            continue;
                        }
                        
                        let chainLength = 1;
                        let nextCol = col + 1;
                        while (nextCol < this.size && this.grid[r][nextCol] && this.grid[r][nextCol].shapeType === currentTile.shapeType) {
                            chainLength++;
                            nextCol++;
                        }

                        if (chainLength >= 3) {
                            for (let matchC = col; matchC < nextCol; matchC++) {
                                matchedSet.add(`${r},${matchC}`);
                            }
                        }
                        col = nextCol;
                    }
                }

                // Vertical
                for (let c = 0; c < this.size; c++) {
                    let row = 0;
                    while (row < this.size) {
                        const currentTile = this.grid[row][c];
                        if (!currentTile) {
                            row++;
                            continue;
                        }

                        let chainLength = 1;
                        let nextRow = row + 1;
                        while (nextRow < this.size && this.grid[nextRow] && this.grid[nextRow][c] && this.grid[nextRow][c].shapeType === currentTile.shapeType) {
                            chainLength++;
                            nextRow++;
                        }

                        if (chainLength >= 3) {
                            for (let matchR = row; matchR < nextRow; matchR++) {
                                matchedSet.add(`${matchR},${c}`);
                            }
                        }
                        row = nextRow;
                    }
                }

                return matchedSet;
            }

            resolveMatches(matches) {
                let ringsFound = 0;

                matches.forEach(coord => {
                    const [r, c] = coord.split(',').map(Number);
                    const tile = this.grid[r][c];
                    if (tile) {
                        if (tile.hasRing) ringsFound++;
                        tile.destroy(() => {
                            this.engine.scene.remove(tile.group);
                        });
                        this.grid[r][c] = null;
                    }
                });

                if (ringsFound > 0) {
                    this.onRingsCollected(ringsFound);
                }

                // If grid was reset or exited due to ring requirements met, do not schedule drops
                if (!this.grid || this.grid.length === 0) {
                    return;
                }

                this.schedule(() => {
                    this.executeCappingAndDrops();
                }, 410);
            }

            executeCappingAndDrops() {
                if (!this.grid || this.grid.length === 0) return;

                const dropsByCol = Array(this.size).fill(0);

                for (let c = 0; c < this.size; c++) {
                    let writeIndex = this.size - 1;
                    for (let r = this.size - 1; r >= 0; r--) {
                        if (this.grid[r] && this.grid[r][c] !== null) {
                            if (writeIndex !== r) {
                                const tile = this.grid[r][c];
                                this.grid[writeIndex][c] = tile;
                                this.grid[r][c] = null;
                                tile.moveTo(writeIndex, c, 350);
                            }
                            writeIndex--;
                        }
                    }
                    dropsByCol[c] = writeIndex + 1;
                }

                let maxRefillDelay = 0;
                for (let c = 0; c < this.size; c++) {
                    const spacesNeeded = dropsByCol[c];
                    for (let r = spacesNeeded - 1; r >= 0; r--) {
                        const type = Math.floor(Math.random() * SHAPE_SPECS.length);
                        const rollRing = Math.random() < this.level.chance;
                        
                        const tile = new Tile(r, c, type, this.gridSpacing, rollRing, this.size);
                        this.grid[r][c] = tile;
                        this.engine.scene.add(tile.group);

                        const startY = ((this.size - 1) / 2 + 3) * this.gridSpacing;
                        tile.group.position.set(tile.targetX, startY, 0);
                        tile.group.scale.set(0, 0, 0);

                        const dropDelay = (spacesNeeded - 1 - r) * 60 + c * 40;
                        maxRefillDelay = Math.max(maxRefillDelay, dropDelay);

                        this.schedule(() => {
                            if (!this.grid || this.grid.length === 0) return;
                            tile.scaleTo(1.0, 200);
                            new TWEEN.Tween(tile.group.position)
                                .to({ x: tile.targetX, y: tile.targetY, z: 0 }, 450)
                                .easing(TWEEN.Easing.Back.Out)
                                .start();
                        }, dropDelay);
                    }
                }

                this.schedule(() => {
                    if (!this.grid || this.grid.length === 0) return;
                    const recursiveMatches = this.scanForMatches();
                    if (recursiveMatches.size > 0) {
                        this.resolveMatches(recursiveMatches);
                    } else {
                        this.interactionLocked = false;
                        
                        if (!this.hasValidMoves()) {
                            this.handleNoMoreMoves();
                        }
                    }
                }, maxRefillDelay + 500);
            }

            hasValidMoves() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (c + 1 < this.size) {
                            if (this.checkHypotheticalSwap(r, c, r, c + 1)) {
                                return true;
                            }
                        }
                        if (r + 1 < this.size) {
                            if (this.checkHypotheticalSwap(r, c, r + 1, c)) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            checkHypotheticalSwap(r1, c1, r2, c2) {
                const t1 = this.grid[r1][c1];
                const t2 = this.grid[r2][c2];
                if (!t1 || !t2) return false;

                this.grid[r1][c1] = t2;
                this.grid[r2][c2] = t1;

                const matches = this.scanForMatches();

                this.grid[r1][c1] = t1;
                this.grid[r2][c2] = t2;

                return matches.size > 0;
            }

            handleNoMoreMoves() {
                this.interactionLocked = true;
                if (typeof window.dispatchNoMovesToast === 'function') {
                    window.dispatchNoMovesToast();
                }
                
                this.schedule(() => {
                    if (!this.grid || this.grid.length === 0) return;
                    this.runSlotMachineReset(true);
                }, 1600);
            }

            runSlotMachineReset(isNoMovesReset = false) {
                this.interactionLocked = true;
                this.clearAllTimeouts();
                TWEEN.removeAll(); // Halt conflicting animations to prevent visual lockups

                // 1. Gather all active tile containers currently rendering in the scene
                const tilesInScene = [];
                this.engine.scene.traverse((obj) => {
                    if (obj instanceof THREE.Group && obj.name && obj.name.startsWith('Tile_')) {
                        tilesInScene.push(obj);
                    }
                });

                // 2. Animate all remaining elements downward and dispose of them
                tilesInScene.forEach((group) => {
                    const parts = group.name.split('_');
                    const col = parts.length === 3 ? parseInt(parts[2]) : 0;
                    const delay = col * 40;

                    new TWEEN.Tween(group.position)
                        .to({ y: -15 }, 450)
                        .easing(TWEEN.Easing.Back.In)
                        .delay(delay)
                        .onComplete(() => {
                            this.engine.scene.remove(group);
                            group.traverse((child) => {
                                if (child.isMesh) {
                                    if (child.geometry) child.geometry.dispose();
                                    if (child.material) {
                                        if (Array.isArray(child.material)) {
                                            child.material.forEach(m => m.dispose());
                                        } else {
                                            child.material.dispose();
                                        }
                                    }
                                }
                            });
                        })
                        .start();
                });

                this.grid = [];

                // 3. Populate new board configuration after slide-down transition completes
                this.schedule(() => {
                    this.grid = [];
                    for (let r = 0; r < this.size; r++) {
                        this.grid[r] = [];
                        for (let c = 0; c < this.size; c++) {
                            let type = 0;
                            let attempts = 0;
                            do {
                                type = Math.floor(Math.random() * SHAPE_SPECS.length);
                                attempts++;
                            } while (this.wouldFormInitialMatch(r, c, type) && attempts < 50);

                            const rollRing = Math.random() < this.level.chance;
                            const tile = new Tile(r, c, type, this.gridSpacing, rollRing, this.size);
                            this.grid[r][c] = tile;
                            this.engine.scene.add(tile.group);

                            const offsetTop = ((this.size - 1) / 2 + 5) * this.gridSpacing;
                            tile.group.position.set(tile.targetX, offsetTop, 0);
