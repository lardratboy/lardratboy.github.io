<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nested Mosaic — Hierarchical 3n-Tuple Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --panel-border: #1e1e2a;
    --text: #c8c8d4;
    --text-dim: #6a6a7e;
    --text-bright: #eeeef4;
    --accent: #4af;
    --accent-dim: #2a6fa8;
    --accent-glow: rgba(68,170,255,0.15);
    --warn: #f84;
    --tiled: #f4a;
    --tiled-dim: #a83070;
    --slider-track: #222230;
    --slider-thumb: #4af;
    --input-bg: #16161f;
    --input-border: #2a2a38;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Space Grotesk', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    width:100%; height:100%;
    background:var(--bg); color:var(--text);
    font-family:var(--font-mono); font-size:12px;
    overflow:hidden; user-select:none;
  }
  #canvas-container { position:absolute; inset:0; z-index:0; }
  canvas { display:block; width:100%; height:100%; }

  #drop-overlay {
    display:none; position:fixed; inset:0; z-index:1000;
    background:rgba(6,6,12,0.92); backdrop-filter:blur(12px);
    justify-content:center; align-items:center;
    flex-direction:column; gap:16px;
    font-family:var(--font-display);
  }
  #drop-overlay.active { display:flex; }
  #drop-overlay .icon { font-size:64px; opacity:0.7; animation:pulse 1.5s ease-in-out infinite; }
  #drop-overlay .label { font-size:22px; font-weight:600; color:var(--accent); letter-spacing:1px; }
  @keyframes pulse {
    0%,100% { transform:scale(1); opacity:0.6; }
    50% { transform:scale(1.08); opacity:1; }
  }

  #panel {
    position:absolute; top:16px; left:16px; width:290px;
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:10px; z-index:10; overflow:hidden;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    max-height:calc(100vh - 32px); overflow-y:auto;
  }
  #panel::-webkit-scrollbar { width:4px; }
  #panel::-webkit-scrollbar-track { background:transparent; }
  #panel::-webkit-scrollbar-thumb { background:var(--panel-border); border-radius:2px; }

  .panel-header {
    padding:16px 18px 12px;
    border-bottom:1px solid var(--panel-border);
    font-family:var(--font-display);
  }
  .panel-header h1 { font-size:16px; font-weight:700; color:var(--text-bright); letter-spacing:0.5px; }
  .panel-header .sub { font-size:10px; color:var(--text-dim); margin-top:4px; font-family:var(--font-mono); letter-spacing:0.5px; }

  .section { padding:14px 18px; border-bottom:1px solid var(--panel-border); }
  .section:last-child { border-bottom:none; }
  .section-title { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); margin-bottom:10px; }
  .row { margin-bottom:10px; }
  .row:last-child { margin-bottom:0; }
  label { display:block; font-size:11px; color:var(--text); margin-bottom:4px; }

  select {
    width:100%; background:var(--input-bg); border:1px solid var(--input-border);
    border-radius:5px; color:var(--text-bright); font-family:var(--font-mono);
    font-size:11px; padding:6px 8px; outline:none; transition:border-color 0.2s;
  }
  select:focus { border-color:var(--accent-dim); }
  select option { background:var(--panel); }

  .slider-row { display:flex; align-items:center; gap:8px; }
  .slider-row input[type="range"] { flex:1; }
  .slider-row .val { min-width:30px; text-align:right; font-size:11px; color:var(--accent); font-weight:500; }

  input[type="range"] {
    -webkit-appearance:none; appearance:none; height:4px;
    background:var(--slider-track); border-radius:2px; outline:none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:var(--slider-thumb); cursor:pointer; box-shadow:0 0 6px rgba(68,170,255,0.4);
  }

  .inline-row { display:flex; gap:10px; }
  .inline-row .row { flex:1; }

  .toggle-row { display:flex; align-items:center; justify-content:space-between; }
  .toggle { position:relative; width:36px; height:20px; cursor:pointer; }
  .toggle input { display:none; }
  .toggle .track { position:absolute; inset:0; background:var(--slider-track); border-radius:10px; transition:background 0.2s; }
  .toggle input:checked + .track { background:var(--accent-dim); }
  .toggle .knob { position:absolute; top:2px; left:2px; width:16px; height:16px; background:var(--text-bright); border-radius:50%; transition:transform 0.2s; }
  .toggle input:checked ~ .knob { transform:translateX(16px); }

  .mode-switch { display:flex; background:var(--input-bg); border:1px solid var(--input-border); border-radius:6px; overflow:hidden; }
  .mode-switch button {
    flex:1; padding:8px 0; background:transparent; border:none;
    color:var(--text-dim); font-family:var(--font-mono); font-size:10px;
    font-weight:500; letter-spacing:0.5px; cursor:pointer; transition:all 0.25s;
  }
  .mode-switch button.active { color:var(--text-bright); background:var(--accent-dim); }
  .mode-switch button.active.tiled-active { background:var(--tiled-dim); }
  .mode-switch button:not(.active):hover { color:var(--text); background:rgba(255,255,255,0.03); }

  .file-btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:10px;
    background:linear-gradient(135deg,var(--accent-dim),#1a4a70);
    border:1px solid var(--accent-dim); border-radius:6px;
    color:var(--text-bright); font-family:var(--font-mono);
    font-size:11px; font-weight:500; cursor:pointer;
    transition:all 0.2s; letter-spacing:0.5px;
  }
  .file-btn:hover { background:linear-gradient(135deg,#3080c0,var(--accent-dim)); box-shadow:0 0 16px var(--accent-glow); }
  #file-input { display:none; }

  .file-info { margin-top:8px; font-size:10px; color:var(--text-dim); line-height:1.6; word-break:break-all; }
  .file-info .fname { color:var(--accent); font-weight:500; }

  .process-btn {
    width:100%; padding:10px; background:var(--input-bg);
    border:1px solid var(--panel-border); border-radius:6px;
    color:var(--text); font-family:var(--font-mono); font-size:11px;
    cursor:pointer; transition:all 0.2s; letter-spacing:0.5px;
  }
  .process-btn:hover { border-color:var(--accent-dim); color:var(--text-bright); box-shadow:0 0 12px var(--accent-glow); }
  .process-btn:disabled { opacity:0.3; cursor:default; box-shadow:none; }

  .level-block { background:var(--input-bg); border:1px solid var(--input-border); border-radius:6px; padding:10px 12px; margin-bottom:8px; }
  .level-block:last-child { margin-bottom:0; }
  .level-label { font-size:10px; font-weight:600; color:var(--accent); margin-bottom:8px; letter-spacing:0.5px; }
  .tiled-mode .level-label { color:var(--tiled); }

  #stats {
    position:absolute; top:16px; right:16px;
    background:var(--panel); border:1px solid var(--panel-border);
    border-radius:8px; padding:12px 16px; z-index:10;
    font-size:10px; line-height:1.8; min-width:260px;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
  }
  #stats .sv { color:var(--accent); font-weight:500; }
  #stats .sl { color:var(--text-dim); }
  #stats .st { color:var(--tiled); font-weight:500; }

  #help {
    position:absolute; bottom:16px; right:16px;
    font-size:10px; color:var(--text-dim); z-index:10;
    text-align:right; line-height:1.8;
  }
  #loading {
    display:none; position:fixed; inset:0; z-index:500;
    background:rgba(6,6,12,0.8); justify-content:center; align-items:center;
    font-family:var(--font-display); font-size:16px; color:var(--accent);
  }
  #loading.active { display:flex; }
  #loading .spinner {
    width:24px; height:24px;
    border:2px solid var(--panel-border); border-top-color:var(--accent);
    border-radius:50%; animation:spin 0.8s linear infinite; margin-right:12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .badge {
    display:inline-block; font-size:9px; padding:2px 6px;
    border-radius:3px; font-weight:600; letter-spacing:0.5px; vertical-align:middle;
  }
  .badge-3d { background:rgba(68,170,255,0.15); color:var(--accent); }
  .badge-tiled { background:rgba(255,68,170,0.15); color:var(--tiled); }
  .badge-gpu { background:rgba(80,255,130,0.15); color:#4f8; margin-left:4px; }
  .badge-morton { background:rgba(255,200,40,0.15); color:#fc4; margin-left:4px; }
  .badge-insert { background:rgba(150,150,180,0.1); color:var(--text-dim); margin-left:4px; }
</style>
</head>
<body>

<div id="canvas-container"></div>
<div id="drop-overlay"><div class="icon">⬡</div><div class="label">Drop any file to visualize</div></div>
<div id="loading"><div class="spinner"></div><span>Processing…</span></div>

<div id="panel">
  <div class="panel-header">
    <h1>Nested Mosaic</h1>
    <div class="sub">gpu-driven hierarchical 3n-tuple viewer</div>
  </div>

  <div class="section">
    <div class="section-title">Projection</div>
    <div class="mode-switch">
      <button id="btn-mode-3d" class="active" onclick="setMode('3d')">⬡ 3D Spatial</button>
      <button id="btn-mode-tiled" onclick="setMode('tiled')">⊞ Tiled 2D</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">File</div>
    <button class="file-btn" onclick="document.getElementById('file-input').click()">⬡ &nbsp;Load File</button>
    <input type="file" id="file-input">
    <div id="file-info" class="file-info"></div>
  </div>

  <div class="section">
    <div class="section-title">Data Interpretation</div>
    <div class="inline-row">
      <div class="row">
        <label>Type</label>
        <select id="sel-type">
          <option value="uint8" selected>uint8</option>
          <option value="int8">int8</option>
          <option value="uint16">uint16</option>
          <option value="int16">int16</option>
          <option value="uint32">uint32</option>
          <option value="int32">int32</option>
        </select>
      </div>
      <div class="row">
        <label>Endian</label>
        <select id="sel-endian">
          <option value="little" selected>Little</option>
          <option value="big">Big</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Nesting Levels</div>
    <div class="row">
      <label>Depth</label>
      <div class="slider-row">
        <input type="range" id="sl-depth" min="1" max="4" value="2" step="1">
        <span class="val" id="val-depth">2</span>
      </div>
    </div>
    <div id="levels-container"></div>
  </div>

  <div class="section">
    <div class="section-title">Rendering</div>
    <div class="row">
      <label>Point Size</label>
      <div class="slider-row">
        <input type="range" id="sl-ptsize" min="0.5" max="12" value="2.5" step="0.1">
        <span class="val" id="val-ptsize">2.5</span>
      </div>
    </div>
    <div class="row">
      <label>Global Gap Scale</label>
      <div class="slider-row">
        <input type="range" id="sl-gapscale" min="0" max="3" value="1" step="0.05">
        <span class="val" id="val-gapscale">1.00</span>
      </div>
    </div>
    <div class="row">
      <label>Buffer Order</label>
      <select id="sel-order">
        <option value="insertion" selected>Insertion (file order)</option>
        <option value="morton">Morton Z-curve</option>
      </select>
    </div>
    <div class="row toggle-row" id="row-autorotate">
      <label>Auto-Rotate</label>
      <label class="toggle">
        <input type="checkbox" id="chk-rotate" checked>
        <div class="track"></div>
        <div class="knob"></div>
      </label>
    </div>
  </div>

  <div class="section">
    <button class="process-btn" id="btn-process" disabled>Reprocess (data change)</button>
    <button class="process-btn" id="btn-export" disabled style="margin-top:6px">Export PLY</button>
  </div>
</div>

<div id="stats"></div>
<div id="help">
  LMB — orbit &nbsp;│&nbsp; RMB — pan &nbsp;│&nbsp; Scroll — zoom<br>
  Drop any file to load
</div>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- Three.js + OrbitControls                              -->
<!-- ═══════════════════════════════════════════════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
// SHADERS — GLSL 300 es (WebGL2)
//
// The vertex shader unpacks hierarchical indices from packed
// float attributes and reconstructs world-space position
// using uniform-driven stride/gap parameters.
// Mode switching (3D ↔ tiled) is a uniform change — zero
// geometry re-upload.
// ═══════════════════════════════════════════════════════════

const VERT = `#version 300 es
precision highp float;
precision highp int;

// THREE.js built-ins (detected by name, auto-managed)
uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;

// Packed hierarchical indices — each component stores one level:
//   float( (ix << 16) | (iy << 8) | iz )
// Max value = (255<<16)|(255<<8)|255 = 16777215, exact in float32.
in vec3 position;   // dummy vec3 for THREE.js draw count
in vec4 a_packed;   // the real data: 4 levels of packed indices

// ── Hierarchy uniforms ──
uniform int   u_numLevels;
uniform float u_div[4];        // divisions per level (2^bits)
uniform int   u_mode;          // 0 = 3D, 1 = tiled

// 3D layout
uniform float u_step3D[4];     // stride*(1+gap) per level

// Tiled 2D layout
uniform float u_stepTX[4];     // tiled X step per level
uniform float u_stepTY[4];     // tiled Y step per level
uniform float u_zCols[4];      // floor(sqrt(d)) per level

// View transform
uniform vec3  u_center;        // analytically computed center
uniform float u_scale;         // fit-to-view scale factor
uniform float u_pointSize;

out vec3 v_color;

void main() {
  // ── Unpack all 4 levels ──
  float ix[4], iy[4], iz[4];
  int p;

  p = int(a_packed.x);
  ix[0] = float((p >> 16) & 0xFF);
  iy[0] = float((p >>  8) & 0xFF);
  iz[0] = float( p        & 0xFF);

  p = int(a_packed.y);
  ix[1] = float((p >> 16) & 0xFF);
  iy[1] = float((p >>  8) & 0xFF);
  iz[1] = float( p        & 0xFF);

  p = int(a_packed.z);
  ix[2] = float((p >> 16) & 0xFF);
  iy[2] = float((p >>  8) & 0xFF);
  iz[2] = float( p        & 0xFF);

  p = int(a_packed.w);
  ix[3] = float((p >> 16) & 0xFF);
  iy[3] = float((p >>  8) & 0xFF);
  iz[3] = float( p        & 0xFF);

  // ── Reconstruct world position ──
  vec3 pos = vec3(0.0);

  for (int i = 0; i < 4; i++) {
    if (i >= u_numLevels) break;

    if (u_mode == 0) {
      // 3D spatial: isotropic stride
      pos += vec3(ix[i], iy[i], iz[i]) * u_step3D[i];
    } else {
      // Tiled 2D: Z tiles into sqrt(d) cols × ceil(d/sqrt(d)) rows
      float d  = u_div[i];
      float zc = u_zCols[i];
      float col = mod(iz[i], zc);
      float row = floor(iz[i] / zc);
      pos.x += (col * d + ix[i]) * u_stepTX[i];
      pos.z += (row * d + iy[i]) * u_stepTY[i];
      // pos.y stays 0 (flat on XZ plane)
    }
  }

  // Center and scale to fit view
  pos = (pos - u_center) * u_scale;

  // ── Reconstruct color from indices ──
  // Rebuild normalized [0,1] coordinate: inner→outer accumulation
  //   val ≈ (ix0 + (ix1 + (ix2 + ix3/d3) / d2) / d1) / d0
  vec3 nc = vec3(0.0);
  if (u_numLevels > 3) nc = (nc + vec3(ix[3], iy[3], iz[3])) / u_div[3];
  if (u_numLevels > 2) nc = (nc + vec3(ix[2], iy[2], iz[2])) / u_div[2];
  if (u_numLevels > 1) nc = (nc + vec3(ix[1], iy[1], iz[1])) / u_div[1];
  nc = (nc + vec3(ix[0], iy[0], iz[0])) / u_div[0];
  v_color = nc;

  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  gl_PointSize = u_pointSize;
}
`;

const FRAG = `#version 300 es
precision highp float;

in vec3 v_color;
out vec4 outColor;

void main() {
  // Soft circle point rendering
  vec2 c = 2.0 * gl_PointCoord - 1.0;
  float r2 = dot(c, c);
  if (r2 > 1.0) discard;
  float alpha = 1.0 - smoothstep(0.4, 1.0, r2);
  outColor = vec4(v_color, alpha * 0.9);
}
`;

// ═══════════════════════════════════════════════════════════
// DATA TYPES
// ═══════════════════════════════════════════════════════════
const DATA_TYPES = {
  int8:   { size:1, min:-128,        max:127,        method:'getInt8' },
  uint8:  { size:1, min:0,           max:255,        method:'getUint8' },
  int16:  { size:2, min:-32768,      max:32767,      method:'getInt16' },
  uint16: { size:2, min:0,           max:65535,      method:'getUint16' },
  int32:  { size:4, min:-2147483648, max:2147483647, method:'getInt32' },
  uint32: { size:4, min:0,           max:4294967295, method:'getUint32' }
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let fileBuffer = null;
let fileName   = '';
let pointCloud = null;
let scene, renderer;
let perspCamera, orthoCamera, camera;
let perspControls, orthoControls, controls;
let projectionMode = '3d';
let gridHelper = null;
let shaderMaterial = null;

// Cached from last processData() — survives uniform-only updates
let cachedResult = null;
let cachedMortonPacked = null;  // sorted copy, lazily computed
let mortonSortTime = 0;

const ORTHO_BASE = 4;
const FIT_SIZE = 3;  // normalize cloud to ~3 units across

// ═══════════════════════════════════════════════════════════
// THREE.js INIT
// ═══════════════════════════════════════════════════════════
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);

  const a = window.innerWidth / window.innerHeight;

  perspCamera = new THREE.PerspectiveCamera(55, a, 0.01, 1000);
  perspCamera.position.set(3.5, 2.5, 3.5);

  orthoCamera = new THREE.OrthographicCamera(
    -ORTHO_BASE*a, ORTHO_BASE*a, ORTHO_BASE, -ORTHO_BASE, 0.01, 1000
  );
  orthoCamera.position.set(0, 50, 0);
  orthoCamera.lookAt(0, 0, 0);

  camera = perspCamera;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  // Verify WebGL2
  if (!renderer.capabilities.isWebGL2) {
    console.warn('WebGL2 not available — integer shader ops may fail');
  }

  // OrbitControls: perspective (full orbit)
  perspControls = new THREE.OrbitControls(perspCamera, renderer.domElement);
  perspControls.enableDamping = true;
  perspControls.dampingFactor = 0.07;
  perspControls.autoRotate = true;
  perspControls.autoRotateSpeed = 0.8;
  perspControls.minDistance = 0.3;
  perspControls.maxDistance = 200;

  // OrbitControls: ortho (pan + zoom only)
  orthoControls = new THREE.OrbitControls(orthoCamera, renderer.domElement);
  orthoControls.enableDamping = true;
  orthoControls.dampingFactor = 0.07;
  orthoControls.enableRotate = false;
  orthoControls.screenSpacePanning = false;
  orthoControls.mouseButtons = { LEFT:THREE.MOUSE.PAN, MIDDLE:THREE.MOUSE.DOLLY, RIGHT:THREE.MOUSE.PAN };
  orthoControls.touches = { ONE:THREE.TOUCH.PAN, TWO:THREE.TOUCH.DOLLY_PAN };
  orthoControls.minZoom = 0.005;
  orthoControls.maxZoom = 500;
  orthoControls.enabled = false;

  controls = perspControls;

  gridHelper = new THREE.GridHelper(4, 20, 0x1a1a28, 0x12121a);
  gridHelper.position.y = -2;
  scene.add(gridHelper);

  window.addEventListener('resize', () => {
    const a = window.innerWidth / window.innerHeight;
    perspCamera.aspect = a;
    perspCamera.updateProjectionMatrix();
    orthoCamera.left = -ORTHO_BASE*a; orthoCamera.right = ORTHO_BASE*a;
    orthoCamera.top = ORTHO_BASE; orthoCamera.bottom = -ORTHO_BASE;
    orthoCamera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════
// DATA PROCESSING — CPU side
//
// Reads 3n-tuples from the buffer, decomposes each into
// hierarchical indices, deduplicates, packs indices into
// Float32 (lossless for values ≤ 2^24).
// NO world-space coordinates computed here.
// ═══════════════════════════════════════════════════════════
function processData(buffer, dataType, isLittleEndian, levelBits) {
  const cfg = DATA_TYPES[dataType];
  const typeSize = cfg.size, tupleSize = typeSize * 3;
  const view = new DataView(buffer);
  const maxTuples = Math.floor(buffer.byteLength / tupleSize);
  if (maxTuples === 0) throw new Error('Buffer too small for even one tuple');

  const dMin = cfg.min, dRange = cfg.max - cfg.min, rm = cfg.method;
  const numLevels = levelBits.length;
  const divisions = levelBits.map(b => 1 << b);

  const seen = new Set();
  const packed = [];  // will become Float32Array, 4 floats per point
  let dupes = 0;
  const cellSets = levelBits.map(() => new Set());

  for (let t = 0; t < maxTuples; t++) {
    const o = t * tupleSize;
    const rx = (view[rm](o, isLittleEndian) - dMin) / dRange;
    const ry = (view[rm](o + typeSize, isLittleEndian) - dMin) / dRange;
    const rz = (view[rm](o + typeSize * 2, isLittleEndian) - dMin) / dRange;

    let remX = Math.max(0, Math.min(0.999999, rx));
    let remY = Math.max(0, Math.min(0.999999, ry));
    let remZ = Math.max(0, Math.min(0.999999, rz));

    let key = '';
    const p = [0, 0, 0, 0]; // packed per-level values

    for (let i = 0; i < numLevels; i++) {
      const d = divisions[i], maxI = d - 1;
      const ix = Math.min(maxI, Math.floor(remX * d));
      const iy = Math.min(maxI, Math.floor(remY * d));
      const iz = Math.min(maxI, Math.floor(remZ * d));

      cellSets[i].add((iz * d + iy) * d + ix);
      key += ix + ',' + iy + ',' + iz + ';';

      // Pack: (ix << 16) | (iy << 8) | iz
      // Max = 16777215, exact in float32 (≤ 2^24)
      p[i] = (ix << 16) | (iy << 8) | iz;

      remX = remX * d - ix;
      remY = remY * d - iy;
      remZ = remZ * d - iz;
    }

    if (seen.has(key)) { dupes++; continue; }
    seen.add(key);

    packed.push(p[0], p[1], p[2], p[3]);
  }

  const numPoints = packed.length / 4;
  console.log(`Packed ${numPoints} unique points (${dupes} dupes) from ${maxTuples} tuples — ${numPoints * 16} bytes GPU buffer`);

  return {
    packed: new Float32Array(packed),
    numPoints,
    totalTuples: maxTuples,
    duplicates: dupes,
    cellsPerLevel: cellSets.map(s => s.size),
    levelBits: [...levelBits],
    divisions: [...divisions]
  };
}

// ═══════════════════════════════════════════════════════════
// MORTON Z-CURVE ENCODING + SORT
//
// The hierarchical index chain (ix0,iy0,iz0, ix1,iy1,iz1,...)
// is a natural multi-resolution address. To produce a Morton
// key we concatenate each axis's bits outer→inner to form
// full X, Y, Z coordinates, then interleave Z-Y-X bits MSB
// first. Sorting the packed buffer by Morton key gives
// spatial coherence: consecutive points in buffer are
// spatially adjacent in the nesting hierarchy.
//
// For ≤ 16 bits/axis (48-bit Morton) we use Number (exact
// up to 2^53). For > 16 bits/axis we use BigInt.
// ═══════════════════════════════════════════════════════════

function mortonSortPacked(result) {
  const { packed, numPoints, levelBits, divisions } = result;
  const numLevels = levelBits.length;
  const totalBitsPerAxis = levelBits.reduce((s, b) => s + b, 0);
  const useBigInt = totalBitsPerAxis > 16;

  const t0 = performance.now();

  // ── Build sort keys ──
  const indices = new Uint32Array(numPoints);
  let keys;

  if (useBigInt) {
    keys = new Array(numPoints);
    for (let i = 0; i < numPoints; i++) {
      indices[i] = i;
      const base = i * 4;

      // Reconstruct full X, Y, Z by concatenating bits outer→inner
      let fullX = 0n, fullY = 0n, fullZ = 0n;
      for (let lv = 0; lv < numLevels; lv++) {
        const bits = levelBits[lv];
        const p = packed[base + lv];
        const ix = BigInt((p >> 16) & 0xFF);
        const iy = BigInt((p >> 8) & 0xFF);
        const iz = BigInt(p & 0xFF);
        const b = BigInt(bits);
        fullX = (fullX << b) | ix;
        fullY = (fullY << b) | iy;
        fullZ = (fullZ << b) | iz;
      }

      // Interleave Z-Y-X, MSB first → single Morton key
      let key = 0n;
      const tb = BigInt(totalBitsPerAxis);
      for (let b = tb - 1n; b >= 0n; b--) {
        key = (key << 1n) | ((fullZ >> b) & 1n);
        key = (key << 1n) | ((fullY >> b) & 1n);
        key = (key << 1n) | ((fullX >> b) & 1n);
      }
      keys[i] = key;
    }

    // Sort indices by BigInt key
    indices.sort((a, b) => {
      const ka = keys[a], kb = keys[b];
      return ka < kb ? -1 : ka > kb ? 1 : 0;
    });

  } else {
    // Fast path: Number-safe (totalBitsPerAxis ≤ 16 → Morton ≤ 48 bits)
    keys = new Float64Array(numPoints);
    for (let i = 0; i < numPoints; i++) {
      indices[i] = i;
      const base = i * 4;

      let fullX = 0, fullY = 0, fullZ = 0;
      for (let lv = 0; lv < numLevels; lv++) {
        const bits = levelBits[lv];
        const p = packed[base + lv];
        const ix = (p >> 16) & 0xFF;
        const iy = (p >> 8) & 0xFF;
        const iz = p & 0xFF;
        fullX = (fullX << bits) | ix;
        fullY = (fullY << bits) | iy;
        fullZ = (fullZ << bits) | iz;
      }

      // Interleave Z-Y-X using bit manipulation
      // For ≤ 16 bits per axis, Morton ≤ 48 bits, safe in float64
      let key = 0;
      for (let b = totalBitsPerAxis - 1; b >= 0; b--) {
        key = key * 8 + (((fullZ >> b) & 1) << 2)
                      + (((fullY >> b) & 1) << 1)
                      +  ((fullX >> b) & 1);
      }
      keys[i] = key;
    }

    // Sort by Number key
    indices.sort((a, b) => keys[a] - keys[b]);
  }

  // ── Reorder packed buffer by sorted indices ──
  const sorted = new Float32Array(numPoints * 4);
  for (let i = 0; i < numPoints; i++) {
    const src = indices[i] * 4;
    const dst = i * 4;
    sorted[dst]     = packed[src];
    sorted[dst + 1] = packed[src + 1];
    sorted[dst + 2] = packed[src + 2];
    sorted[dst + 3] = packed[src + 3];
  }

  const elapsed = Math.round(performance.now() - t0);
  console.log(`Morton sort: ${numPoints} points, ${totalBitsPerAxis} bits/axis, ${useBigInt ? 'BigInt' : 'Number'} path — ${elapsed}ms`);

  return { sorted, elapsed };
}

// ═══════════════════════════════════════════════════════════
// LAYOUT UNIFORMS — computed from level config + mode
//
// This is the heart of the "UV trick": all coordinate math
// is encoded as uniforms. Changing gaps or mode just changes
// these numbers — zero geometry re-upload.
// ═══════════════════════════════════════════════════════════
function computeLayoutUniforms(divisions, levels, gapScale, mode) {
  const n = divisions.length;
  const gaps = levels.map(l => l.gap * gapScale);

  // ── 3D: isotropic strides, bottom-up ──
  const str3D = [0, 0, 0, 0];
  str3D[n - 1] = 1;
  for (let i = n - 2; i >= 0; i--) {
    const d = divisions[i + 1], g = gaps[i + 1];
    str3D[i] = d * str3D[i + 1] + (d - 1) * str3D[i + 1] * g;
  }
  const step3D = [0, 0, 0, 0];
  for (let i = 0; i < n; i++) step3D[i] = str3D[i] * (1 + gaps[i]);

  // ── Tiled 2D: anisotropic strides ──
  const zCols = divisions.map(d => Math.max(1, Math.floor(Math.sqrt(d))));
  const zRows = divisions.map((d, i) => Math.ceil(d / zCols[i]));
  const tiledW = divisions.map((d, i) => zCols[i] * d);
  const tiledH = divisions.map((d, i) => zRows[i] * d);

  const strTX = [0, 0, 0, 0], strTY = [0, 0, 0, 0];
  strTX[n - 1] = 1; strTY[n - 1] = 1;
  for (let i = n - 2; i >= 0; i--) {
    strTX[i] = tiledW[i + 1] * strTX[i + 1] * (1 + gaps[i + 1]);
    strTY[i] = tiledH[i + 1] * strTY[i + 1] * (1 + gaps[i + 1]);
  }
  const stepTX = [0, 0, 0, 0], stepTY = [0, 0, 0, 0];
  for (let i = 0; i < n; i++) {
    stepTX[i] = strTX[i] * (1 + gaps[i]);
    stepTY[i] = strTY[i] * (1 + gaps[i]);
  }

  // ── Analytical center + scale ──
  let center, scale;
  if (mode === '3d') {
    let maxC = 0;
    for (let i = 0; i < n; i++) maxC += (divisions[i] - 1) * step3D[i];
    center = [maxC / 2, maxC / 2, maxC / 2];
    scale = FIT_SIZE / (maxC || 1);
  } else {
    let maxX = 0, maxY = 0;
    for (let i = 0; i < n; i++) {
      maxX += (tiledW[i] - 1) * stepTX[i];
      maxY += (tiledH[i] - 1) * stepTY[i];
    }
    center = [maxX / 2, 0, maxY / 2];
    scale = FIT_SIZE / (Math.max(maxX, maxY) || 1);
  }

  return {
    step3D, stepTX, stepTY,
    zCols: zCols.map(v => parseFloat(v)),
    center, scale
  };
}

// ═══════════════════════════════════════════════════════════
// SHADER MATERIAL — created once, uniforms updated per-change
// ═══════════════════════════════════════════════════════════
function createShaderMaterial() {
  return new THREE.RawShaderMaterial({
    vertexShader: VERT,
    fragmentShader: FRAG,
    uniforms: {
      u_numLevels: { value: 2 },
      u_div:       { value: [16.0, 64.0, 0.0, 0.0] },
      u_mode:      { value: 0 },
      u_step3D:    { value: [1.0, 1.0, 0.0, 0.0] },
      u_stepTX:    { value: [1.0, 1.0, 0.0, 0.0] },
      u_stepTY:    { value: [1.0, 1.0, 0.0, 0.0] },
      u_zCols:     { value: [4.0, 8.0, 0.0, 0.0] },
      u_center:    { value: new THREE.Vector3() },
      u_scale:     { value: 1.0 },
      u_pointSize: { value: 2.5 }
    },
    transparent: true,
    depthWrite: false
  });
}

// ═══════════════════════════════════════════════════════════
// BUILD / UPDATE POINT CLOUD
// ═══════════════════════════════════════════════════════════

// Full rebuild: new geometry + material (on data/depth/bits change)
function buildPointCloud(result) {
  if (pointCloud) {
    pointCloud.geometry.dispose();
    scene.remove(pointCloud);
    pointCloud = null;
  }
  if (result.numPoints === 0) return;

  // Select buffer based on current sort order
  const order = document.getElementById('sel-order').value;
  let bufferData;

  if (order === 'morton') {
    // Lazily compute or use cached Morton sort
    if (!cachedMortonPacked) {
      const m = mortonSortPacked(result);
      cachedMortonPacked = m.sorted;
      mortonSortTime = m.elapsed;
    }
    bufferData = cachedMortonPacked;
  } else {
    bufferData = result.packed;
  }

  const geo = new THREE.BufferGeometry();

  // Dummy position attribute (vec3) — THREE.js needs this for draw count
  geo.setAttribute('position',
    new THREE.Float32BufferAttribute(new Float32Array(result.numPoints * 3), 3)
  );

  // Real data: packed hierarchical indices (vec4)
  geo.setAttribute('a_packed',
    new THREE.Float32BufferAttribute(bufferData, 4)
  );

  // Set bounding sphere to prevent THREE.js from computing it from dummy positions
  geo.boundingSphere = new THREE.Sphere(new THREE.Vector3(0, 0, 0), 100);

  if (!shaderMaterial) shaderMaterial = createShaderMaterial();

  pointCloud = new THREE.Points(geo, shaderMaterial);
  scene.add(pointCloud);

  // Apply layout uniforms
  applyLayoutUniforms();

  // Reset camera
  resetCamera();
}

// Uniform-only update: instant, no geometry re-upload
function applyLayoutUniforms() {
  if (!shaderMaterial || !cachedResult) return;

  const config = getConfig();
  const divisions = cachedResult.divisions;
  const padDiv = [0, 0, 0, 0];
  for (let i = 0; i < divisions.length; i++) padDiv[i] = divisions[i];

  const layout = computeLayoutUniforms(
    divisions, config.levels, config.gapScale, projectionMode
  );

  const u = shaderMaterial.uniforms;
  u.u_numLevels.value = divisions.length;
  u.u_div.value       = padDiv;
  u.u_mode.value      = projectionMode === 'tiled' ? 1 : 0;
  u.u_step3D.value    = layout.step3D;
  u.u_stepTX.value    = layout.stepTX;
  u.u_stepTY.value    = layout.stepTY;
  u.u_zCols.value     = layout.zCols;
  u.u_center.value.set(layout.center[0], layout.center[1], layout.center[2]);
  u.u_scale.value     = layout.scale;
  u.u_pointSize.value = config.pointSize;
}

function resetCamera() {
  if (projectionMode === '3d') {
    perspCamera.position.set(3.5, 2.5, 3.5);
    perspControls.target.set(0, 0, 0);
    perspControls.update();
  } else {
    orthoCamera.position.set(0, 50, 0);
    orthoCamera.zoom = 1;
    orthoCamera.updateProjectionMatrix();
    orthoControls.target.set(0, 0, 0);
    orthoControls.update();
  }
}

// ═══════════════════════════════════════════════════════════
// MODE SWITCHING — uniform change only!
// ═══════════════════════════════════════════════════════════
function setMode(mode) {
  projectionMode = mode;

  document.getElementById('btn-mode-3d').classList.toggle('active', mode === '3d');
  document.getElementById('btn-mode-tiled').classList.toggle('active', mode === 'tiled');
  document.getElementById('btn-mode-tiled').classList.toggle('tiled-active', mode === 'tiled');
  document.getElementById('row-autorotate').style.display = mode === '3d' ? '' : 'none';
  document.getElementById('levels-container').classList.toggle('tiled-mode', mode === 'tiled');

  const h = document.getElementById('help');
  h.innerHTML = mode === '3d'
    ? 'LMB — orbit &nbsp;│&nbsp; RMB — pan &nbsp;│&nbsp; Scroll — zoom<br>Drop any file to load'
    : 'Drag — pan &nbsp;│&nbsp; Scroll — zoom<br>Z tiles as √(2^b) columns &nbsp;│&nbsp; Drop any file';

  if (mode === 'tiled') {
    perspControls.enabled = false;
    orthoControls.enabled = true;
    controls = orthoControls;
    camera = orthoCamera;
    gridHelper.visible = false;
  } else {
    orthoControls.enabled = false;
    perspControls.enabled = true;
    controls = perspControls;
    camera = perspCamera;
    perspControls.autoRotate = document.getElementById('chk-rotate').checked;
    gridHelper.visible = true;
  }

  // Just update uniforms — no reprocessing!
  applyLayoutUniforms();
  resetCamera();
  updateStats();
}

// ═══════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════
function buildLevelUI() {
  const depth = parseInt(document.getElementById('sl-depth').value);
  const container = document.getElementById('levels-container');

  const existing = {};
  container.querySelectorAll('.level-block').forEach(block => {
    const lvl = block.dataset.level;
    const b = block.querySelector('.bits-slider');
    const g = block.querySelector('.gap-slider');
    if (b && g) existing[lvl] = { bits: b.value, gap: g.value };
  });

  container.innerHTML = '';
  const defaults = [
    { bits:4, gap:0.4 },
    { bits:6, gap:0.15 },
    { bits:4, gap:0.05 },
    { bits:3, gap:0.02 }
  ];

  for (let i = 0; i < depth; i++) {
    const prev = existing[i];
    const def = defaults[i] || { bits:3, gap:0.1 };
    const bits = prev ? prev.bits : def.bits;
    const gap  = prev ? prev.gap  : def.gap;

    const block = document.createElement('div');
    block.className = 'level-block';
    block.dataset.level = i;
    block.innerHTML = `
      <div class="level-label">Level ${i} — ${i === 0 ? 'Outer' : i === depth-1 ? 'Inner' : 'Mid'}</div>
      <div class="row"><label>Bits (2^n divisions)</label>
        <div class="slider-row">
          <input type="range" class="bits-slider" min="1" max="8" value="${bits}" step="1">
          <span class="val bits-val">${bits} → ${1 << bits}</span>
        </div>
      </div>
      <div class="row"><label>Gap</label>
        <div class="slider-row">
          <input type="range" class="gap-slider" min="0" max="1.5" value="${gap}" step="0.01">
          <span class="val gap-val">${parseFloat(gap).toFixed(2)}</span>
        </div>
      </div>`;
    container.appendChild(block);

    const bs = block.querySelector('.bits-slider');
    const gs = block.querySelector('.gap-slider');
    bs.addEventListener('input', () => {
      block.querySelector('.bits-val').textContent = `${bs.value} → ${1 << bs.value}`;
    });
    gs.addEventListener('input', () => {
      block.querySelector('.gap-val').textContent = parseFloat(gs.value).toFixed(2);
    });
  }
  container.classList.toggle('tiled-mode', projectionMode === 'tiled');
}

function getConfig() {
  const levels = [];
  document.querySelectorAll('.level-block').forEach(block => {
    levels.push({
      bits: parseInt(block.querySelector('.bits-slider').value),
      gap:  parseFloat(block.querySelector('.gap-slider').value)
    });
  });
  return {
    dataType: document.getElementById('sel-type').value,
    isLittleEndian: document.getElementById('sel-endian').value === 'little',
    levels,
    pointSize: parseFloat(document.getElementById('sl-ptsize').value),
    gapScale: parseFloat(document.getElementById('sl-gapscale').value),
    mode: projectionMode
  };
}

function getLevelBits() {
  const bits = [];
  document.querySelectorAll('.level-block .bits-slider').forEach(s => {
    bits.push(parseInt(s.value));
  });
  return bits;
}

// ═══════════════════════════════════════════════════════════
// PROCESSING PIPELINES
// ═══════════════════════════════════════════════════════════

// HEAVY: full reprocess (file, type, endian, depth, bits change)
function runHeavyProcess() {
  if (!fileBuffer) return;

  const loading = document.getElementById('loading');
  loading.classList.add('active');

  requestAnimationFrame(() => setTimeout(() => {
    try {
      const config = getConfig();
      const levelBits = config.levels.map(l => l.bits);

      const t0 = performance.now();
      cachedMortonPacked = null;  // invalidate sort cache
      mortonSortTime = 0;
      cachedResult = processData(
        fileBuffer, config.dataType, config.isLittleEndian, levelBits
      );
      const elapsed = Math.round(performance.now() - t0);
      cachedResult._elapsed = elapsed;

      buildPointCloud(cachedResult);
      updateStats();

      console.log(`[heavy] ${cachedResult.numPoints} pts, ${elapsed}ms`);
    } catch (err) {
      console.error('Process error:', err);
      document.getElementById('stats').innerHTML =
        `<span style="color:var(--warn)">Error: ${err.message}</span>`;
    }
    loading.classList.remove('active');
  }, 20));
}

// LIGHT: uniform-only update (gap, gapScale, pointSize, mode)
function runLightUpdate() {
  if (!cachedResult || !shaderMaterial) return;
  applyLayoutUniforms();
  updateStats();
}

// MEDIUM: sort order changed — rebuild geometry with (possibly cached) sorted data
function runSortUpdate() {
  if (!cachedResult) return;

  const loading = document.getElementById('loading');
  loading.classList.add('active');

  requestAnimationFrame(() => setTimeout(() => {
    try {
      buildPointCloud(cachedResult);
      updateStats();
      const order = document.getElementById('sel-order').value;
      console.log(`[sort] Rebuilt with ${order} order${order === 'morton' ? ` (${mortonSortTime}ms sort)` : ''}`);
    } catch (err) {
      console.error('Sort error:', err);
    }
    loading.classList.remove('active');
  }, 20));
}

function updateStats() {
  const el = document.getElementById('stats');
  const r = cachedResult;
  if (!r) { el.innerHTML = ''; return; }

  const config = getConfig();
  const isTiled = projectionMode === 'tiled';
  const badge = isTiled
    ? '<span class="badge badge-tiled">TILED 2D</span>'
    : '<span class="badge badge-3d">3D SPATIAL</span>';

  const levelInfo = r.divisions.map((d, i) => {
    if (isTiled) {
      const sq = Math.max(1, Math.floor(Math.sqrt(d)));
      const zr = Math.ceil(d / sq);
      return `L${i}: <span class="st">${sq}×${zr}</span>z → <span class="sv">${d}</span>²xy`;
    }
    return `L${i}: <span class="sv">${d}</span>³`;
  }).join('<br>&nbsp;&nbsp;');

  const totalRes = r.divisions.reduce((s, d) => s * d, 1);
  const gpuBytes = r.numPoints * 16;
  const oldBytes = r.numPoints * 24;
  const order = document.getElementById('sel-order').value;
  const totalBPA = r.levelBits.reduce((s, b) => s + b, 0);

  const orderBadge = order === 'morton'
    ? `<span class="badge badge-morton">MORTON Z</span>`
    : `<span class="badge badge-insert">FILE ORDER</span>`;

  el.innerHTML = `
    ${badge}${orderBadge}<span class="badge badge-gpu">GPU SHADER</span><br>
    <span class="sl">Points:</span> <span class="sv">${r.numPoints.toLocaleString()}</span>
    <span class="sl"> / ${r.totalTuples.toLocaleString()} tuples</span><br>
    <span class="sl">Deduped:</span> <span class="sv">${r.duplicates.toLocaleString()}</span><br>
    <span class="sl">Grid:</span> ${levelInfo}<br>
    <span class="sl">Effective:</span> <span class="sv">${totalRes}${isTiled ? '² flat' : '³'}</span><br>
    <span class="sl">Cells:</span> ${r.cellsPerLevel.map((c, i) =>
      `L${i}:<span class="sv">${c}</span>`).join(' ')}<br>
    <span class="sl">GPU buf:</span> <span class="sv">${(gpuBytes/1024).toFixed(1)}KB</span>
    <span class="sl">(was ${(oldBytes/1024).toFixed(1)}KB)</span><br>
    <span class="sl">Pack:</span> <span class="sv">${r._elapsed || 0}ms</span>${
      order === 'morton'
        ? ` <span class="sl">Sort:</span> <span class="sv">${mortonSortTime}ms</span>
           <span class="sl">(${totalBPA}b/axis, ${totalBPA > 16 ? 'BigInt' : 'Number'})</span>`
        : ''
    }
  `;
}

// ═══════════════════════════════════════════════════════════
// PLY EXPORT
//
// Reconstructs world-space positions + colors from packed
// indices on the CPU, mirroring the vertex shader logic.
// Exports as ASCII PLY with current mode/gap/layout settings.
// ═══════════════════════════════════════════════════════════
function exportPLY() {
  if (!cachedResult) return;

  const config = getConfig();
  const { packed, numPoints, divisions, levelBits } = cachedResult;
  const numLevels = divisions.length;
  const layout = computeLayoutUniforms(
    divisions, config.levels, config.gapScale, projectionMode
  );
  const isTiled = projectionMode === 'tiled';

  const t0 = performance.now();

  // Use the active buffer (insertion or morton-sorted)
  const order = document.getElementById('sel-order').value;
  const buf = (order === 'morton' && cachedMortonPacked) ? cachedMortonPacked : packed;

  // Pre-build header
  const lines = [
    'ply',
    'format ascii 1.0',
    `comment Nested Mosaic export — ${isTiled ? 'tiled 2D' : '3D spatial'} mode`,
    `comment ${numLevels} levels: ${divisions.join('x')} divisions`,
    `comment buffer order: ${order}`,
    `comment source: ${fileName || 'unknown'}`,
    `element vertex ${numPoints}`,
    'property float x',
    'property float y',
    'property float z',
    'property uchar red',
    'property uchar green',
    'property uchar blue',
    'end_header'
  ];

  // Tiled layout helpers
  const zCols = divisions.map(d => Math.max(1, Math.floor(Math.sqrt(d))));

  for (let pt = 0; pt < numPoints; pt++) {
    const base = pt * 4;

    // Unpack indices for all levels
    let wx = 0, wy = 0, wz = 0;
    let ncX = 0, ncY = 0, ncZ = 0;

    for (let lv = numLevels - 1; lv >= 0; lv--) {
      const p = buf[base + lv];
      const ix = (p >> 16) & 0xFF;
      const iy = (p >> 8) & 0xFF;
      const iz = p & 0xFF;

      // Color: inner→outer accumulation (matches shader)
      ncX = (ncX + ix) / divisions[lv];
      ncY = (ncY + iy) / divisions[lv];
      ncZ = (ncZ + iz) / divisions[lv];
    }

    // Position: outer→inner accumulation (matches shader)
    for (let lv = 0; lv < numLevels; lv++) {
      const p = buf[base + lv];
      const ix = (p >> 16) & 0xFF;
      const iy = (p >> 8) & 0xFF;
      const iz = p & 0xFF;

      if (!isTiled) {
        // 3D spatial
        const step = layout.step3D[lv];
        wx += ix * step;
        wy += iy * step;
        wz += iz * step;
      } else {
        // Tiled 2D
        const d = divisions[lv];
        const zc = zCols[lv];
        const col = iz % zc;
        const row = Math.floor(iz / zc);
        wx += (col * d + ix) * layout.stepTX[lv];
        wz += (row * d + iy) * layout.stepTY[lv];
        // wy stays 0
      }
    }

    // Apply centering + scale (matches shader)
    const x = (wx - layout.center[0]) * layout.scale;
    const y = (wy - layout.center[1]) * layout.scale;
    const z = (wz - layout.center[2]) * layout.scale;

    // Color: [0,1] → [0,255]
    const r = Math.round(Math.max(0, Math.min(1, ncX)) * 255);
    const g = Math.round(Math.max(0, Math.min(1, ncY)) * 255);
    const b = Math.round(Math.max(0, Math.min(1, ncZ)) * 255);

    lines.push(`${x.toFixed(6)} ${y.toFixed(6)} ${z.toFixed(6)} ${r} ${g} ${b}`);
  }

  const plyText = lines.join('\n') + '\n';
  const elapsed = Math.round(performance.now() - t0);
  console.log(`PLY export: ${numPoints} vertices, ${(plyText.length / 1024 / 1024).toFixed(1)}MB, ${elapsed}ms`);

  // Download
  const baseName = fileName ? fileName.replace(/\.[^.]+$/, '') : 'mosaic';
  const modeSuffix = isTiled ? 'tiled' : '3d';
  const dlName = `${baseName}_${modeSuffix}_${order}_${numPoints}pts.ply`;

  const blob = new Blob([plyText], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = dlName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════════════════
function loadFile(file) {
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    fileBuffer = e.target.result;
    const cfg = DATA_TYPES[document.getElementById('sel-type').value];
    const tuples = Math.floor(fileBuffer.byteLength / (cfg.size * 3));
    document.getElementById('file-info').innerHTML =
      `<span class="fname">${fileName}</span><br>${fileBuffer.byteLength.toLocaleString()} bytes — ~${tuples.toLocaleString()} tuples`;
    document.getElementById('btn-process').disabled = false;
    document.getElementById('btn-export').disabled = false;
    runHeavyProcess();
  };
  reader.readAsArrayBuffer(file);
}

// ═══════════════════════════════════════════════════════════
// INIT + EVENT WIRING
// ═══════════════════════════════════════════════════════════
function init() {
  initThree();
  buildLevelUI();

  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  // Drag and drop
  const overlay = document.getElementById('drop-overlay');
  let dragCounter = 0;
  document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; overlay.classList.add('active'); });
  document.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { overlay.classList.remove('active'); dragCounter = 0; } });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); dragCounter = 0; overlay.classList.remove('active');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  // Depth → rebuild UI + heavy reprocess
  document.getElementById('sl-depth').addEventListener('input', e => {
    document.getElementById('val-depth').textContent = e.target.value;
    buildLevelUI();
  });

  // Point size → instant uniform update
  document.getElementById('sl-ptsize').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    document.getElementById('val-ptsize').textContent = v.toFixed(1);
    if (shaderMaterial) {
      shaderMaterial.uniforms.u_pointSize.value = v;
    }
  });

  // Gap scale → instant uniform update
  document.getElementById('sl-gapscale').addEventListener('input', e => {
    document.getElementById('val-gapscale').textContent = parseFloat(e.target.value).toFixed(2);
  });

  // Auto-rotate
  document.getElementById('chk-rotate').addEventListener('change', e => {
    perspControls.autoRotate = e.target.checked;
  });

  // Manual reprocess button
  document.getElementById('btn-process').addEventListener('click', runHeavyProcess);

  // PLY export
  document.getElementById('btn-export').addEventListener('click', exportPLY);

  // ── Debounced change handlers ──
  let heavyTimer = null, lightTimer = null;

  // HEAVY triggers: depth, bits sliders, data type, endianness
  const triggerHeavy = () => {
    clearTimeout(heavyTimer);
    heavyTimer = setTimeout(() => { if (fileBuffer) runHeavyProcess(); }, 400);
  };

  // LIGHT triggers: gap sliders, gap scale (uniform-only, instant)
  const triggerLight = () => {
    clearTimeout(lightTimer);
    lightTimer = setTimeout(runLightUpdate, 30); // near-instant
  };

  // Wire bits sliders → heavy (via event delegation on container)
  document.getElementById('levels-container').addEventListener('input', e => {
    if (e.target.classList.contains('bits-slider')) {
      triggerHeavy();
    } else if (e.target.classList.contains('gap-slider')) {
      triggerLight();
    }
  });

  // Depth change → heavy
  document.getElementById('sl-depth').addEventListener('input', triggerHeavy);

  // Data interpretation → heavy
  document.getElementById('sel-type').addEventListener('change', triggerHeavy);
  document.getElementById('sel-endian').addEventListener('change', triggerHeavy);

  // Gap scale → light
  document.getElementById('sl-gapscale').addEventListener('input', triggerLight);

  // Sort order → medium (re-sort + rebuild geometry, no file re-read)
  document.getElementById('sel-order').addEventListener('change', runSortUpdate);
}

init();
</script>
</body>
