<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nested Mosaic — Hierarchical 3n-Tuple Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --panel-border: #1e1e2a;
    --text: #c8c8d4;
    --text-dim: #6a6a7e;
    --text-bright: #eeeef4;
    --accent: #4af;
    --accent-dim: #2a6fa8;
    --accent-glow: rgba(68, 170, 255, 0.15);
    --warn: #f84;
    --success: #4f8;
    --tiled: #f4a;
    --tiled-dim: #a83070;
    --slider-track: #222230;
    --slider-thumb: #4af;
    --input-bg: #16161f;
    --input-border: #2a2a38;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    overflow: hidden;
    user-select: none;
  }

  #canvas-container {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #drop-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 1000;
    background: rgba(6, 6, 12, 0.92);
    backdrop-filter: blur(12px);
    justify-content: center; align-items: center;
    flex-direction: column; gap: 16px;
    font-family: var(--font-display);
  }
  #drop-overlay.active { display: flex; }
  #drop-overlay .icon {
    font-size: 64px; opacity: 0.7;
    animation: pulse 1.5s ease-in-out infinite;
  }
  #drop-overlay .label {
    font-size: 22px; font-weight: 600;
    color: var(--accent); letter-spacing: 1px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.08); opacity: 1; }
  }

  #panel {
    position: absolute;
    top: 16px; left: 16px;
    width: 290px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    z-index: 10;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }
  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

  .panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--panel-border);
    font-family: var(--font-display);
  }
  .panel-header h1 {
    font-size: 16px; font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 0.5px;
  }
  .panel-header .sub {
    font-size: 10px; color: var(--text-dim);
    margin-top: 4px; font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }

  .section {
    padding: 14px 18px;
    border-bottom: 1px solid var(--panel-border);
  }
  .section:last-child { border-bottom: none; }

  .section-title {
    font-size: 9px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .row { margin-bottom: 10px; }
  .row:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 11px;
    color: var(--text);
    margin-bottom: 4px;
  }

  select, input[type="number"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 5px;
    color: var(--text-bright);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input[type="number"]:focus { border-color: var(--accent-dim); }
  select option { background: var(--panel); }

  .slider-row {
    display: flex; align-items: center; gap: 8px;
  }
  .slider-row input[type="range"] { flex: 1; }
  .slider-row .val {
    min-width: 30px;
    text-align: right;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    height: 4px;
    background: var(--slider-track);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--slider-thumb);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(68,170,255,0.4);
  }

  .inline-row { display: flex; gap: 10px; }
  .inline-row .row { flex: 1; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .toggle {
    position: relative;
    width: 36px; height: 20px;
    cursor: pointer;
  }
  .toggle input { display: none; }
  .toggle .track {
    position: absolute; inset: 0;
    background: var(--slider-track);
    border-radius: 10px;
    transition: background 0.2s;
  }
  .toggle input:checked + .track { background: var(--accent-dim); }
  .toggle .knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: var(--text-bright);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked ~ .knob { transform: translateX(16px); }

  .mode-switch {
    display: flex;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 6px;
    overflow: hidden;
  }
  .mode-switch button {
    flex: 1;
    padding: 8px 0;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.25s;
  }
  .mode-switch button.active {
    color: var(--text-bright);
    background: var(--accent-dim);
  }
  .mode-switch button.active.tiled-active {
    background: var(--tiled-dim);
  }
  .mode-switch button:not(.active):hover {
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }

  .file-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, var(--accent-dim), #1a4a70);
    border: 1px solid var(--accent-dim);
    border-radius: 6px;
    color: var(--text-bright);
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .file-btn:hover {
    background: linear-gradient(135deg, #3080c0, var(--accent-dim));
    box-shadow: 0 0 16px var(--accent-glow);
  }
  #file-input { display: none; }

  .file-info {
    margin-top: 8px;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.6;
    word-break: break-all;
  }
  .file-info .fname { color: var(--accent); font-weight: 500; }

  .process-btn {
    width: 100%;
    padding: 10px;
    background: var(--input-bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .process-btn:hover {
    border-color: var(--accent-dim);
    color: var(--text-bright);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .process-btn:disabled {
    opacity: 0.3; cursor: default; box-shadow: none;
  }

  .level-block {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .level-block:last-child { margin-bottom: 0; }
  .level-label {
    font-size: 10px; font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .tiled-mode .level-label { color: var(--tiled); }

  #stats {
    position: absolute;
    bottom: 16px; left: 16px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 12px 16px;
    z-index: 10;
    font-size: 10px;
    line-height: 1.8;
    min-width: 240px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #stats .stat-val { color: var(--accent); font-weight: 500; }
  #stats .stat-label { color: var(--text-dim); }
  #stats .stat-tiled { color: var(--tiled); font-weight: 500; }

  #help {
    position: absolute;
    bottom: 16px; right: 16px;
    font-size: 10px;
    color: var(--text-dim);
    z-index: 10;
    text-align: right;
    line-height: 1.8;
  }

  #loading {
    display: none;
    position: fixed; inset: 0;
    z-index: 500;
    background: rgba(6,6,12,0.8);
    justify-content: center; align-items: center;
    font-family: var(--font-display);
    font-size: 16px; color: var(--accent);
  }
  #loading.active { display: flex; }
  #loading .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--panel-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .mode-badge {
    display: inline-block;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 0.5px;
    vertical-align: middle;
  }
  .mode-badge.badge-3d {
    background: rgba(68,170,255,0.15);
    color: var(--accent);
  }
  .mode-badge.badge-tiled {
    background: rgba(255,68,170,0.15);
    color: var(--tiled);
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="drop-overlay">
  <div class="icon">⬡</div>
  <div class="label">Drop any file to visualize</div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <span>Processing…</span>
</div>

<div id="panel">
  <div class="panel-header">
    <h1>Nested Mosaic</h1>
    <div class="sub">hierarchical 3n-tuple viewer</div>
  </div>

  <div class="section">
    <div class="section-title">Projection</div>
    <div class="mode-switch">
      <button id="btn-mode-3d" class="active" onclick="setMode('3d')">⬡ 3D Spatial</button>
      <button id="btn-mode-tiled" onclick="setMode('tiled')">⊞ Tiled 2D</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">File</div>
    <button class="file-btn" onclick="document.getElementById('file-input').click()">
      ⬡ &nbsp;Load File
    </button>
    <input type="file" id="file-input">
    <div id="file-info" class="file-info"></div>
  </div>

  <div class="section">
    <div class="section-title">Data Interpretation</div>
    <div class="inline-row">
      <div class="row">
        <label>Type</label>
        <select id="sel-type">
          <option value="uint8" selected>uint8</option>
          <option value="int8">int8</option>
          <option value="uint16">uint16</option>
          <option value="int16">int16</option>
          <option value="uint32">uint32</option>
          <option value="int32">int32</option>
        </select>
      </div>
      <div class="row">
        <label>Endian</label>
        <select id="sel-endian">
          <option value="little" selected>Little</option>
          <option value="big">Big</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Nesting Levels</div>
    <div class="row">
      <label>Depth</label>
      <div class="slider-row">
        <input type="range" id="sl-depth" min="1" max="4" value="2" step="1">
        <span class="val" id="val-depth">2</span>
      </div>
    </div>
    <div id="levels-container"></div>
  </div>

  <div class="section">
    <div class="section-title">Rendering</div>
    <div class="row">
      <label>Point Size</label>
      <div class="slider-row">
        <input type="range" id="sl-ptsize" min="0.5" max="8" value="2" step="0.1">
        <span class="val" id="val-ptsize">2.0</span>
      </div>
    </div>
    <div class="row">
      <label>Global Gap Scale</label>
      <div class="slider-row">
        <input type="range" id="sl-gapscale" min="0" max="3" value="1" step="0.05">
        <span class="val" id="val-gapscale">1.00</span>
      </div>
    </div>
    <div class="row toggle-row" id="row-autorotate">
      <label>Auto-Rotate</label>
      <label class="toggle">
        <input type="checkbox" id="chk-rotate" checked>
        <div class="track"></div>
        <div class="knob"></div>
      </label>
    </div>
  </div>

  <div class="section">
    <button class="process-btn" id="btn-process" disabled>Reprocess</button>
  </div>
</div>

<div id="stats"></div>

<div id="help">
  LMB — orbit &nbsp;│&nbsp; RMB — pan &nbsp;│&nbsp; Scroll — zoom<br>
  Drop any file to load
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ─── Data Types ───
const DATA_TYPES = {
  int8:   { size: 1, min: -128,        max: 127,        method: 'getInt8' },
  uint8:  { size: 1, min: 0,           max: 255,        method: 'getUint8' },
  int16:  { size: 2, min: -32768,      max: 32767,      method: 'getInt16' },
  uint16: { size: 2, min: 0,           max: 65535,      method: 'getUint16' },
  int32:  { size: 4, min: -2147483648, max: 2147483647, method: 'getInt32' },
  uint32: { size: 4, min: 0,           max: 4294967295, method: 'getUint32' }
};

// ─── State ───
let fileBuffer = null;
let fileName = '';
let pointCloud = null;
let scene, renderer;
let perspCamera, orthoCamera, camera;
let perspControls, orthoControls, controls;
let projectionMode = '3d';
let gridHelper = null;

const ORTHO_BASE = 4;

// ─── THREE.js Setup ───
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);

  const aspect = window.innerWidth / window.innerHeight;

  // ── Perspective camera ──
  perspCamera = new THREE.PerspectiveCamera(55, aspect, 0.01, 1000);
  perspCamera.position.set(3.5, 2.5, 3.5);

  // ── Orthographic camera (top-down for tiled) ──
  orthoCamera = new THREE.OrthographicCamera(
    -ORTHO_BASE * aspect, ORTHO_BASE * aspect,
    ORTHO_BASE, -ORTHO_BASE, 0.01, 1000
  );
  orthoCamera.position.set(0, 50, 0);
  orthoCamera.lookAt(0, 0, 0);

  camera = perspCamera;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  // ── OrbitControls: perspective (full orbit) ──
  perspControls = new THREE.OrbitControls(perspCamera, renderer.domElement);
  perspControls.enableDamping = true;
  perspControls.dampingFactor = 0.07;
  perspControls.autoRotate = true;
  perspControls.autoRotateSpeed = 0.8;
  perspControls.minDistance = 0.3;
  perspControls.maxDistance = 200;
  perspControls.target.set(0, 0, 0);

  // ── OrbitControls: ortho (pan + zoom only) ──
  orthoControls = new THREE.OrbitControls(orthoCamera, renderer.domElement);
  orthoControls.enableDamping = true;
  orthoControls.dampingFactor = 0.07;
  orthoControls.enableRotate = false;
  orthoControls.screenSpacePanning = false; // pan on XZ ground plane
  orthoControls.mouseButtons = {
    LEFT: THREE.MOUSE.PAN,
    MIDDLE: THREE.MOUSE.DOLLY,
    RIGHT: THREE.MOUSE.PAN
  };
  orthoControls.touches = {
    ONE: THREE.TOUCH.PAN,
    TWO: THREE.TOUCH.DOLLY_PAN
  };
  orthoControls.minZoom = 0.005;
  orthoControls.maxZoom = 500;
  orthoControls.target.set(0, 0, 0);
  orthoControls.enabled = false;

  controls = perspControls;

  // ── Grid ──
  gridHelper = new THREE.GridHelper(4, 20, 0x1a1a28, 0x12121a);
  gridHelper.position.y = -2;
  scene.add(gridHelper);

  // ── Resize ──
  window.addEventListener('resize', onResize);

  animate();
}

function onResize() {
  const a = window.innerWidth / window.innerHeight;
  perspCamera.aspect = a;
  perspCamera.updateProjectionMatrix();

  orthoCamera.left   = -ORTHO_BASE * a;
  orthoCamera.right  =  ORTHO_BASE * a;
  orthoCamera.top    =  ORTHO_BASE;
  orthoCamera.bottom = -ORTHO_BASE;
  orthoCamera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ─── Mode switching ───
function setMode(mode) {
  projectionMode = mode;

  document.getElementById('btn-mode-3d').classList.toggle('active', mode === '3d');
  document.getElementById('btn-mode-tiled').classList.toggle('active', mode === 'tiled');
  document.getElementById('btn-mode-tiled').classList.toggle('tiled-active', mode === 'tiled');
  document.getElementById('row-autorotate').style.display = mode === '3d' ? '' : 'none';

  const helpEl = document.getElementById('help');
  if (mode === '3d') {
    helpEl.innerHTML = 'LMB — orbit &nbsp;│&nbsp; RMB — pan &nbsp;│&nbsp; Scroll — zoom<br>Drop any file to load';
  } else {
    helpEl.innerHTML = 'Drag — pan &nbsp;│&nbsp; Scroll — zoom<br>Z tiles as √(2^b) columns &nbsp;│&nbsp; Drop any file';
  }

  if (mode === 'tiled') {
    perspControls.enabled = false;
    orthoControls.enabled = true;
    controls = orthoControls;
    camera = orthoCamera;

    orthoCamera.position.set(0, 50, 0);
    orthoCamera.zoom = 1;
    orthoCamera.updateProjectionMatrix();
    orthoControls.target.set(0, 0, 0);
    orthoControls.update();
    gridHelper.visible = false;
  } else {
    orthoControls.enabled = false;
    perspControls.enabled = true;
    controls = perspControls;
    camera = perspCamera;

    perspCamera.position.set(3.5, 2.5, 3.5);
    perspControls.target.set(0, 0, 0);
    perspControls.autoRotate = document.getElementById('chk-rotate').checked;
    perspControls.update();
    gridHelper.visible = true;
  }

  document.getElementById('levels-container').classList.toggle('tiled-mode', mode === 'tiled');
  if (fileBuffer) runProcess();
}

// ─── Level UI ───
function buildLevelUI() {
  const depth = parseInt(document.getElementById('sl-depth').value);
  const container = document.getElementById('levels-container');

  const existing = {};
  container.querySelectorAll('.level-block').forEach(block => {
    const lvl = block.dataset.level;
    const b = block.querySelector('.bits-slider');
    const g = block.querySelector('.gap-slider');
    if (b && g) existing[lvl] = { bits: b.value, gap: g.value };
  });

  container.innerHTML = '';

  const defaults = [
    { bits: 4, gap: 0.4 },
    { bits: 6, gap: 0.15 },
    { bits: 4, gap: 0.05 },
    { bits: 3, gap: 0.02 }
  ];

  for (let i = 0; i < depth; i++) {
    const prev = existing[i];
    const def = defaults[i] || { bits: 3, gap: 0.1 };
    const bits = prev ? prev.bits : def.bits;
    const gap  = prev ? prev.gap  : def.gap;

    const block = document.createElement('div');
    block.className = 'level-block';
    block.dataset.level = i;
    block.innerHTML = `
      <div class="level-label">Level ${i} — ${i === 0 ? 'Outer' : i === depth - 1 ? 'Inner' : 'Mid'}</div>
      <div class="row">
        <label>Bits (2^n divisions)</label>
        <div class="slider-row">
          <input type="range" class="bits-slider" min="1" max="8" value="${bits}" step="1">
          <span class="val bits-val">${bits} → ${1 << bits}</span>
        </div>
      </div>
      <div class="row">
        <label>Gap</label>
        <div class="slider-row">
          <input type="range" class="gap-slider" min="0" max="1.5" value="${gap}" step="0.01">
          <span class="val gap-val">${parseFloat(gap).toFixed(2)}</span>
        </div>
      </div>
    `;
    container.appendChild(block);

    const bitsSlider = block.querySelector('.bits-slider');
    const gapSlider  = block.querySelector('.gap-slider');
    bitsSlider.addEventListener('input', () => {
      block.querySelector('.bits-val').textContent = `${bitsSlider.value} → ${1 << bitsSlider.value}`;
    });
    gapSlider.addEventListener('input', () => {
      block.querySelector('.gap-val').textContent = parseFloat(gapSlider.value).toFixed(2);
    });
  }

  container.classList.toggle('tiled-mode', projectionMode === 'tiled');
}

// ─── Config ───
function getConfig() {
  const levels = [];
  document.querySelectorAll('.level-block').forEach(block => {
    levels.push({
      bits: parseInt(block.querySelector('.bits-slider').value),
      gap:  parseFloat(block.querySelector('.gap-slider').value)
    });
  });
  return {
    dataType: document.getElementById('sel-type').value,
    isLittleEndian: document.getElementById('sel-endian').value === 'little',
    levels,
    pointSize: parseFloat(document.getElementById('sl-ptsize').value),
    gapScale: parseFloat(document.getElementById('sl-gapscale').value),
    mode: projectionMode
  };
}

// ──────────────────────────────────────────
// ─── 3D Hierarchical Processing ─────────
// ──────────────────────────────────────────
function process3D(buffer, dataType, isLittleEndian, levels, gapScale) {
  const cfg = DATA_TYPES[dataType];
  const typeSize = cfg.size, tupleSize = typeSize * 3;
  const view = new DataView(buffer);
  const maxTuples = Math.floor(buffer.byteLength / tupleSize);
  if (maxTuples === 0) throw new Error('Buffer too small');

  const dMin = cfg.min, dRange = cfg.max - cfg.min, rm = cfg.method;

  const lp = levels.map(l => {
    const d = 1 << l.bits;
    return { d, gap: l.gap * gapScale, maxI: d - 1 };
  });

  // Isotropic strides, bottom-up
  const strides = new Array(lp.length);
  strides[lp.length - 1] = 1;
  for (let i = lp.length - 2; i >= 0; i--) {
    const inner = lp[i + 1];
    strides[i] = inner.d * strides[i + 1] + (inner.d - 1) * strides[i + 1] * inner.gap;
  }
  const steps = lp.map((p, i) => strides[i] * (1 + p.gap));

  const seen = new Set();
  const pos = [], col = [];
  let dupes = 0;
  const cellSets = levels.map(() => new Set());

  for (let t = 0; t < maxTuples; t++) {
    const o = t * tupleSize;
    const rx = (view[rm](o, isLittleEndian) - dMin) / dRange;
    const ry = (view[rm](o + typeSize, isLittleEndian) - dMin) / dRange;
    const rz = (view[rm](o + typeSize * 2, isLittleEndian) - dMin) / dRange;

    let remX = Math.max(0, Math.min(0.999999, rx));
    let remY = Math.max(0, Math.min(0.999999, ry));
    let remZ = Math.max(0, Math.min(0.999999, rz));

    let wx = 0, wy = 0, wz = 0, key = '';

    for (let i = 0; i < lp.length; i++) {
      const p = lp[i];
      const ix = Math.min(p.maxI, Math.floor(remX * p.d));
      const iy = Math.min(p.maxI, Math.floor(remY * p.d));
      const iz = Math.min(p.maxI, Math.floor(remZ * p.d));
      cellSets[i].add((iz * p.d + iy) * p.d + ix);
      key += ix + ',' + iy + ',' + iz + ';';
      wx += ix * steps[i];
      wy += iy * steps[i];
      wz += iz * steps[i];
      remX = remX * p.d - ix;
      remY = remY * p.d - iy;
      remZ = remZ * p.d - iz;
    }

    if (seen.has(key)) { dupes++; continue; }
    seen.add(key);
    pos.push(wx, wy, wz);
    col.push(rx, ry, rz);
  }

  centerAndScale(pos, 3);
  return {
    positions: new Float32Array(pos),
    colors: new Float32Array(col),
    numPoints: pos.length / 3,
    totalTuples: maxTuples,
    duplicates: dupes,
    cellsPerLevel: cellSets.map(s => s.size)
  };
}

// ──────────────────────────────────────────────
// ─── Tiled 2D Hierarchical Projection ───────
// ──────────────────────────────────────────────
//
// Per-level: Z-index tiles into √d columns × ⌈d/√d⌉ rows,
// X and Y fill within each tile. Nested levels create
// tiles-within-tiles — fractal mosaic in 2D.
//
function processTiled(buffer, dataType, isLittleEndian, levels, gapScale) {
  const cfg = DATA_TYPES[dataType];
  const typeSize = cfg.size, tupleSize = typeSize * 3;
  const view = new DataView(buffer);
  const maxTuples = Math.floor(buffer.byteLength / tupleSize);
  if (maxTuples === 0) throw new Error('Buffer too small');

  const dMin = cfg.min, dRange = cfg.max - cfg.min, rm = cfg.method;

  const lp = levels.map(l => {
    const d = 1 << l.bits;
    const sqrtD  = Math.max(1, Math.floor(Math.sqrt(d)));
    const zCols  = sqrtD;
    const zRows  = Math.ceil(d / sqrtD);
    return {
      d, gap: l.gap * gapScale, maxI: d - 1,
      zCols, zRows,
      tiledW: zCols * d,
      tiledH: zRows * d
    };
  });

  // 2D strides, bottom-up
  const strX = new Array(lp.length);
  const strY = new Array(lp.length);
  strX[lp.length - 1] = 1;
  strY[lp.length - 1] = 1;

  for (let i = lp.length - 2; i >= 0; i--) {
    const inner = lp[i + 1];
    strX[i] = inner.tiledW * strX[i + 1] * (1 + inner.gap);
    strY[i] = inner.tiledH * strY[i + 1] * (1 + inner.gap);
  }

  const stepX = lp.map((p, i) => strX[i] * (1 + p.gap));
  const stepY = lp.map((p, i) => strY[i] * (1 + p.gap));

  const seen = new Set();
  const pos = [], col = [];
  let dupes = 0;
  const cellSets = levels.map(() => new Set());

  for (let t = 0; t < maxTuples; t++) {
    const o = t * tupleSize;
    const rx = (view[rm](o, isLittleEndian) - dMin) / dRange;
    const ry = (view[rm](o + typeSize, isLittleEndian) - dMin) / dRange;
    const rz = (view[rm](o + typeSize * 2, isLittleEndian) - dMin) / dRange;

    let remX = Math.max(0, Math.min(0.999999, rx));
    let remY = Math.max(0, Math.min(0.999999, ry));
    let remZ = Math.max(0, Math.min(0.999999, rz));

    let wx = 0, wy = 0, key = '';

    for (let i = 0; i < lp.length; i++) {
      const p = lp[i];
      const ix = Math.min(p.maxI, Math.floor(remX * p.d));
      const iy = Math.min(p.maxI, Math.floor(remY * p.d));
      const iz = Math.min(p.maxI, Math.floor(remZ * p.d));

      cellSets[i].add((iz * p.d + iy) * p.d + ix);
      key += ix + ',' + iy + ',' + iz + ';';

      const tileCol = iz % p.zCols;
      const tileRow = Math.floor(iz / p.zCols);

      wx += (tileCol * p.d + ix) * stepX[i];
      wy += (tileRow * p.d + iy) * stepY[i];

      remX = remX * p.d - ix;
      remY = remY * p.d - iy;
      remZ = remZ * p.d - iz;
    }

    if (seen.has(key)) { dupes++; continue; }
    seen.add(key);

    // Flat on XZ plane (Y=0) for ortho top-down
    pos.push(wx, 0, wy);
    col.push(rx, ry, rz);
  }

  centerAndScale(pos, 3);
  return {
    positions: new Float32Array(pos),
    colors: new Float32Array(col),
    numPoints: pos.length / 3,
    totalTuples: maxTuples,
    duplicates: dupes,
    cellsPerLevel: cellSets.map(s => s.size),
    levelParams: lp
  };
}

// ─── Center & scale ───
function centerAndScale(positions, fitSize) {
  if (positions.length === 0) return;
  let mnX = Infinity, mnY = Infinity, mnZ = Infinity;
  let mxX = -Infinity, mxY = -Infinity, mxZ = -Infinity;
  for (let i = 0; i < positions.length; i += 3) {
    mnX = Math.min(mnX, positions[i]);
    mnY = Math.min(mnY, positions[i+1]);
    mnZ = Math.min(mnZ, positions[i+2]);
    mxX = Math.max(mxX, positions[i]);
    mxY = Math.max(mxY, positions[i+1]);
    mxZ = Math.max(mxZ, positions[i+2]);
  }
  const cx = (mnX + mxX) / 2, cy = (mnY + mxY) / 2, cz = (mnZ + mxZ) / 2;
  const span = Math.max(mxX - mnX, mxY - mnY, mxZ - mnZ) || 1;
  const scale = fitSize / span;
  for (let i = 0; i < positions.length; i += 3) {
    positions[i]   = (positions[i]   - cx) * scale;
    positions[i+1] = (positions[i+1] - cy) * scale;
    positions[i+2] = (positions[i+2] - cz) * scale;
  }
}

// ─── Visualization ───
function buildPointCloud(result, pointSize) {
  if (pointCloud) {
    pointCloud.geometry.dispose();
    pointCloud.material.dispose();
    scene.remove(pointCloud);
    pointCloud = null;
  }
  if (result.numPoints === 0) return;

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(result.positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(result.colors, 3));

  const mat = new THREE.PointsMaterial({
    size: pointSize * 0.01,
    vertexColors: true,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.88,
    depthWrite: false
  });

  pointCloud = new THREE.Points(geo, mat);
  scene.add(pointCloud);

  // Reset active controls to frame the data
  if (projectionMode === '3d') {
    perspCamera.position.set(3.5, 2.5, 3.5);
    perspControls.target.set(0, 0, 0);
    perspControls.update();
  } else {
    orthoCamera.position.set(0, 50, 0);
    orthoCamera.zoom = 1;
    orthoCamera.updateProjectionMatrix();
    orthoControls.target.set(0, 0, 0);
    orthoControls.update();
  }
}

function updateStats(result, config, elapsed) {
  const el = document.getElementById('stats');
  if (!result) { el.innerHTML = ''; return; }

  const isTiled = config.mode === 'tiled';
  const badge = isTiled
    ? '<span class="mode-badge badge-tiled">TILED 2D</span>'
    : '<span class="mode-badge badge-3d">3D SPATIAL</span>';

  const levelInfo = config.levels.map((l, i) => {
    const d = 1 << l.bits;
    if (isTiled) {
      const sqrtD = Math.max(1, Math.floor(Math.sqrt(d)));
      const zRows = Math.ceil(d / sqrtD);
      return `L${i}: <span class="stat-tiled">${sqrtD}×${zRows}</span>z → <span class="stat-val">${d}</span>²xy`;
    }
    return `L${i}: <span class="stat-val">${d}</span>³`;
  }).join('<br>&nbsp;&nbsp;');

  const totalRes = config.levels.reduce((s, l) => s * (1 << l.bits), 1);

  el.innerHTML = `
    ${badge}<br>
    <span class="stat-label">Points:</span> <span class="stat-val">${result.numPoints.toLocaleString()}</span>
    <span class="stat-label"> / ${result.totalTuples.toLocaleString()} tuples</span><br>
    <span class="stat-label">Deduped:</span> <span class="stat-val">${result.duplicates.toLocaleString()}</span><br>
    <span class="stat-label">Grid:</span> ${levelInfo}<br>
    <span class="stat-label">Effective:</span> <span class="stat-val">${totalRes}${isTiled ? '² flat' : '³'}</span><br>
    <span class="stat-label">Cells:</span> ${result.cellsPerLevel.map((c, i) =>
      `L${i}:<span class="stat-val">${c}</span>`).join(' ')}<br>
    <span class="stat-label">Time:</span> <span class="stat-val">${elapsed}ms</span>
  `;
}

// ─── Processing pipeline ───
function runProcess() {
  if (!fileBuffer) return;
  const loading = document.getElementById('loading');
  loading.classList.add('active');

  requestAnimationFrame(() => {
    setTimeout(() => {
      try {
        const config = getConfig();
        const t0 = performance.now();
        const result = config.mode === 'tiled'
          ? processTiled(fileBuffer, config.dataType, config.isLittleEndian, config.levels, config.gapScale)
          : process3D(fileBuffer, config.dataType, config.isLittleEndian, config.levels, config.gapScale);
        const elapsed = Math.round(performance.now() - t0);
        buildPointCloud(result, config.pointSize);
        updateStats(result, config, elapsed);
        console.log(`[${config.mode}] ${result.numPoints} unique from ${result.totalTuples} tuples — ${elapsed}ms`);
      } catch (err) {
        console.error('Processing error:', err);
        document.getElementById('stats').innerHTML =
          `<span style="color:var(--warn)">Error: ${err.message}</span>`;
      }
      loading.classList.remove('active');
    }, 30);
  });
}

// ─── File handling ───
function loadFile(file) {
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    fileBuffer = e.target.result;
    const cfg = DATA_TYPES[document.getElementById('sel-type').value];
    const tuples = Math.floor(fileBuffer.byteLength / (cfg.size * 3));
    document.getElementById('file-info').innerHTML =
      `<span class="fname">${fileName}</span><br>${fileBuffer.byteLength.toLocaleString()} bytes — ~${tuples.toLocaleString()} tuples`;
    document.getElementById('btn-process').disabled = false;
    runProcess();
  };
  reader.readAsArrayBuffer(file);
}

// ─── Init ───
function init() {
  initThree();
  buildLevelUI();

  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  // Drag and drop
  const overlay = document.getElementById('drop-overlay');
  let dragCounter = 0;
  document.addEventListener('dragenter', e => {
    e.preventDefault(); dragCounter++;
    overlay.classList.add('active');
  });
  document.addEventListener('dragleave', e => {
    e.preventDefault(); dragCounter--;
    if (dragCounter <= 0) { overlay.classList.remove('active'); dragCounter = 0; }
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); dragCounter = 0;
    overlay.classList.remove('active');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });

  document.getElementById('sl-depth').addEventListener('input', e => {
    document.getElementById('val-depth').textContent = e.target.value;
    buildLevelUI();
  });

  document.getElementById('sl-ptsize').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    document.getElementById('val-ptsize').textContent = v.toFixed(1);
    if (pointCloud) pointCloud.material.size = v * 0.01;
  });

  document.getElementById('sl-gapscale').addEventListener('input', e => {
    document.getElementById('val-gapscale').textContent = parseFloat(e.target.value).toFixed(2);
  });

  document.getElementById('chk-rotate').addEventListener('change', e => {
    perspControls.autoRotate = e.target.checked;
  });

  document.getElementById('btn-process').addEventListener('click', runProcess);

  // Debounced auto-reprocess on parameter changes
  let dt = null;
  const ar = () => { clearTimeout(dt); dt = setTimeout(() => { if (fileBuffer) runProcess(); }, 400); };

  document.getElementById('levels-container').addEventListener('input', ar);
  document.getElementById('sl-gapscale').addEventListener('input', ar);
  document.getElementById('sel-type').addEventListener('change', ar);
  document.getElementById('sel-endian').addEventListener('change', ar);
  document.getElementById('sl-depth').addEventListener('input', ar);
}

init();
</script>
