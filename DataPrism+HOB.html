<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPrism - what's in your file?</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            background-color: #000;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        #dropZone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: none;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 3px dashed rgba(79, 195, 247, 0.6);
            box-sizing: border-box;
        }
        
        #dropZone.dragover {
            background: rgba(79, 195, 247, 0.2);
            border-color: #4fc3f7;
        }
        
        #dropZone .drop-content {
            padding: 40px;
            border-radius: 12px;
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.9), rgba(40, 40, 40, 0.8));
            border: 2px solid rgba(79, 195, 247, 0.4);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }
        
        #dropZone .drop-icon {
            font-size: 48px;
            margin-bottom: 16px;
            color: #4fc3f7;
        }
        
        #dropZone .drop-text {
            font-size: 24px;
            margin-bottom: 8px;
            color: #4fc3f7;
        }
        
        #dropZone .drop-subtext {
            font-size: 14px;
            color: #ccc;
            opacity: 0.8;
        }
        
        #controls {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 12px;
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.95), rgba(40, 40, 40, 0.9));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
            width: 220px;
            font-size: 12px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform-origin: top left;
        }
        #controls.minimized {
            transform: scale(0.1);
            opacity: 0;
            pointer-events: none;
        }
        #controls h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: #4fc3f7;
            text-align: center;
            border-bottom: 1px solid rgba(79, 195, 247, 0.3);
            padding-bottom: 6px;
            position: relative;
        }
        #minimizeButton {
            position: absolute;
            top: -2px;
            right: 0;
            background: none;
            border: none;
            color: #4fc3f7;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
            transition: background-color 0.2s ease, transform 0.2s ease;
            line-height: 1;
            width: 24px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #minimizeButton:hover {
            background-color: rgba(79, 195, 247, 0.2);
            transform: scale(1.1);
        }
        #restoreButton {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.95), rgba(40, 40, 40, 0.9));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 195, 247, 0.5);
            border-radius: 50%;
            color: #4fc3f7;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            width: 40px;
            height: 40px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 101;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }
        #restoreButton:hover {
            background: linear-gradient(145deg, rgba(79, 195, 247, 0.2), rgba(79, 195, 247, 0.1));
            border-color: #4fc3f7;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(79, 195, 247, 0.3);
        }
        .control-group {
            margin-bottom: 8px;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .control-row label {
            font-size: 11px;
            color: #ccc;
            margin: 0;
            width: 70px;
            min-width: 70px;
            flex-shrink: 0;
        }
        .control-row input, .control-row select {
            flex: 1;
            width: 0; /* Important: allows flex to work properly */
            min-width: 0;
            padding: 3px 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 11px;
            height: 24px;
            box-sizing: border-box;
        }
        .control-row input:focus, .control-row select:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 4px rgba(79, 195, 247, 0.3);
        }
        #fileInput {
            width: 100%;
            padding: 3px 6px;
            border: 1px dashed rgba(79, 195, 247, 0.5);
            border-radius: 4px;
            background: rgba(79, 195, 247, 0.1);
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            margin-bottom: 6px;
            height: 24px;
            box-sizing: border-box;
        }
        #fileInput:hover {
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.2);
        }
        button {
            width: 100%;
            background: linear-gradient(145deg, #1976d2, #1565c0);
            color: white;
            border: none;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-bottom: 3px;
        }
        button:hover:not(:disabled) {
            background: linear-gradient(145deg, #1565c0, #0d47a1);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(21, 101, 192, 0.3);
        }
        button:disabled {
            background: linear-gradient(145deg, #424242, #212121);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        #processButton.highlight {
            background: linear-gradient(145deg, #ff9800, #f57c00) !important;
            animation: pulse 2s infinite;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.4);
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(255, 152, 0, 0.4); }
            50% { box-shadow: 0 0 25px rgba(255, 152, 0, 0.6); }
            100% { box-shadow: 0 0 15px rgba(255, 152, 0, 0.4); }
        }
        
        #fileInfo, #statsInfo {
            font-size: 10px;
            color: #999;
            padding: 4px 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin-bottom: 6px;
            border-left: 3px solid #4fc3f7;
            word-break: break-all;
            overflow-wrap: break-word;
            max-width: 100%;
            line-height: 1.3;
        }
        
        .filename-truncate {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            cursor: help;
        }
        #fileInfo strong, #statsInfo strong {
            color: #4fc3f7;
        }
        #loadingMessage {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.95), rgba(40, 40, 40, 0.9));
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 8px;
            border: 1px solid rgba(79, 195, 247, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 101;
            font-size: 14px;
            color: #4fc3f7;
            text-align: center;
        }
        #exportDialog {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, rgba(20, 20, 20, 0.95), rgba(40, 40, 40, 0.9));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 195, 247, 0.3);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 102;
            width: 280px;
        }
        #exportDialog h3 {
            margin: 0 0 15px 0;
            color: #4fc3f7;
            font-size: 16px;
            text-align: center;
        }
        #exportDialog input {
            width: 100%;
            margin-bottom: 15px;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-sizing: border-box;
        }
        #exportDialog .buttons {
            display: flex;
            gap: 10px;
        }
        #exportDialog .buttons button {
            flex: 1;
            margin-bottom: 0;
        }
        #exportFormat {
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
            text-align: center;
        }
        
        /* Highlight 6-tuple mode */
        .tuple-mode-indicator {
            font-size: 10px;
            color: #ff9800;
            font-weight: bold;
            margin-left: 4px;
        }
        
        /* Highlight continuous path mode */
        .continuous-path-indicator {
            font-size: 10px;
            color: #4caf50;
            font-weight: bold;
            margin-left: 4px;
        }
        
        /* Highlight hilbert curve mode */
        .hilbert-indicator {
            font-size: 10px;
            color: #00bcd4;
            font-weight: bold;
            margin-left: 4px;
        }
        
        /* Highlight BVH mode */
        .bvh-indicator {
            font-size: 10px;
            color: #ff5722;
            font-weight: bold;
            margin-left: 4px;
        }
        
        /* Highlight lattice 2d mode */
        .lattice-indicator {
            font-size: 10px;
            color: #e91e63;
            font-weight: bold;
            margin-left: 4px;
        }
        
        /* Highlight tiled mode */
        .tiled-indicator {
            font-size: 10px;
            color: #9c27b0;
            font-weight: bold;
            margin-left: 4px;
        }
        
        /* Highlight morton octree mode */
        .morton-indicator {
            font-size: 10px;
            color: #00e676;
            font-weight: bold;
            margin-left: 4px;
        }
        
        /* Scrollbar styling for webkit browsers */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(79, 195, 247, 0.6);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="dropZone">
        <div class="drop-content">
            <div class="drop-icon">📊</div>
            <div class="drop-text">Drop file here</div>
            <div class="drop-subtext">Binary data, images, or URLs</div>
        </div>
    </div>
    <div id="controls">
        <h3>
            🎯 DataPrism
            <button id="minimizeButton" title="Minimize controls">−</button>
        </h3>
        <input type="file" id="fileInput">
        <div id="fileInfo"></div>
        <div id="statsInfo"></div>
        
        <div class="control-group">
            <div class="control-row">
                <label for="tupleMode">Mode:</label>
                <select id="tupleMode">
                    <option value="3-tuple">3-Tuple (XYZ)</option>
                    <option value="6-tuple">6-Tuple (XYZRGB)</option>
                </select>
            </div>
            
            <div class="control-row">
                <label for="dataType">Type:</label>
                <select id="dataType">
                    <option value="int8">Int8</option>
                    <option value="uint8">Uint8</option>
                    <option value="int16">Int16</option>
                    <option value="uint16">Uint16</option>
                    <option value="int32">Int32</option>
                    <option value="uint32">Uint32</option>
                    <option value="fp8_e4m3">FP8 (E4M3)</option>
                    <option value="fp8_e5m2">FP8 (E5M2)</option>
                    <option value="fp16">Float16</option>
                    <option value="bf16">BFloat16</option>
                    <option value="fp32">Float32</option>
                </select>
            </div>
            
            <div class="control-row">
                <label for="startOffset">Start Offset:</label>
                <input type="number" id="startOffset" min="0" step="1" value="0">
            </div>
            
            <div class="control-row">
                <label for="chunkSize">Chunk (MB):</label>
                <input type="number" id="chunkSize" min="0.1" max="100" step="0.1" value="1">
            </div>
            
            <div class="control-row">
                <label for="gridSize">Grid:</label>
                <input type="number" id="gridSize" min="1" max="10" step="1" value="3">
            </div>
            
            <div class="control-row">
                <label for="spacing">Gap:</label>
                <input type="number" id="spacing" min="0.5" max="10" step="0.1" value="2.5">
            </div>
            
            <div class="control-row">
                <label for="pointSize">Size:</label>
                <input type="number" id="pointSize" min="0.005" max="1.5" step="0.01" value="0.005">
            </div>
            
            <div class="control-row">
                <label for="endianness">Endian:</label>
                <select id="endianness">
                    <option value="true">Little</option>
                    <option value="false">Big</option>
                </select>
            </div>
            
            <div class="control-row">
                <label for="projectionMode">Projection:</label>
                <select id="projectionMode">
                    <option value="standard">Standard</option>
                    <option value="continuous-path">Continuous Path</option>
                    <option value="hilbert-curve">Hilbert Curve</option>
                    <option value="bvh-with-points">BVH + Points</option>
                    <option value="bvh-only">BVH Only</option>
                    <option value="lattice-2d">Lattice 2D</option>
                    <option value="tiled">Tiled</option>
                    <option value="morton-octree">Morton Octree LOD</option>
                    <option value="morton-tiled">Morton Decomposition</option>
                    <option value="voxel-density">Voxel Density</option>
                    <option value="stereographic">Stereographic</option>
                    <option value="equirectangular">Equirectangular</option>
                    <option value="orthographic-xy">Orthographic XY</option>
                    <option value="orthographic-xz">Orthographic XZ</option>
                    <option value="orthographic-yz">Orthographic YZ</option>
                    <option value="orthographic-3plane">Orthographic 3-Plane</option>
                    <option value="cylindrical">Cylindrical</option>
                </select>
            </div>
            
            <div class="control-row" id="bvhControls" style="display: none;">
                <label for="bvhMaxDepth">BVH Depth:</label>
                <input type="number" id="bvhMaxDepth" min="1" max="12" step="1" value="8">
            </div>
            
            <div class="control-row" id="bvhMinPointsControl" style="display: none;">
                <label for="bvhMinPoints">Min Points:</label>
                <input type="number" id="bvhMinPoints" min="1" max="64" step="1" value="8">
            </div>
            
            <div class="control-row" id="bvhLevelControl" style="display: none;">
                <label for="bvhDisplayLevel">Show Level:</label>
                <select id="bvhDisplayLevel">
                    <option value="-1">All Levels</option>
                    <option value="0">Level 0 (Root)</option>
                    <option value="1">Level 1</option>
                    <option value="2">Level 2</option>
                    <option value="3">Level 3</option>
                    <option value="4">Level 4</option>
                    <option value="5">Level 5</option>
                    <option value="6">Level 6</option>
                    <option value="7">Level 7</option>
                    <option value="8">Level 8</option>
                </select>
            </div>
            
            <div class="control-row" id="mortonWireframeControl" style="display: none;">
                <label for="mortonWireframe">Wireframe:</label>
                <input type="checkbox" id="mortonWireframe" checked style="width: auto; flex: none;">
                <span style="font-size: 10px; color: #00e676; margin-left: 4px;">Octree boxes</span>
            </div>
            
            <div class="control-row" id="mortonLodInfo" style="display: none;">
                <label>LOD Level:</label>
                <span id="mortonLodDisplay" style="font-size: 10px; color: #00e676;">--</span>
            </div>
            
            <!-- Voxel Density Controls -->
            <div id="voxelControls" style="display: none; border-top: 1px solid rgba(255,165,0,0.3); margin-top: 6px; padding-top: 6px;">
                <div style="font-size: 10px; color: #ff9800; font-weight: 600; margin-bottom: 4px; text-align: center;">VOXEL DENSITY</div>
                
                <div class="control-row">
                    <label for="voxelColormap">Colormap:</label>
                    <select id="voxelColormap" style="flex: 1;">
                        <option value="thermal">Thermal</option>
                        <option value="viridis">Viridis</option>
                        <option value="ice">Ice</option>
                        <option value="mono">Mono (spatial)</option>
                        <option value="spatial">Spatial (position RGB)</option>
                    </select>
                </div>
                
                <div class="control-row">
                    <label for="voxelOpacityFloor">Opacity Min:</label>
                    <input type="range" id="voxelOpacityFloor" min="0" max="1" step="0.01" value="0.05" style="flex: 1;">
                    <span id="voxelOpacityFloorVal" style="font-size: 10px; color: #ff9800; width: 28px; text-align: right;">0.05</span>
                </div>
                
                <div class="control-row">
                    <label for="voxelOpacityCeiling">Opacity Max:</label>
                    <input type="range" id="voxelOpacityCeiling" min="0" max="1" step="0.01" value="1.0" style="flex: 1;">
                    <span id="voxelOpacityCeilingVal" style="font-size: 10px; color: #ff9800; width: 28px; text-align: right;">1.00</span>
                </div>
                
                <div class="control-row">
                    <label for="voxelFillPct">Fill %:</label>
                    <input type="range" id="voxelFillPct" min="0.5" max="1" step="0.01" value="0.90" style="flex: 1;">
                    <span id="voxelFillPctVal" style="font-size: 10px; color: #ff9800; width: 28px; text-align: right;">90%</span>
                </div>
                
                <div class="control-row">
                    <label for="voxelDensityScale">Scale:</label>
                    <select id="voxelDensityScale" style="flex: 1;">
                        <option value="log">Logarithmic</option>
                        <option value="sqrt">Square Root</option>
                        <option value="linear">Linear</option>
                    </select>
                </div>
                
                <div class="control-row">
                    <label for="voxelWireframe">Wireframe:</label>
                    <input type="checkbox" id="voxelWireframe" style="width: auto; flex: none;">
                    <span style="font-size: 10px; color: #ff9800; margin-left: 4px;">Cell edges</span>
                </div>
                
                <div class="control-row">
                    <label>LOD Level:</label>
                    <span id="voxelLodDisplay" style="font-size: 10px; color: #ff9800;">--</span>
                </div>
            </div>
            
            <div class="control-row">
                <label for="useQuantization">Quantize:</label>
                <input type="checkbox" id="useQuantization" checked style="width: auto; flex: none;">
                <span style="font-size: 10px; color: #999; margin-left: 4px;">Remove duplicates</span>
            </div>
            
            <div class="control-row">
                <label for="quantizationBits">Q-Bits:</label>
                <input type="number" id="quantizationBits" min="2" max="10" step="1" value="8">
            </div>
        </div>
        
        <button id="processButton" disabled>🔄 Process File</button>
        <button id="resetButton">🎯 Reset View</button>
        <button id="exportPlyButton" disabled>📄 Export PLY</button>
    </div>

    <button id="restoreButton" title="Show controls">🎯</button>
    
    <div id="loadingMessage">
        <div>⏳ Processing data...</div>
        <div style="font-size: 12px; margin-top: 8px; opacity: 0.8;">Please wait</div>
    </div>
    
    <div id="exportDialog">
        <h3>Export File</h3>
        <label for="exportFilename" style="display: block; margin-bottom: 8px; font-size: 12px;">Filename:</label>
        <input type="text" id="exportFilename" placeholder="Enter filename">
        <div id="exportFormat"></div>
        <div class="buttons">
            <button id="cancelExport">❌ Cancel</button>
            <button id="confirmExport">✅ Export</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
  
    <script>
    // Data type configuration constants
    const DATA_TYPES = {
        int8: { size: 1, min: -128, max: 127, method: 'getInt8', isFloat: false },
        uint8: { size: 1, min: 0, max: 255, method: 'getUint8', isFloat: false },
        int16: { size: 2, min: -32768, max: 32767, method: 'getInt16', isFloat: false },
        uint16: { size: 2, min: 0, max: 65535, method: 'getUint16', isFloat: false },
        int32: { size: 4, min: -2147483648, max: 2147483647, method: 'getInt32', isFloat: false },
        uint32: { size: 4, min: 0, max: 4294967295, method: 'getUint32', isFloat: false },
        fp16: { size: 2, method: 'getFloat16', isFloat: true },
        bf16: { size: 2, method: 'getBFloat16', isFloat: true },
        fp32: { size: 4, method: 'getFloat32', isFloat: true },
        fp8_e4m3: { size: 1, method: 'getFloat8E4M3', isFloat: true },
        fp8_e5m2: { size: 1, method: 'getFloat8E5M2', isFloat: true }
    };
    
    // Pre-calculate normalization multipliers for integer types
    const NORMALIZERS = Object.fromEntries(
        Object.entries(DATA_TYPES)
            .filter(([type, config]) => !config.isFloat)
            .map(([type, config]) => [
                type,
                {
                    multiplier: 2 / (config.max - config.min),
                    offset: config.min
                }
            ])
    );
    
    /**
     * BVH (Bounding Volume Hierarchy) Implementation
     * Creates a binary tree of axis-aligned bounding boxes
     */
    const BVH = {
        /**
         * Build a BVH tree from points
         * @param {Float32Array} points - Array of 3D coordinates
         * @param {number} maxDepth - Maximum tree depth
         * @param {number} minPoints - Minimum points per leaf node
         * @returns {Object} Root node of BVH tree
         */
        build: function(points, maxDepth = 8, minPoints = 8) {
            try {
                const numPoints = points.length / 3;
                const indices = new Array(numPoints);
                for (let i = 0; i < numPoints; i++) indices[i] = i;
                
                console.log(`Building BVH with ${numPoints} points, maxDepth=${maxDepth}, minPoints=${minPoints}`);
                
                return this.buildNode(points, indices, 0, maxDepth, minPoints);
            } catch (error) {
                console.error('Error in BVH.build:', error);
                console.error('Error stack:', error.stack);
                throw error;
            }

        /**
         * Recursively build BVH node
         */
        buildNode: function(points, indices, depth, maxDepth, minPoints) {
            // Calculate AABB for this node
            const bounds = this.calculateAABB(points, indices);
            
            const node = {
                bounds: bounds,
                indices: indices,
                depth: depth,
                left: null,
                right: null,
                isLeaf: false
            };
            
            // Check termination conditions
            if (depth >= maxDepth || indices.length <= minPoints) {
                node.isLeaf = true;
                return node;
            }
            
            // Find longest axis and split
            const size = {
                x: bounds.max.x - bounds.min.x,
                y: bounds.max.y - bounds.min.y,
                z: bounds.max.z - bounds.min.z
            };
            
            let axis = 0; // 0=x, 1=y, 2=z
            let maxSize = size.x;
            if (size.y > maxSize) { axis = 1; maxSize = size.y; }
            if (size.z > maxSize) { axis = 2; maxSize = size.z; }
            
            // Sort indices along chosen axis
            indices.sort((a, b) => {
                const aVal = points[a * 3 + axis];
                const bVal = points[b * 3 + axis];
                return aVal - bVal;
            });
            
            // Split at median
            const mid = Math.floor(indices.length / 2);
            const leftIndices = indices.slice(0, mid);
            const rightIndices = indices.slice(mid);
            
            // Recursively build children
            if (leftIndices.length > 0) {
                node.left = this.buildNode(points, leftIndices, depth + 1, maxDepth, minPoints);
            }
            if (rightIndices.length > 0) {
                node.right = this.buildNode(points, rightIndices, depth + 1, maxDepth, minPoints);
            }
            
            return node;

         * Calculate axis-aligned bounding box for point indices

        calculateAABB: function(points, indices) {

                min: { x: Infinity, y: Infinity, z: Infinity },
                max: { x: -Infinity, y: -Infinity, z: -Infinity }
            };
            
            for (const idx of indices) {
                const i = idx * 3;
                const x = points[i];
                const y = points[i + 1];
                const z = points[i + 2];
                
                bounds.min.x = Math.min(bounds.min.x, x);
                bounds.min.y = Math.min(bounds.min.y, y);
                bounds.min.z = Math.min(bounds.min.z, z);
                bounds.max.x = Math.max(bounds.max.x, x);
                bounds.max.y = Math.max(bounds.max.y, y);
                bounds.max.z = Math.max(bounds.max.z, z);
            }
            
            return bounds;

        countNodes: function(node) {

            return 1 + this.countNodes(node.left) + this.countNodes(node.right);

        flattenTree: function(node, centers, sizes, colors, maxDepth, displayLevel = -1) {
            const nodes = [];
            
            const traverse = (n) => {
                if (!n) return;
                
                // Skip if filtering by specific level
                if (displayLevel >= 0 && n.depth !== displayLevel) {
                    traverse(n.left);
                    traverse(n.right);
                    return;
                }
                
                // Calculate center and size
                const center = new THREE.Vector3(
                    (n.bounds.min.x + n.bounds.max.x) / 2,
                    (n.bounds.min.y + n.bounds.max.y) / 2,
                    (n.bounds.min.z + n.bounds.max.z) / 2
                );
                
                const size = new THREE.Vector3(
                    n.bounds.max.x - n.bounds.min.x,
                    n.bounds.max.y - n.bounds.min.y,
                    n.bounds.max.z - n.bounds.min.z
                );
                
                // Color based on depth (rainbow gradient)
                const t = n.depth / Math.max(1, maxDepth);
                const color = new THREE.Color();
                color.setHSL(t * 0.7, 0.8, 0.5); // 0 to 0.7 goes from red to blue
                
                nodes.push({ center, size, color });
                
                traverse(n.left);
                traverse(n.right);
            };
            
            traverse(node);
            return nodes;
        }
    };
    
    /**

    function createInstancedBVHBoxes(bvhNodes) {

                [0.5, -0.5, 0.5], [-0.5, -0.5, 0.5],
                [-0.5, -0.5, 0.5], [-0.5, -0.5, -0.5],
                // Top face
                [-0.5, 0.5, -0.5], [0.5, 0.5, -0.5],
                [0.5, 0.5, -0.5], [0.5, 0.5, 0.5],
                [0.5, 0.5, 0.5], [-0.5, 0.5, 0.5],
                [-0.5, 0.5, 0.5], [-0.5, 0.5, -0.5],

                [-0.5, -0.5, -0.5], [-0.5, 0.5, -0.5],
                [0.5, -0.5, -0.5], [0.5, 0.5, -0.5],
                [0.5, -0.5, 0.5], [0.5, 0.5, 0.5],
                [-0.5, -0.5, 0.5], [-0.5, 0.5, 0.5]

            for (let i = 0; i < edges.length; i++) {

                instanceCenters[i * 3 + 2] = node.center.z;

            geometry.setAttribute('instanceSize', new THREE.InstancedBufferAttribute(instanceSizes, 3));

                vertexShader: `

    // =========================================================================
    // Voxel Density Mode — colormaps, transfer functions, instanced solid cubes
    // =========================================================================

    /**
     * Density colormaps: map a normalized [0,1] density value to an RGB triple.
     */
    const VoxelColormaps = {
        thermal: function(t) {
            // black → red → yellow → white
            if (t < 0.333) {
                const s = t / 0.333;
                return { r: s, g: 0, b: 0 };
            } else if (t < 0.666) {
                const s = (t - 0.333) / 0.333;
                return { r: 1, g: s, b: 0 };
            } else {
                const s = (t - 0.666) / 0.334;
                return { r: 1, g: 1, b: s };
            }
        },
        viridis: function(t) {
            // Approximation of the viridis colormap: dark purple → teal → yellow
            const r = Math.max(0, Math.min(1, -0.35 + 1.5 * t * t + 0.3 * t));
            const g = Math.max(0, Math.min(1, -0.05 + 0.8 * t + 0.5 * Math.sin(t * Math.PI)));
            const b = Math.max(0, Math.min(1, 0.45 + 0.5 * Math.sin((1 - t) * Math.PI * 0.9)));
            return { r, g, b };
        },
        ice: function(t) {
            // black → blue → cyan → white
            if (t < 0.333) {
                const s = t / 0.333;
                return { r: 0, g: 0, b: s };
            } else if (t < 0.666) {
                const s = (t - 0.333) / 0.333;
                return { r: 0, g: s, b: 1 };
            } else {
                const s = (t - 0.666) / 0.334;
                return { r: s, g: 1, b: 1 };
            }
        },
        mono: function(t, baseR, baseG, baseB) {
            // Coordinate-derived hue with density-controlled brightness
            const brightness = 0.15 + 0.85 * t;
            return { r: baseR * brightness, g: baseG * brightness, b: baseB * brightness };
        }
    };

    /**
     * Compute density statistics and normalized values for a set of cell counts.
     * @param {Uint32Array} counts - Raw point counts per cell
     * @param {string} scaleMode - 'log', 'linear', or 'sqrt'
     * @returns {Object} { normalized: Float32Array, min, max, logMin, logMax }
     */
    function computeDensityStats(counts, scaleMode = 'log') {
        const n = counts.length;
        if (n === 0) return { normalized: new Float32Array(0), min: 0, max: 0 };

        let minCount = Infinity, maxCount = 0;
        for (let i = 0; i < n; i++) {
            if (counts[i] < minCount) minCount = counts[i];
            if (counts[i] > maxCount) maxCount = counts[i];
        }

        const normalized = new Float32Array(n);

        if (maxCount === minCount) {
            // Uniform density — everything maps to 0.5
            normalized.fill(0.5);
        } else if (scaleMode === 'log') {
            const logMin = Math.log2(1 + minCount);
            const logMax = Math.log2(1 + maxCount);
            const logRange = logMax - logMin;
            for (let i = 0; i < n; i++) {
                normalized[i] = (Math.log2(1 + counts[i]) - logMin) / logRange;
            }
        } else if (scaleMode === 'sqrt') {
            const sqrtMin = Math.sqrt(minCount);
            const sqrtMax = Math.sqrt(maxCount);
            const sqrtRange = sqrtMax - sqrtMin;
            for (let i = 0; i < n; i++) {
                normalized[i] = (Math.sqrt(counts[i]) - sqrtMin) / sqrtRange;
            }
        } else {
            // linear
            const range = maxCount - minCount;
            for (let i = 0; i < n; i++) {
                normalized[i] = (counts[i] - minCount) / range;
            }
        }

        return { normalized, min: minCount, max: maxCount };
    }

    /**
     * Create instanced filled cubes for voxel density rendering.
     * Each occupied cell at one octree level becomes a lit, semi-transparent cube.
     *
     * @param {Object} levelData - One entry from MortonOctree levels (with counts/prefixes)
     * @param {Object} config - { colormap, opacityFloor, opacityCeiling, fillPct, scaleMode }
     * @param {number} bitsPerAxis - Quantization bits per axis (for decoding prefixes)
     * @returns {THREE.Mesh} Instanced mesh of filled cubes
     */
    function createInstancedVoxels(levelData, config, bitsPerAxis) {
        const { counts, prefixes, cellSize, level: lvl } = levelData;
        const numCells = counts ? counts.length : 0;

        if (numCells === 0) return null;

        const {
            colormap = 'thermal',
            opacityFloor = 0.05,
            opacityCeiling = 1.0,
            fillPct = 0.90,
            scaleMode = 'log'
        } = config;

        // Compute normalized density
        const { normalized } = computeDensityStats(counts, scaleMode);

        // Build a unit box as base geometry (indexed)
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const geometry = new THREE.InstancedBufferGeometry();
        geometry.index = boxGeo.index;
        geometry.setAttribute('position', boxGeo.getAttribute('position'));
        geometry.setAttribute('normal', boxGeo.getAttribute('normal'));

        // Instance attributes
        const instanceCenters = new Float32Array(numCells * 3);
        const instanceColors = new Float32Array(numCells * 3);
        const instanceAlphas = new Float32Array(numCells);

        // Compute cell centers from Morton prefixes
        const totalBits = bitsPerAxis * 3;
        const bitsToKeep = (lvl + 1) * 3;
        const shift = totalBits - bitsToKeep;
        const gridRes = 1 << (lvl + 1); // number of cells per axis at this level
        const cubeSize = cellSize * fillPct;

        const colormapFn = VoxelColormaps[colormap] || VoxelColormaps.thermal;

        for (let i = 0; i < numCells; i++) {
            // Decode cell center from Morton prefix
            const prefix = prefixes[i];
            // Shift prefix down so the level bits are in the LSBs for decoding
            const shifted = prefix >>> shift;
            const decoded = MortonCode.decode(shifted);

            // Map from grid coords [0, gridRes-1] to [-1, 1] space, cell-centered
            const cx = ((decoded.x + 0.5) / gridRes) * 2 - 1;
            const cy = ((decoded.y + 0.5) / gridRes) * 2 - 1;
            const cz = ((decoded.z + 0.5) / gridRes) * 2 - 1;

            instanceCenters[i * 3]     = cx;
            instanceCenters[i * 3 + 1] = cy;
            instanceCenters[i * 3 + 2] = cz;

            // Color from density
            const d = normalized[i];
            let color;
            if (colormap === 'mono') {
                // Use coordinate-derived base color
                const baseR = (cx + 1) / 2;
                const baseG = (cy + 1) / 2;
                const baseB = (cz + 1) / 2;
                color = colormapFn(d, baseR, baseG, baseB);
            } else {
                color = colormapFn(d);
            }
            instanceColors[i * 3]     = color.r;
            instanceColors[i * 3 + 1] = color.g;
            instanceColors[i * 3 + 2] = color.b;

            // Alpha from density, mapped between floor and ceiling
            instanceAlphas[i] = opacityFloor + d * (opacityCeiling - opacityFloor);
        }

        geometry.setAttribute('instanceCenter', new THREE.InstancedBufferAttribute(instanceCenters, 3));
        geometry.setAttribute('instanceColor', new THREE.InstancedBufferAttribute(instanceColors, 3));
        geometry.setAttribute('instanceAlpha', new THREE.InstancedBufferAttribute(instanceAlphas, 1));

        // Uniform cube size for this level
        const sizeUniform = new THREE.Vector3(cubeSize, cubeSize, cubeSize);

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uCubeSize: { value: sizeUniform },
                uColorMode: { value: colormap === 'spatial' ? 1 : 0 }
            },
            vertexShader: `
                attribute vec3 instanceCenter;
                attribute vec3 instanceColor;
                attribute float instanceAlpha;
                
                uniform vec3 uCubeSize;
                
                varying vec3 vColor;
                varying float vAlpha;
                varying vec3 vNormal;
                varying vec3 vWorldPos;
                
                void main() {
                    vColor = instanceColor;
                    vAlpha = instanceAlpha;
                    vNormal = normalMatrix * normal;
                    
                    vec3 transformed = position * uCubeSize + instanceCenter;
                    vWorldPos = transformed; // data-space position [-1,1]
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
                }
            `,
            fragmentShader: `
                uniform int uColorMode;
                
                varying vec3 vColor;
                varying float vAlpha;
                varying vec3 vNormal;
                varying vec3 vWorldPos;
                
                void main() {
                    // Simple directional light from upper-right
                    vec3 lightDir = normalize(vec3(0.5, 1.0, 0.3));
                    float diff = max(dot(normalize(vNormal), lightDir), 0.0);
                    float lighting = 0.35 + 0.65 * diff;
                    
                    // Spatial mode: per-fragment color from world position
                    vec3 color = vColor;
                    if (uColorMode == 1) {
                        color = (vWorldPos + 1.0) * 0.5; // map [-1,1] to [0,1]
                    }
                    
                    gl_FragColor = vec4(color * lighting, vAlpha);
                    if (vAlpha < 0.01) discard; // skip near-invisible fragments
                }
            `,
            transparent: true,
            depthTest: true,
            depthWrite: false, // allow see-through for semi-transparent voxels
            side: THREE.FrontSide
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.userData.voxelLevel = lvl;
        mesh.userData.numCells = numCells;
        mesh.userData.densityNormalized = normalized;
        mesh.userData.instanceColors = instanceColors;
        mesh.userData.instanceAlphas = instanceAlphas;
        mesh.frustumCulled = false; // instanced geometry culling can be unreliable

        console.log(`Created voxel layer: level ${lvl}, ${numCells} cells, density range [${counts[0]}..${counts[counts.length-1]}]`);
        return mesh;
    }

    /**
     * Re-apply a density transfer function to existing voxel instance attributes.
     * This avoids rebuilding geometry — just overwrites color/alpha buffers.
     *
     * @param {THREE.Mesh} voxelMesh - An instanced voxel mesh created by createInstancedVoxels
     * @param {Uint32Array} counts - Raw counts for this level
     * @param {Object} config - Same shape as createInstancedVoxels config
     */
    function updateVoxelTransferFunction(voxelMesh, counts, config) {
        if (!voxelMesh || !counts) return;

        const { colormap = 'thermal', opacityFloor = 0.05, opacityCeiling = 1.0, scaleMode = 'log' } = config;
        const { normalized } = computeDensityStats(counts, scaleMode);
        const numCells = counts.length;

        const colormapFn = VoxelColormaps[colormap] || VoxelColormaps.thermal;
        const centersAttr = voxelMesh.geometry.getAttribute('instanceCenter');
        const colorsAttr = voxelMesh.geometry.getAttribute('instanceColor');
        const alphasAttr = voxelMesh.geometry.getAttribute('instanceAlpha');

        for (let i = 0; i < numCells; i++) {
            const d = normalized[i];
            let color;
            if (colormap === 'mono') {
                const baseR = (centersAttr.getX(i) + 1) / 2;
                const baseG = (centersAttr.getY(i) + 1) / 2;
                const baseB = (centersAttr.getZ(i) + 1) / 2;
                color = colormapFn(d, baseR, baseG, baseB);
            } else {
                color = colormapFn(d);
            }
            colorsAttr.setXYZ(i, color.r, color.g, color.b);
            alphasAttr.setX(i, opacityFloor + d * (opacityCeiling - opacityFloor));
        }

        colorsAttr.needsUpdate = true;
        alphasAttr.needsUpdate = true;
    }

    /**
     * 3D Hilbert curve implementation
     * Maps between 3D coordinates and 1D position along the curve
     */
    const HilbertCurve3D = {
        // Rotation matrices for the 8 octants of the Hilbert curve
        rotations: [
            [0, 1, 2], [0, 2, 1], [1, 0, 2], [1, 2, 0],
            [2, 0, 1], [2, 1, 0], [0, 1, 2], [0, 2, 1]
        ],
        
        // Convert 3D coordinates to Hilbert index
        coordsToIndex: function(x, y, z, order) {
            let index = 0;
            for (let i = order - 1; i >= 0; i--) {
                const bits = [
                    (x >> i) & 1,
                    (y >> i) & 1,
                    (z >> i) & 1
                ];
                
                // Calculate octant
                const octant = bits[0] * 4 + bits[1] * 2 + bits[2];
                index = (index << 3) | octant;
                
                // Apply rotation for next level
                const temp = [bits[0], bits[1], bits[2]];
                const rot = this.rotations[octant];
                bits[0] = temp[rot[0]];
                bits[1] = temp[rot[1]];
                bits[2] = temp[rot[2]];
            }
            return index;
        },
        
        // Convert Hilbert index to 3D coordinates
        indexToCoords: function(index, order) {
            let x = 0, y = 0, z = 0;
            let octant = 0;
            
            for (let i = 0; i < order; i++) {
                octant = index & 7;
                index >>= 3;
                
                const rot = this.rotations[octant];
                const bits = [
                    (octant >> 2) & 1,
                    (octant >> 1) & 1,
                    octant & 1
                ];
                
                // Apply inverse rotation
                x = (x << 1) | bits[rot[0]];
                y = (y << 1) | bits[rot[1]];
                z = (z << 1) | bits[rot[2]];
            }
            
            return [x, y, z];
        }
    };
    
    /**
     * Morton Code (Z-order curve) implementation with true bit interleaving.
     * Each 3-bit group in the code represents one octree level.
     * Truncating to the first 3k bits gives the ancestor cell at depth k.
     */
    const MortonCode = {
        /**
         * Spread bits of a value so each bit occupies every 3rd position.
         * bit i of input -> bit 3*i of output (supports up to 10 bits)
         */
        spreadBits: function(v) {
            v &= 0x3FF; // 10 bits max
            v = (v | (v << 16)) & 0x030000FF;
            v = (v | (v <<  8)) & 0x0300F00F;
            v = (v | (v <<  4)) & 0x030C30C3;
            v = (v | (v <<  2)) & 0x09249249;
            return v;
        },
        
        /**
         * Compact bits: reverse of spreadBits. Extract every 3rd bit.
         */
        compactBits: function(v) {
            v &= 0x09249249;
            v = (v | (v >>  2)) & 0x030C30C3;
            v = (v | (v >>  4)) & 0x0300F00F;
            v = (v | (v >>  8)) & 0x030000FF;
            v = (v | (v >> 16)) & 0x3FF;
            return v;
        },
        
        /**
         * Encode 3D coordinates into a bit-interleaved Morton code.
         * Result: ...z2y2x2 z1y1x1 z0y0x0 (LSB groups = finest level)
         * @param {number} x - quantized x [0, 2^bits - 1]
         * @param {number} y - quantized y
         * @param {number} z - quantized z
         * @returns {number} Morton code (up to 30 bits for 10-bit inputs)
         */
        encode: function(x, y, z) {
            return this.spreadBits(x) | (this.spreadBits(y) << 1) | (this.spreadBits(z) << 2);
        },
        
        /**
         * Decode a Morton code back to 3D coordinates.
         */
        decode: function(morton) {
            return {
                x: this.compactBits(morton),
                y: this.compactBits(morton >> 1),
                z: this.compactBits(morton >> 2)
            };
        },
        
        /**
         * Extract the octant index (0-7) at a given level from a Morton code.
         * Level 0 = coarsest (most significant 3 bits used).
         * @param {number} morton - The Morton code
         * @param {number} level - Level to extract (0 = coarsest)
         * @param {number} maxBits - Total bits per axis
         */
        octantAtLevel: function(morton, level, maxBits) {
            const shift = (maxBits - 1 - level) * 3;
            return (morton >>> shift) & 0x7;
        },
        
        /**
         * Get the Morton code prefix for a given level (ancestor cell).
         * Zeros out all bits below the level.
         * @param {number} morton - Full Morton code
         * @param {number} level - Depth level (0 = root)
         * @param {number} maxBits - Total bits per axis
         */
        prefixAtLevel: function(morton, level, maxBits) {

    const MortonOctree = {

         * Build octree levels from quantized point data.
         * @param {Float32Array} normPoints - Normalized xyz coords [-1,1]
         * @param {Float32Array} normColors - RGB colors [0,1]
         * @param {Uint32Array} mortonCodes - Pre-computed Morton codes
         * @param {number} numPoints - Number of valid points
         * @param {number} bitsPerAxis - Quantization bits per axis
         * @returns {Object} Octree with per-level point/color arrays and box data
         */
        build: function(normPoints, normColors, mortonCodes, numPoints, bitsPerAxis) {
            const levels = [];
            
            // For each level from 0 (coarsest) to bitsPerAxis-1 (finest),
            // collect unique cells and their representative points
            for (let level = 0; level < bitsPerAxis; level++) {
                const cellMap = new Map(); // prefix -> { sumX, sumY, sumZ, sumR, sumG, sumB, count }
                const bitsToKeep = (level + 1) * 3;
                const totalBits = bitsPerAxis * 3;
                const shift = totalBits - bitsToKeep;
                
                for (let i = 0; i < numPoints; i++) {
                    const morton = mortonCodes[i];
                    const prefix = (morton >>> shift) << shift;
                    
                    const pi = i * 3;
                    
                    if (!cellMap.has(prefix)) {
                        cellMap.set(prefix, {
                            sumX: normPoints[pi],
                            sumY: normPoints[pi + 1],
                            sumZ: normPoints[pi + 2],
                            sumR: normColors[pi],
                            sumG: normColors[pi + 1],
                            sumB: normColors[pi + 2],
                            count: 1
                        });
                    } else {
                        const cell = cellMap.get(prefix);
                        cell.sumX += normPoints[pi];
                        cell.sumY += normPoints[pi + 1];
                        cell.sumZ += normPoints[pi + 2];
                        cell.sumR += normColors[pi];
                        cell.sumG += normColors[pi + 1];
                        cell.sumB += normColors[pi + 2];
                        cell.count++;
                    }
                }
                
                // Build point arrays for this level (centroids of each cell)
                const cellCount = cellMap.size;
                const levelPoints = new Float32Array(cellCount * 3);
                const levelColors = new Float32Array(cellCount * 3);
                const levelCounts = new Uint32Array(cellCount);
                const levelPrefixes = new Uint32Array(cellCount);
                
                let idx = 0;
                let cellIdx = 0;
                for (const [prefix, cell] of cellMap.entries()) {
                    const invCount = 1 / cell.count;
                    levelPoints[idx]     = cell.sumX * invCount;
                    levelPoints[idx + 1] = cell.sumY * invCount;
                    levelPoints[idx + 2] = cell.sumZ * invCount;
                    levelColors[idx]     = cell.sumR * invCount;
                    levelColors[idx + 1] = cell.sumG * invCount;
                    levelColors[idx + 2] = cell.sumB * invCount;
                    levelCounts[cellIdx] = cell.count;
                    levelPrefixes[cellIdx] = prefix;
                    idx += 3;
                    cellIdx++;
                }
                
                levels.push({
                    level: level,
                    numPoints: cellCount,
                    points: levelPoints,
                    colors: levelColors,
                    counts: levelCounts,
                    prefixes: levelPrefixes,
                    cellSize: 2.0 / (1 << (level + 1)) // cell width in [-1,1] space
                });
            }
            
            // Also add the finest level as the actual points (not centroids)
            // The last 'levels' entry is already close, but let's add raw points as final level
            const rawPoints = new Float32Array(numPoints * 3);
            const rawColors = new Float32Array(numPoints * 3);
            for (let i = 0; i < numPoints * 3; i++) {
                rawPoints[i] = normPoints[i];
                rawColors[i] = normColors[i];
            }
            // Preserve the counts and prefixes from the finest computed level
            const finestCounts = levels[levels.length - 1].counts;
            const finestPrefixes = levels[levels.length - 1].prefixes;
            // Replace the finest level with actual points for maximum fidelity
            levels[levels.length - 1] = {
                level: bitsPerAxis - 1,
                numPoints: numPoints,
                points: rawPoints,
                colors: rawColors,
                counts: finestCounts,
                prefixes: finestPrefixes,
                cellSize: 2.0 / (1 << bitsPerAxis)
            };
            
            console.log(`Morton octree built: ${bitsPerAxis} levels, points per level: [${levels.map(l => l.numPoints).join(', ')}]`);
            
            return {
                levels: levels,
                bitsPerAxis: bitsPerAxis,
                totalPoints: numPoints
            };
        },

         * Generate wireframe box data for a given octree level.
         * Each occupied cell at that level becomes a box.
         * @param {Uint32Array} mortonCodes - Morton codes of all points
         * @param {number} numPoints - Number of points
         * @param {number} level - Which level to generate boxes for (0=coarsest)
         * @param {number} bitsPerAxis - Total bits per axis
         * @returns {Array} Array of {center, size, color} for instanced rendering
         */
        generateLevelBoxes: function(mortonCodes, numPoints, level, bitsPerAxis) {
            const totalBits = bitsPerAxis * 3;
            const bitsToKeep = (level + 1) * 3;
            const shift = totalBits - bitsToKeep;
            const gridRes = 1 << (level + 1); // resolution at this level
            const cellSize = 2.0 / gridRes; // in [-1,1] space
            
            // Collect unique cell prefixes
            const seen = new Set();
            for (let i = 0; i < numPoints; i++) {
                const prefix = (mortonCodes[i] >>> shift) << shift;
                seen.add(prefix);
            }
            
            const boxes = [];
            const t = level / Math.max(1, bitsPerAxis - 1);
            
            for (const prefix of seen) {
                // Decode the prefix to get cell coordinates at this level
                const decoded = MortonCode.decode(prefix >>> 0);
                // The decoded values are in full-resolution space, shift down to this level's resolution
                const cellX = decoded.x >>> (bitsPerAxis - level - 1);
                const cellY = decoded.y >>> (bitsPerAxis - level - 1);
                const cellZ = decoded.z >>> (bitsPerAxis - level - 1);
                
                // Convert cell coords to [-1,1] center positions
                const cx = (cellX + 0.5) * cellSize - 1.0;
                const cy = (cellY + 0.5) * cellSize - 1.0;
                const cz = (cellZ + 0.5) * cellSize - 1.0;
                
                const color = new THREE.Color();
                color.setHSL(t * 0.75, 0.9, 0.55);
                
                boxes.push({
                    center: new THREE.Vector3(cx, cy, cz),
                    size: new THREE.Vector3(cellSize, cellSize, cellSize),
                    color: color
                });
            }
            
            return boxes;
        }

                    name: error.name,
                    projectionMode: projectionMode,

                const discreteY = Math.max(0, Math.min(qRange - 1, Math.floor((y + 1) / 2 * qRange)));

                projectedPoints[baseIdx + 1] = y;
                projectedPoints[baseIdx + 2] = 0;

                projectedPoints[baseIdx + 3] = x;
                projectedPoints[baseIdx + 4] = 0;
                projectedPoints[baseIdx + 5] = z;

                projectedPoints[baseIdx + 6] = 0;
                projectedPoints[baseIdx + 7] = y;
                projectedPoints[baseIdx + 8] = z;

        const projectedPoints = new Float32Array(points.length);

                    } else {
                        // Point very close to north pole, place at origin
                        projectedPoints[i] = 0;
                        projectedPoints[i + 1] = 0;
                        projectedPoints[i + 2] = 0;
                    }
                    break;
                    
                case 'equirectangular':
                    // Convert cartesian to spherical coordinates
                    const r = Math.sqrt(x * x + y * y + z * z);

                        const theta = Math.atan2(y, x); // azimuth [-π, π]
                        const phi = Math.acos(Math.abs(z) / r); // elevation [0, π]
                        
                        // Map to equirectangular coordinates
                        // Longitude: theta mapped to [-1, 1]
                        // Latitude: phi mapped to [-1, 1]
                        projectedPoints[i] = theta / Math.PI; // maps [-π,π] to [-1,1]

                        projectedPoints[i] = 0;
                        projectedPoints[i + 1] = 0;
                        projectedPoints[i + 2] = 0;
                    }
                    break;
                    
                case 'orthographic-xy':
                    // Project onto XY plane (view from Z axis)
                    projectedPoints[i] = x;
                    projectedPoints[i + 1] = y;
                    projectedPoints[i + 2] = 0;
                    break;
                    
                case 'orthographic-xz':
                    // Project onto XZ plane (view from Y axis)
                    projectedPoints[i] = x;
                    projectedPoints[i + 1] = z;
                    projectedPoints[i + 2] = 0;
                    break;
                    
                case 'orthographic-yz':
                    // Project onto YZ plane (view from X axis)
                    projectedPoints[i] = y;
                    projectedPoints[i + 1] = z;
                    projectedPoints[i + 2] = 0;

                case 'cylindrical':

                    const radius = Math.sqrt(x * x + z * z);

                        projectedPoints[i] = angle / Math.PI; // maps [-π,π] to [-1,1]

                        projectedPoints[i + 2] = 0; // Flatten to z=0 plane
                    } else {
                        projectedPoints[i] = 0;
                        projectedPoints[i + 1] = y;
                        projectedPoints[i + 2] = 0;
                    }
                    break;
                    
                default:
                    // Fallback to standard (no projection)
                    projectedPoints[i] = x;
                    projectedPoints[i + 1] = y;
                    projectedPoints[i + 2] = z;
                    break;

        if (quantizationBits < 2 || quantizationBits > 10) {

        }
        
        const typeSize = config.size;
        const valuesPerTuple = tupleMode === '6-tuple' ? 6 : 3;
        const tupleSize = typeSize * valuesPerTuple;
        
        if (buffer.byteLength < tupleSize) {
            throw new Error(`Buffer too small for data type ${dataType} in ${tupleMode} mode. Need at least ${tupleSize} bytes, got ${buffer.byteLength}`);
        }

        const view = createExtendedDataView(buffer);
        const maxOffset = buffer.byteLength - tupleSize;
        const maxTuples = Math.floor(buffer.byteLength / tupleSize);
        
        // Pre-allocate typed arrays for better performance
        let points = new Float32Array(maxTuples * 3);
        const colors = new Float32Array(maxTuples * 3);
        
        // Setup normalization function based on data type
        const readMethod = view[config.method].bind(view);
        let normalize;
        
        if (config.isFloat) {
            // Use tanh for floating point normalization
            normalize = value => {
                // Handle special values
                if (!isFinite(value)) {
                    return isNaN(value) ? 0 : (value > 0 ? 1 : -1);
                }
                // Apply tanh for smooth [-1, 1] mapping
                return Math.tanh(value);
            };
        } else {
            // Use linear normalization for integers
            const { multiplier, offset } = NORMALIZERS[dataType];
            normalize = value => ((value - offset) * multiplier) - 1;
        }
        
        let pointIndex = 0;
        let baseOffset = 0;

        // Calculate quantization parameters based on bit size
        const qRange = Math.pow(2, quantizationBits);
        const qHalfRange = qRange / 2;
        const qMaxIndex = qRange - 1;

        // For 6-tuple mode, we need to quantize both coordinates and colors
        // But we only deduplicate based on coordinates to preserve color variation
        const totalQuantizedPositions = qRange * qRange * qRange;
        const bitArraySizeInUint32 = Math.ceil(totalQuantizedPositions / 32);
        const tupleBitArray = new Uint32Array(bitArraySizeInUint32); 
        
        // Calculate bit shifts for index generation based on quantization bits
        const yShift = quantizationBits;
        const zShift = quantizationBits * 2;
        
        console.log(`Using ${quantizationBits}-bit quantization in ${tupleMode} mode: ${qRange}³ = ${totalQuantizedPositions.toLocaleString()} possible positions`);
        
        try {
            while (baseOffset <= maxOffset) {
                // Read and normalize coordinates
                const x = normalize(readMethod(baseOffset, isLittleEndian));
                const y = normalize(readMethod(baseOffset + typeSize, isLittleEndian));
                const z = normalize(readMethod(baseOffset + typeSize * 2, isLittleEndian));

                // Quantize coordinates: map [-1,1] to [0,qMaxIndex] with bounds checking
                const qx = Math.max(0, Math.min(qMaxIndex, Math.floor((x + 1) * qHalfRange)));
                const qy = Math.max(0, Math.min(qMaxIndex, Math.floor((y + 1) * qHalfRange)));
                const qz = Math.max(0, Math.min(qMaxIndex, Math.floor((z + 1) * qHalfRange)));

                // Create unique index for this quantized position using variable bit shifts
                const qIndex = (qz << zShift) | (qy << yShift) | qx;

                // Check if we've seen this quantized position before
                const elementIndex = qIndex >> 5;
                const bitPosition = qIndex & 0x1F;
                const mask = 1 << bitPosition;

                if ((tupleBitArray[elementIndex] & mask) === 0) {
                    // Mark this position as seen
                    tupleBitArray[elementIndex] |= mask;

                    // Store points (original normalized coordinates, not quantized)
                    points[pointIndex] = x;
                    points[pointIndex + 1] = y;
                    points[pointIndex + 2] = z;
                    
                    // Handle colors based on tuple mode
                    if (tupleMode === '6-tuple') {
                        // Read explicit color values and normalize to [-1,1] then convert to [0,1]
                        const r = normalize(readMethod(baseOffset + typeSize * 3, isLittleEndian));
                        const g = normalize(readMethod(baseOffset + typeSize * 4, isLittleEndian));
                        const b = normalize(readMethod(baseOffset + typeSize * 5, isLittleEndian));
                        
                        // Convert from [-1,1] to [0,1] for Three.js rendering
                        colors[pointIndex] = (r + 1) / 2;
                        colors[pointIndex + 1] = (g + 1) / 2;
                        colors[pointIndex + 2] = (b + 1) / 2;
                    } else {
                        // Generate colors from coordinates (map from [-1,1] to [0,1] for Three.js)
                        colors[pointIndex] = (x + 1) / 2;
                        colors[pointIndex + 1] = (y + 1) / 2;
                        colors[pointIndex + 2] = (z + 1) / 2;
                    }

                    pointIndex += 3;
                }

                baseOffset += tupleSize;
            }
        } catch (e) {
            console.error(`Error processing data at offset: ${baseOffset}`, e);
            // Return what we've processed so far rather than failing completely
        }

        // Apply projection if requested
        if (projectionMode === 'morton-octree') {
            // Build Morton-coded octree from the deduplicated points
            const numPoints = pointIndex / 3;
            const trimmedPoints = points.slice(0, pointIndex);
            const trimmedColors = colors.slice(0, pointIndex);
            
            // Compute Morton codes from normalized coordinates
            const mortonCodes = new Uint32Array(numPoints);
            for (let i = 0; i < numPoints; i++) {
                const pi = i * 3;
                const x = trimmedPoints[pi];
                const y = trimmedPoints[pi + 1];
                const z = trimmedPoints[pi + 2];
                
                // Map [-1,1] to [0, qMaxIndex]
                const mx = Math.max(0, Math.min(qMaxIndex, Math.floor((x + 1) * qHalfRange)));
                const my = Math.max(0, Math.min(qMaxIndex, Math.floor((y + 1) * qHalfRange)));
                const mz = Math.max(0, Math.min(qMaxIndex, Math.floor((z + 1) * qHalfRange)));
                
                mortonCodes[i] = MortonCode.encode(mx, my, mz);
            }
            
            // Build the hierarchical octree
            const octree = MortonOctree.build(trimmedPoints, trimmedColors, mortonCodes, numPoints, quantizationBits);
            
            return {
                points: trimmedPoints,
                colors: trimmedColors,
                numPoints: numPoints,
                mortonOctree: octree,
                mortonCodes: mortonCodes
            };
        }
        
        if (projectionMode === 'voxel-density') {
            // Voxel Density: same Morton octree build as morton-octree,
            // but tagged for the voxel renderer instead of LOD points
            const numPoints = pointIndex / 3;
            const trimmedPoints = points.slice(0, pointIndex);
            const trimmedColors = colors.slice(0, pointIndex);
            
            const mortonCodes = new Uint32Array(numPoints);
            for (let i = 0; i < numPoints; i++) {
                const pi = i * 3;
                const x = trimmedPoints[pi];
                const y = trimmedPoints[pi + 1];
                const z = trimmedPoints[pi + 2];
                const mx = Math.max(0, Math.min(qMaxIndex, Math.floor((x + 1) * qHalfRange)));
                const my = Math.max(0, Math.min(qMaxIndex, Math.floor((y + 1) * qHalfRange)));
                const mz = Math.max(0, Math.min(qMaxIndex, Math.floor((z + 1) * qHalfRange)));
                mortonCodes[i] = MortonCode.encode(mx, my, mz);
            }
            
            const octree = MortonOctree.build(trimmedPoints, trimmedColors, mortonCodes, numPoints, quantizationBits);
            
            return {
                points: trimmedPoints,
                colors: trimmedColors,
                numPoints: numPoints,
                voxelOctree: octree,
                mortonCodes: mortonCodes
            };
        }
        
        if (projectionMode === 'morton-tiled') {
            // Morton Decomposition: lay out each octree level as a 2D tile
            // Tiles arranged left-to-right, coarsest to finest
            // Within each tile: x,y from Morton cell coords, z -> brightness
            const numPoints = pointIndex / 3;
            const trimmedPoints = points.slice(0, pointIndex);
            const trimmedColors = colors.slice(0, pointIndex);
            
            // Compute Morton codes
            const mortonCodes = new Uint32Array(numPoints);
            for (let i = 0; i < numPoints; i++) {
                const pi = i * 3;
                const x = trimmedPoints[pi];
                const y = trimmedPoints[pi + 1];
                const z = trimmedPoints[pi + 2];
                const mx = Math.max(0, Math.min(qMaxIndex, Math.floor((x + 1) * qHalfRange)));
                const my = Math.max(0, Math.min(qMaxIndex, Math.floor((y + 1) * qHalfRange)));
                const mz = Math.max(0, Math.min(qMaxIndex, Math.floor((z + 1) * qHalfRange)));
                mortonCodes[i] = MortonCode.encode(mx, my, mz);
            }
            
            // Build octree levels for tiling
            const octree = MortonOctree.build(trimmedPoints, trimmedColors, mortonCodes, numPoints, quantizationBits);
            const numLevels = octree.levels.length;
            
            // Calculate total points across all levels
            let totalLevelPoints = 0;
            for (const level of octree.levels) {
                totalLevelPoints += level.numPoints;
            }
            
            // Create output arrays
            const outPoints = new Float32Array(totalLevelPoints * 3);
            const outColors = new Float32Array(totalLevelPoints * 3);
            
            // Tile layout: each tile is 2 units wide (-1 to 1) with gap
            // Arranged in a row along x-axis
            const tileWidth = 2.0;
            const tileGap = 0.3;
            const totalWidth = numLevels * tileWidth + (numLevels - 1) * tileGap;
            const startX = -totalWidth / 2;
            
            let outIdx = 0;
            
            for (let lvl = 0; lvl < numLevels; lvl++) {
                const level = octree.levels[lvl];
                const levelRes = 1 << (lvl + 1); // grid resolution at this level
                const tileCenterX = startX + lvl * (tileWidth + tileGap) + tileWidth / 2;
                
                // For each point at this level, compute its 2D tile position
                // Recompute from Morton codes for proper positioning
                const totalBits = quantizationBits * 3;
                const bitsToKeep = (lvl + 1) * 3;
                const shift = totalBits - bitsToKeep;
                
                // Collect unique cells and their centroids + z averages
                const cellMap = new Map();
                
                for (let i = 0; i < numPoints; i++) {
                    const prefix = (mortonCodes[i] >>> shift) << shift;
                    const pi = i * 3;
                    
                    if (!cellMap.has(prefix)) {
                        cellMap.set(prefix, {
                            sumX: trimmedPoints[pi],
                            sumY: trimmedPoints[pi + 1],
                            sumZ: trimmedPoints[pi + 2],
                            sumR: trimmedColors[pi],
                            sumG: trimmedColors[pi + 1],
                            sumB: trimmedColors[pi + 2],
                            count: 1,
                            prefix: prefix
                        });
                    } else {
                        const cell = cellMap.get(prefix);
                        cell.sumX += trimmedPoints[pi];
                        cell.sumY += trimmedPoints[pi + 1];
                        cell.sumZ += trimmedPoints[pi + 2];
                        cell.sumR += trimmedColors[pi];
                        cell.sumG += trimmedColors[pi + 1];
                        cell.sumB += trimmedColors[pi + 2];
                        cell.count++;
                    }
                }
                
                for (const cell of cellMap.values()) {
                    const invCount = 1 / cell.count;
                    
                    // Decode prefix to get cell coordinates at this level
                    const decoded = MortonCode.decode(cell.prefix >>> 0);
                    const cellX = decoded.x >>> (quantizationBits - lvl - 1);
                    const cellY = decoded.y >>> (quantizationBits - lvl - 1);
                    
                    // Map cell coords to [-1,1] within tile, then offset to tile position
                    const localX = levelRes > 1 ? (cellX / (levelRes - 1)) * 2 - 1 : 0;
                    const localY = levelRes > 1 ? (cellY / (levelRes - 1)) * 2 - 1 : 0;
                    
                    // Position in world: tile offset + local position (scaled to tile width)
                    outPoints[outIdx] = tileCenterX + localX * (tileWidth / 2) * 0.9;
                    outPoints[outIdx + 1] = localY * 0.9; // y centered
                    outPoints[outIdx + 2] = 0; // flat 2D
                    
                    // Color: use averaged z as brightness modulator
                    const avgZ = cell.sumZ * invCount;
                    const zBright = (avgZ + 1) / 2; // [0,1]
                    
                    // Blend: base color from level hue, modulated by z brightness
                    const hue = lvl / Math.max(1, numLevels - 1) * 0.75;
                    const sat = 0.7;
                    const lightness = 0.3 + zBright * 0.45;
                    
                    // HSL to RGB
                    const c = (1 - Math.abs(2 * lightness - 1)) * sat;
                    const hPrime = hue * 6;
                    const x2 = c * (1 - Math.abs(hPrime % 2 - 1));
                    const m = lightness - c / 2;
                    let r1, g1, b1;
                    if (hPrime < 1) { r1 = c; g1 = x2; b1 = 0; }
                    else if (hPrime < 2) { r1 = x2; g1 = c; b1 = 0; }
                    else if (hPrime < 3) { r1 = 0; g1 = c; b1 = x2; }
                    else if (hPrime < 4) { r1 = 0; g1 = x2; b1 = c; }
                    else if (hPrime < 5) { r1 = x2; g1 = 0; b1 = c; }
                    else { r1 = c; g1 = 0; b1 = x2; }
                    
                    outColors[outIdx] = r1 + m;
                    outColors[outIdx + 1] = g1 + m;
                    outColors[outIdx + 2] = b1 + m;
                    
                    outIdx += 3;
                }
            }
            
            // Trim to actual size (should match totalLevelPoints)
            const actualOut = outIdx / 3;
            console.log(`Morton decomposition: ${numLevels} tiles, ${actualOut} total points across levels`);
            
            return {
                points: outPoints.slice(0, outIdx),
                colors: outColors.slice(0, outIdx),
                numPoints: actualOut
            };
        }
        
        if (projectionMode !== 'standard') {
            const projectionResult = applyProjection(points.slice(0, pointIndex), projectionMode, quantizationBits);
            
            // Handle different projection return types
            if (projectionResult && projectionResult.pathData) {
                // Continuous path mode - return original points with path flag
                points = projectionResult.points.slice(0, pointIndex);
                
                return {
                    points,
                    colors: colors.slice(0, pointIndex),
                    numPoints: pointIndex / 3,
                    pathData: true
                };
            } else if (projectionResult && projectionResult.bvhData) {
                // BVH mode - return points, colors, and BVH data
                points = projectionResult.points;
                
                return {
                    points,
                    colors: colors.slice(0, pointIndex),
                    numPoints: projectionResult.bvhData.showPoints ? (pointIndex / 3) : 0,
                    bvhNodes: projectionResult.bvhData.nodes,
                    bvhMode: true,
                    showPoints: projectionResult.bvhData.showPoints
                };
            } else if (projectionMode === 'orthographic-3plane') {
                // Handle color expansion for 3-plane orthographic projection
                const expandedColors = new Float32Array(colors.length * 3);
                for (let i = 0; i < pointIndex; i += 3) {
                    const baseIdx = i * 3;
                    
                    // Copy original colors for all three projected points
                    // XY plane projection
                    expandedColors[baseIdx] = colors[i];
                    expandedColors[baseIdx + 1] = colors[i + 1];
                    expandedColors[baseIdx + 2] = colors[i + 2];
                    
                    // XZ plane projection
                    expandedColors[baseIdx + 3] = colors[i];
                    expandedColors[baseIdx + 4] = colors[i + 1];
                    expandedColors[baseIdx + 5] = colors[i + 2];
                    
                    // YZ plane projection
                    expandedColors[baseIdx + 6] = colors[i];
                    expandedColors[baseIdx + 7] = colors[i + 1];
                    expandedColors[baseIdx + 8] = colors[i + 2];
                }
                
                return {
                    points: projectionResult,
                    colors: expandedColors,
                    numPoints: (pointIndex / 3) * 3
                };
            } else {
                // Standard projection
                points = projectionResult;
            }
        } else {
            points = points.slice(0, pointIndex);
        }

        return {
            points,
            colors: colors.slice(0, pointIndex),
            numPoints: pointIndex / 3
        };
    }
    
    // Main application
    class BinaryPointCloudViewer {
