<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proxy Custom Drawing Tool</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #222;
      color: #fff;
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      box-sizing: border-box;
    }
    h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
    /* Checkered pattern to show transparency */
    canvas {
      border: 2px dashed #555;
      background-image: 
        linear-gradient(45deg, #ccc 25%, transparent 25%), 
        linear-gradient(-45deg, #ccc 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #ccc 75%), 
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #eee;
      cursor: crosshair;
      border-radius: 4px;
      touch-action: none; /* Prevents scrolling while drawing on mobile */
    }
    .controls {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      width: 256px;
    }
    button {
      flex: 1;
      padding: 10px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-send { background: #28a745; color: white; }
    .btn-send:hover { background: #218838; }
    .btn-clear { background: #dc3545; color: white; }
    .btn-clear:hover { background: #c82333; }
  </style>
</head>
<body>

  <h3>Draw Custom Asset</h3>
  <canvas id="paintCanvas" width="256" height="256"></canvas>
  
  <div class="controls">
    <button class="btn-clear" id="btnClear">Clear</button>
    <button class="btn-send" id="btnSend">Send to Game</button>
  </div>

  <script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // Brush Settings (transparent background, thick black stroke)
    ctx.strokeStyle = '#111111';
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Drawing Logic (Mouse & Touch)
    function startPosition(e) {
      drawing = true;
      draw(e);
    }

    function endPosition() {
      drawing = false;
      ctx.beginPath();
    }

    function draw(e) {
      if (!drawing) return;
      
      const rect = canvas.getBoundingClientRect();
      // Support both mouse events and single-finger touch events
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      
      const x = clientX - rect.left;
      const y = clientY - rect.top;

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    // Event Listeners
    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', endPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseleave', endPosition);
    
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
    canvas.addEventListener('touchend', endPosition);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

    // Clear Canvas
    document.getElementById('btnClear').addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // Send Asset to Game via postMessage
    document.getElementById('btnSend').addEventListener('click', () => {
      const dataUrl = canvas.toDataURL('image/png');
      
      // In production, replace "*" with the actual Game domain (e.g. "https://yourgame.com")
      window.parent.postMessage({
        type: "ASSET_CREATED",
        dataUrl: dataUrl
      }, "*");
    });
  </script>
</body>
</html>
