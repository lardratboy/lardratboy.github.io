<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Blast - Galactic Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/23.1.2/tween.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        body {
            background-color: #05070a;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .nebula-bg {
            background: radial-gradient(circle at 50% 50%, #1a103d 0%, #05070a 100%);
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5), 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .power-btn {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .power-btn:active { transform: scale(0.9); }
        .power-btn.active { 
            background: rgba(34, 211, 238, 0.3); 
            border-color: rgba(34, 211, 238, 0.9);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
        }

        .badge {
            position: absolute; top: -5px; right: -5px;
            background: #ec4899; color: white; font-size: 10px;
            padding: 2px 6px; border-radius: 10px; font-weight: bold;
            font-family: 'Orbitron'; box-shadow: 0 0 10px rgba(236, 72, 153, 0.4);
        }

        #capacity-bar-fill { transition: width 0.3s ease-out; }

        .histogram-bar {
            transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 4px 4px 0 0;
        }

        .tab-btn {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .tab-btn.active { 
            background: rgba(0, 255, 255, 0.2); 
            color: #00ffff; 
            border-color: rgba(0, 255, 255, 0.3);
        }

        .shape-preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
            padding: 8px;
        }

        .shape-preview-grid::-webkit-scrollbar { width: 4px; }
        .shape-preview-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .shape-preview-grid::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.3); border-radius: 2px; }

        .data-pip {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            display: inline-block;
            margin: 0 1px;
            box-shadow: 0 0 3px currentColor;
        }

        /* UI State Control */
        .overlay-active #power-ups-container {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }
        #power-ups-container {
            transition: all 0.4s ease;
        }

        /* Announcement Ticker */
        #announcement-layer {
            height: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .announcement-text {
            animation: slideInDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                       fadeOut 0.4s ease 2.2s forwards;
            white-space: nowrap;
        }

        @keyframes slideInDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(100%); }
        }
    </style>
</head>
<body id="main-body" class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="nebula-bg"></div>

    <div class="max-w-md w-full z-10">
        <!-- Header Controls -->
        <div class="glass-panel p-4 flex justify-between items-center relative overflow-hidden">
            <div>
                <p class="text-xs uppercase tracking-widest text-cyan-400 font-bold">Data Harvested</p>
                <h1 id="score-display" class="text-2xl font-['Orbitron'] neon-text">000,000</h1>
                <p class="text-[10px] text-gray-400">BEST: <span id="best-score-display">0</span></p>
            </div>
            <div class="flex items-center gap-4 text-right">
                <button id="mute-toggle" onclick="toggleMute()" class="p-2 rounded-full border border-white/10 glass-panel hover:bg-white/5 transition-colors">
                    <span id="mute-icon" class="text-xl">🔊</span>
                </button>
                <div class="w-24">
                    <p class="text-xs uppercase tracking-widest text-pink-400 font-bold mb-1">Capacity</p>
                    <div class="h-4 bg-gray-800 rounded-full overflow-hidden border border-white/10 p-0.5">
                        <div id="capacity-bar-fill" class="h-full bg-pink-500 rounded-full" style="width: 100%"></div>
                    </div>
                    <p id="capacity-pct-display" class="text-xs font-['Orbitron'] mt-1">100%</p>
                </div>
            </div>
        </div>

        <!-- The "Natural Gap" Announcement Area -->
        <div id="announcement-layer" class="my-2 flex flex-col items-center justify-center italic text-[10px] tracking-widest text-cyan-400 uppercase font-bold">
            <!-- Announcements appear here -->
        </div>

        <div id="container" class="relative glass-panel p-2 shadow-2xl border-cyan-500/20 transition-all duration-500">
            <canvas id="gameCanvas" class="w-full h-auto cursor-pointer rounded-lg"></canvas>
            
            <!-- Mid-Game Database Overlay -->
            <div id="mid-game-db" class="hidden absolute inset-0 bg-black/95 backdrop-blur-xl rounded-lg flex flex-col items-center justify-center text-center p-6 z-50">
                <h2 class="text-xl font-['Orbitron'] text-cyan-400 mb-4">GALACTIC DATABASE</h2>
                
                <div class="flex flex-wrap justify-center gap-1 mb-4">
                    <button id="tab-mid-shapes" onclick="showMidTab('shapes')" class="tab-btn active">Mission Patterns</button>
                    <button id="tab-mid-archive" onclick="showMidTab('archive')" class="tab-btn">Global Archive</button>
                </div>

                <div id="view-mid-shapes" class="w-full">
                    <div id="mid-shape-gallery" class="shape-preview-grid mb-6"></div>
                </div>

                <div id="view-mid-archive" class="hidden w-full">
                    <div id="mid-archive-gallery" class="shape-preview-grid mb-6"></div>
                </div>

                <button onclick="closeDatabase()" class="bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-2.5 px-8 rounded-full transition-all shadow-[0_0_20px_rgba(6,182,212,0.5)] active:scale-95 text-xs uppercase">
                    Return to Mission
                </button>
            </div>

            <!-- Game Over Overlay -->
            <div id="game-over" class="hidden absolute inset-0 bg-black/95 backdrop-blur-xl rounded-lg flex flex-col items-center justify-center text-center p-6 z-40">
                <h2 class="text-xl font-['Orbitron'] text-cyan-400 mb-1">MISSION DEBRIEF</h2>
                <div id="high-score-alert" class="hidden text-pink-500 font-bold text-[10px] mb-2 animate-pulse uppercase tracking-widest">New Sector Record!</div>
                
                <div class="flex flex-wrap justify-center gap-1 mb-4">
                    <button id="tab-res" onclick="showTab('res')" class="tab-btn active">Resources</button>
                    <button id="tab-shapes" onclick="showTab('shapes')" class="tab-btn">Mission Patterns</button>
                    <button id="tab-archive" onclick="showTab('archive')" class="tab-btn">Galactic Archives</button>
                </div>

                <div id="view-res" class="w-full">
                    <div id="histogram" class="flex items-end justify-center gap-3 h-32 w-full mb-6 px-4"></div>
                </div>

                <div id="view-shapes" class="hidden w-full">
                    <div id="shape-gallery" class="shape-preview-grid mb-6"></div>
                </div>

                <div id="view-archive" class="hidden w-full">
                    <div id="archive-gallery" class="shape-preview-grid mb-6"></div>
                </div>

                <div class="mb-4">
                    <p class="text-gray-400 text-[10px] uppercase">Data Cached This Run</p>
                    <p class="text-2xl font-['Orbitron'] text-white"><span id="final-score">0</span></p>
                </div>

                <button onclick="resetGame()" class="bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-2.5 px-8 rounded-full transition-all shadow-[0_0_20px_rgba(6,182,212,0.5)] active:scale-95 text-xs uppercase">
                    Initiate Re-entry
                </button>
            </div>
        </div>

        <div id="power-ups-container" class="mt-4 grid grid-cols-4 gap-2">
            <button onclick="activatePower('bomb')" id="btn-bomb" class="power-btn glass-panel p-2 flex flex-col items-center justify-center">
                <span id="count-bomb" class="badge">2</span>
                <span class="text-[10px] text-cyan-300">BOMB</span>
                <span class="text-lg">💣</span>
            </button>
            <button onclick="activatePower('shuffle')" id="btn-shuffle" class="power-btn glass-panel p-2 flex flex-col items-center justify-center">
                <span id="count-shuffle" class="badge">2</span>
                <span class="text-[10px] text-cyan-300">SHUFFLE</span>
                <span class="text-lg">🌀</span>
            </button>
            <button onclick="activatePower('beam')" id="btn-beam" class="power-btn glass-panel p-2 flex flex-col items-center justify-center">
                <span id="count-beam" class="badge">2</span>
                <span class="text-[10px] text-cyan-300">BEAM</span>
                <span class="text-lg">⚡</span>
            </button>
            <button onclick="openDatabase()" class="power-btn glass-panel p-2 flex flex-col items-center justify-center bg-cyan-900/30 border-cyan-500/50 hover:bg-cyan-800/40">
                <span class="text-[10px] text-cyan-300 uppercase">Database</span>
                <span class="text-xs font-bold text-green-400">NOMINAL</span>
            </button>
        </div>
    </div>

    <script>
        class RetroSoundManager {
            constructor() {
                this.audioContext = null;
                this.masterGain = null;
                this.enabled = localStorage.getItem('starblast_mute') !== 'true';
                this.initAudio();
            }
            initAudio() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.audioContext.createGain();
                    this.masterGain.gain.value = 0.3;
                    this.masterGain.connect(this.audioContext.destination);
                } catch (e) { this.enabled = false; }
            }
            resume() { if (this.audioContext && this.audioContext.state === 'suspended') this.audioContext.resume(); }
            canPlay() { return this.enabled && this.audioContext && this.audioContext.state === 'running'; }
            playBloop(frequency, duration, waveType = 'sine', volume = 0.1) {
                if (!this.canPlay()) return;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.type = waveType;
                osc.frequency.setValueAtTime(frequency, this.audioContext.currentTime);
                gain.gain.setValueAtTime(0, this.audioContext.currentTime);
                gain.gain.linearRampToValueAtTime(volume, this.audioContext.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.audioContext.currentTime + duration);
            }
            playSweep(startFreq, endFreq, duration, waveType = 'sine', volume = 0.1) {
                if (!this.canPlay()) return;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.type = waveType;
                osc.frequency.setValueAtTime(startFreq, this.audioContext.currentTime);
                osc.frequency.exponentialRampToValueAtTime(endFreq, this.audioContext.currentTime + duration);
                gain.gain.setValueAtTime(volume, this.audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.audioContext.currentTime + duration);
            }
            sfxPop(count) {
                const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
                this.playBloop(scale[count % scale.length], 0.25, 'sine', 0.12);
            }
            sfxBonus() { [392, 523, 659, 783].forEach((f, i) => setTimeout(() => this.playBloop(f, 0.4, 'sine', 0.08), i * 60)); }
            sfxBomb() { this.playSweep(150, 40, 0.6, 'triangle', 0.2); }
            sfxBeam() { this.playSweep(600, 200, 0.3, 'sine', 0.1); }
            sfxShuffle() { [220, 246].forEach((f, i) => setTimeout(() => this.playBloop(f, 0.2, 'sine', 0.05), i * 100)); }
            sfxUI() { this.playBloop(330, 0.1, 'sine', 0.05); }
            sfxDiscovery() { this.playBloop(440, 0.1, 'sine', 0.02); }
            sfxSetComplete() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => this.playBloop(f, 0.5, 'sine', 0.08), i * 100)); }
            sfxGameOver() { [261, 196, 164].forEach((f, i) => setTimeout(() => this.playBloop(f, 0.6, 'sine', 0.1), i * 250)); }
        }

        const sound = new RetroSoundManager();
        const TWEEN = window.TWEEN;
        const mainBody = document.getElementById('main-body');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const bestScoreEl = document.getElementById('best-score-display');
        const capacityPctEl = document.getElementById('capacity-pct-display');
        const capacityBar = document.getElementById('capacity-bar-fill');
        const gameOverEl = document.getElementById('game-over');
        const midGameDbEl = document.getElementById('mid-game-db');
        const finalScoreEl = document.getElementById('final-score');
        const histogramContainer = document.getElementById('histogram');
        const shapeGalleryContainer = document.getElementById('shape-gallery');
        const archiveGalleryContainer = document.getElementById('archive-gallery');
        const midShapeGallery = document.getElementById('mid-shape-gallery');
        const midArchiveGallery = document.getElementById('mid-archive-gallery');
        const announcementLayer = document.getElementById('announcement-layer');

        const ROWS = 8, COLS = 8, COLORS = ['#FF3E3E', '#3EFF8B', '#3E8BFF', '#F03EFF', '#FFE33E'];
        const CELL_SIZE = 80, MARGIN = 4, GRID_PADDING = 10;

        canvas.width = (COLS * CELL_SIZE) + (GRID_PADDING * 2);
        canvas.height = (ROWS * CELL_SIZE) + (GRID_PADDING * 2);

        let grid = [], score = 0, bestScore = parseInt(localStorage.getItem('starblast_best')) || 0;
        let capacity = 30, MAX_CAPACITY = 30, isProcessing = false, activePower = null;
        let powers = { bomb: 2, shuffle: 2, beam: 2 };
        let isPaused = false;
        
        let galacticArchive = JSON.parse(localStorage.getItem('starblast_archive_v2')) || {};
        let stats = [0, 0, 0, 0, 0]; 
        let currentMissionShapes = {}; 

        function toggleMute() {
            sound.enabled = !sound.enabled;
            localStorage.setItem('starblast_mute', (!sound.enabled).toString());
            updateMuteUI();
            sound.resume();
        }

        function updateMuteUI() {
            document.getElementById('mute-icon').innerText = sound.enabled ? '🔊' : '🔇';
        }

        function announce(text, color = "cyan") {
            announcementLayer.innerHTML = '';
            const div = document.createElement('div');
            div.className = `announcement-text text-${color}-400`;
            div.innerHTML = `<span class="opacity-50 mr-1">SCAN:</span> ${text}`;
            announcementLayer.appendChild(div);
            setTimeout(() => div.remove(), 2600);
        }

        function openDatabase() {
            if (isProcessing || capacity <= 0) return;
            sound.sfxUI();
            isPaused = true;
            mainBody.classList.add('overlay-active');
            renderMidDatabase();
            midGameDbEl.classList.remove('hidden');
        }

        function closeDatabase() {
            sound.sfxUI();
            isPaused = false;
            mainBody.classList.remove('overlay-active');
            midGameDbEl.classList.add('hidden');
        }

        class Block {
            constructor(row, col, colorIndex) {
                this.row = row; this.col = col; this.colorIndex = colorIndex;
                this.pos = { x: col * CELL_SIZE, y: -500 };
                this.scale = 1; this.alpha = 1;
            }
            tweenTo(r, c, delay = 0) {
                return new TWEEN.Tween(this.pos)
                    .to({ x: c * CELL_SIZE, y: r * CELL_SIZE }, 400)
                    .easing(TWEEN.Easing.Back.Out).delay(delay).start();
            }
            draw() {
                const x = GRID_PADDING + this.pos.x + MARGIN, y = GRID_PADDING + this.pos.y + MARGIN;
                const size = CELL_SIZE - MARGIN * 2, color = COLORS[this.colorIndex];
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.translate(x + size/2, y + size/2); ctx.scale(this.scale, this.scale);
                if (activePower && !isProcessing && !isPaused) {
                    ctx.shadowBlur = 20; ctx.shadowColor = '#fff'; ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    roundRect(ctx, -size/2 - 2, -size/2 - 2, size + 4, size + 4, 14); ctx.stroke();
                }
                ctx.shadowBlur = 15; ctx.shadowColor = color;
                const grad = ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
                grad.addColorStop(0, color); grad.addColorStop(1, adjustColor(color, -50));
                ctx.fillStyle = grad; roundRect(ctx, -size/2, -size/2, size, size, 12); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
                roundRect(ctx, -size/2 + 2, -size/2 + 2, size - 4, size - 4, 10); ctx.stroke();
                ctx.restore();
            }
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, h + y - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
        }

        function adjustColor(hex, amt) {
            let num = parseInt(hex.slice(1), 16), r = (num >> 16) + amt, b = ((num >> 8) & 0x00FF) + amt, g = (num & 0x0000FF) + amt;
            const clamp = (v) => Math.min(255, Math.max(0, v));
            return "#" + (clamp(g) | (clamp(b) << 8) | (clamp(r) << 16)).toString(16).padStart(6, '0');
        }

        function initGrid() {
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    const b = new Block(r, c, Math.floor(Math.random() * COLORS.length));
                    b.pos.y = -((ROWS - r) * 120 + Math.random() * 200);
                    b.tweenTo(r, c, (ROWS - r) * 30 + (c * 10)); grid[r][c] = b;
                }
            }
        }

        function getMatches(r, c, colorIndex, visited = new Set()) {
            const key = `${r},${c}`;
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS || visited.has(key)) return [];
            if (!grid[r][c] || grid[r][c].colorIndex !== colorIndex) return [];
            visited.add(key);
            let matches = [{r, c}];
            matches = matches.concat(getMatches(r+1, c, colorIndex, visited), getMatches(r-1, c, colorIndex, visited), getMatches(r, c+1, colorIndex, visited), getMatches(r, c-1, colorIndex, visited));
            return matches;
        }

        function getShapeSignature(matches) {
            if (!matches.length) return "";
            const rows = matches.map(m => m.r);
            const cols = matches.map(m => m.c);
            const minR = Math.min(...rows);
            const minC = Math.min(...cols);
            return matches
                .map(m => `${m.r - minR},${m.c - minC}`)
                .sort()
                .join('|');
        }

        function trackShape(sig, colorIndex) {
            let isNewToMission = !currentMissionShapes[sig];
            if (isNewToMission) {
                currentMissionShapes[sig] = { count: 0, colors: new Array(COLORS.length).fill(false) };
                announce("New Pattern Detected", "cyan");
                sound.sfxDiscovery();
            }
            let wasCompleteBefore = currentMissionShapes[sig].colors.every(c => c);
            currentMissionShapes[sig].count++;
            currentMissionShapes[sig].colors[colorIndex] = true;
            let isCompleteNow = currentMissionShapes[sig].colors.every(c => c);
            if (isCompleteNow && !wasCompleteBefore) {
                announce("Pattern Color-Set Sync", "pink");
                sound.sfxSetComplete();
                capacity = Math.min(MAX_CAPACITY, capacity + 5);
                updateUI();
            }
            if (!galacticArchive[sig]) galacticArchive[sig] = { count: 0, colors: new Array(COLORS.length).fill(false) };
            galacticArchive[sig].count++;
            galacticArchive[sig].colors[colorIndex] = true;
            localStorage.setItem('starblast_archive_v2', JSON.stringify(galacticArchive));
        }

        async function handleInteraction(r, c) {
            if (isProcessing || capacity <= 0 || isPaused) return;
            sound.resume();
            if (activePower === 'bomb') {
                isProcessing = true; powers.bomb--; activePower = null; sound.sfxBomb();
                const affected = [];
                for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++) if (r+dr >=0 && r+dr < ROWS && c+dc >=0 && c+dc < COLS) affected.push({r: r+dr, c: c+dc});
                await blastMatches(affected);
            } else if (activePower === 'beam') {
                isProcessing = true; powers.beam--; activePower = null; sound.sfxBeam();
                const affected = [];
                for(let i=0; i<COLS; i++) affected.push({r, c: i});
                for(let i=0; i<ROWS; i++) if (i !== r) affected.push({r: i, c});
                await blastMatches(affected);
            } else {
                const colorIndex = grid[r][c].colorIndex;
                const matches = getMatches(r, c, colorIndex);
                if (matches.length >= 2) {
                    isProcessing = true; capacity--; 
                    trackShape(getShapeSignature(matches), colorIndex);
                    if (matches.length >= 6) { capacity = Math.min(MAX_CAPACITY, capacity + 1); sound.sfxBonus(); }
                    await blastMatches(matches);
                } else sound.sfxUI();
            }
            updatePowerUI(); updateUI();
            if (capacity <= 0 && !isProcessing) setTimeout(endGame, 800);
        }

        async function blastMatches(matches) {
            score += matches.length * 100;
            matches.forEach((m, i) => {
                const block = grid[m.r][m.c];
                if (!block) return;
                stats[block.colorIndex]++; 
                setTimeout(() => sound.sfxPop(i), i * 30);
                new TWEEN.Tween(block).to({ scale: 0, alpha: 0 }, 150).easing(TWEEN.Easing.Quadratic.Out).start();
            });
            await new Promise(res => setTimeout(res, 150));
            matches.forEach(m => { if(grid[m.r]) grid[m.r][m.c] = null; });
            refillGrid();
            isProcessing = false;
        }

        function refillGrid() {
            for (let c = 0; c < COLS; c++) {
                let emptySpots = 0;
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (grid[r][c] === null) emptySpots++;
                    else if (emptySpots > 0) {
                        const b = grid[r][c]; grid[r + emptySpots][c] = b;
                        b.row = r + emptySpots; b.tweenTo(b.row, c); grid[r][c] = null;
                    }
                }
                for (let i = 0; i < emptySpots; i++) {
                    const b = new Block(i, c, Math.floor(Math.random() * COLORS.length));
                    b.pos.y = -(i + 2) * CELL_SIZE; b.tweenTo(i, c, i * 50); grid[i][c] = b;
                }
            }
        }

        function updateUI() {
            scoreEl.innerText = score.toLocaleString().padStart(7, '0');
            bestScoreEl.innerText = bestScore.toLocaleString();
            const pct = Math.ceil((capacity / MAX_CAPACITY) * 100);
            capacityBar.style.width = Math.max(0, pct) + '%';
            capacityPctEl.innerText = Math.max(0, pct) + '%';
        }

        function updatePowerUI() {
            ['bomb', 'shuffle', 'beam'].forEach(p => {
                document.getElementById('count-' + p).innerText = powers[p];
                document.getElementById('btn-' + p).classList.toggle('active', activePower === p);
            });
        }

        function activatePower(type) {
            if (isProcessing || isPaused) return;
            sound.resume(); sound.sfxUI();
            if (powers[type] <= 0) return;
            if (activePower === type) activePower = null;
            else { activePower = type; if (type === 'shuffle') useShuffle(); }
            updatePowerUI();
        }

        function useShuffle() {
            isProcessing = true; powers.shuffle--; activePower = null; sound.sfxShuffle();
            const allBlocks = [];
            for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) allBlocks.push(grid[r][c]);
            allBlocks.sort(() => Math.random() - 0.5);
            let idx = 0;
            for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) { grid[r][c] = allBlocks[idx++]; grid[r][c].row = r; grid[r][c].col = c; grid[r][c].tweenTo(r, c); }
            setTimeout(() => { isProcessing = false; }, 400);
            updatePowerUI();
        }

        function showTab(tab) {
            ['res', 'shapes', 'archive'].forEach(t => {
                document.getElementById('view-' + t).classList.toggle('hidden', tab !== t);
                document.getElementById('tab-' + t).classList.toggle('active', tab === t);
            });
        }

        function showMidTab(tab) {
            ['mid-shapes', 'mid-archive'].forEach(t => {
                const viewId = 'view-' + t;
                const tabId = 'tab-' + t;
                const cleanTab = t.replace('mid-', '');
                document.getElementById(viewId).classList.toggle('hidden', cleanTab !== tab);
                document.getElementById(tabId).classList.toggle('active', cleanTab === tab);
            });
        }

        function createShapeIcon(sig, data, themeColor = "#00ffff") {
            const coords = sig.split('|').map(s => s.split(',').map(Number));
            const maxR = Math.max(...coords.map(c => c[0])) + 1;
            const maxC = Math.max(...coords.map(c => c[1])) + 1;
            const svgSize = 44;
            const gridCells = Math.max(maxR, maxC, 4);
            const blockSize = svgSize / gridCells;
            let blocksSvg = coords.map(([r,c]) => `<rect x="${c*blockSize}" y="${r*blockSize}" width="${blockSize-1}" height="${blockSize-1}" fill="${themeColor}" opacity="0.8" rx="1"/>`).join('');
            let pipsHtml = data.colors.map((hasColor, i) => hasColor ? `<span class="data-pip" style="color: ${COLORS[i]}; background: ${COLORS[i]}"></span>` : '').join('');
            return `<div class="glass-panel p-2.5 flex flex-col items-center justify-center border-white/5 bg-white/5"><svg width="${svgSize}" height="${svgSize}" viewBox="0 0 ${svgSize} ${svgSize}">${blocksSvg}</svg><div class="flex flex-wrap justify-center mt-2 h-2">${pipsHtml}</div><div class="text-[9px] mt-1 text-gray-400 font-bold">x${data.count}</div></div>`;
        }

        function renderMidDatabase() {
            midShapeGallery.innerHTML = '';
            const missionEntries = Object.entries(currentMissionShapes).sort((a,b) => b[1].count - a[1].count);
            if (!missionEntries.length) midShapeGallery.innerHTML = '<p class="text-xs text-gray-500 col-span-3 py-8 italic">No unique patterns detected this mission yet.</p>';
            else missionEntries.forEach(([sig, data]) => midShapeGallery.innerHTML += createShapeIcon(sig, data));

            midArchiveGallery.innerHTML = '';
            const archiveEntries = Object.entries(galacticArchive).sort((a,b) => b[1].count - a[1].count);
            archiveEntries.forEach(([sig, data]) => midArchiveGallery.innerHTML += createShapeIcon(sig, data, "#ec4899"));
        }

        function renderDebrief() {
            histogramContainer.innerHTML = '';
            const maxVal = Math.max(...stats) || 1;
            stats.forEach((count, i) => {
                const h = (count / maxVal) * 100;
                const barWrapper = document.createElement('div');
                barWrapper.className = 'flex flex-col items-center flex-1 h-full justify-end';
                barWrapper.innerHTML = `<div class="text-[10px] text-gray-400 mb-1">${count}</div><div class="histogram-bar w-full" style="height: ${h}%; background: ${COLORS[i]};"></div>`;
                histogramContainer.appendChild(barWrapper);
            });
            shapeGalleryContainer.innerHTML = '';
            const missionEntries = Object.entries(currentMissionShapes).sort((a,b) => b[1].count - a[1].count);
            if (!missionEntries.length) shapeGalleryContainer.innerHTML = '<p class="text-xs text-gray-500 col-span-3 py-8">No clusters harvested</p>';
            else missionEntries.forEach(([sig, data]) => shapeGalleryContainer.innerHTML += createShapeIcon(sig, data));
            archiveGalleryContainer.innerHTML = '';
            const archiveEntries = Object.entries(galacticArchive).sort((a,b) => b[1].count - a[1].count);
            archiveEntries.forEach(([sig, data]) => archiveGalleryContainer.innerHTML += createShapeIcon(sig, data, "#ec4899"));
        }

        function endGame() {
            finalScoreEl.innerText = score.toLocaleString();
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('starblast_best', bestScore.toString());
                document.getElementById('high-score-alert').classList.remove('hidden');
            }
            mainBody.classList.add('overlay-active');
            renderDebrief();
            gameOverEl.classList.remove('hidden');
            sound.sfxGameOver();
        }

        function resetGame() {
            score = 0; capacity = MAX_CAPACITY; stats = [0, 0, 0, 0, 0]; currentMissionShapes = {};
            powers = { bomb: 2, shuffle: 2, beam: 2 }; isPaused = false;
            mainBody.classList.remove('overlay-active');
            document.getElementById('high-score-alert').classList.add('hidden');
            gameOverEl.classList.add('hidden');
            midGameDbEl.classList.add('hidden');
            showTab('res');
            updateUI(); updatePowerUI(); initGrid();
        }

        canvas.addEventListener('mousedown', (e) => {
            if (isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            const c = Math.floor((x - GRID_PADDING) / CELL_SIZE), r = Math.floor((y - GRID_PADDING) / CELL_SIZE);
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) handleInteraction(r, c);
        });

        function animate(time) {
            if (!isPaused) TWEEN.update(time);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.4)'; roundRect(ctx, GRID_PADDING, GRID_PADDING, COLS * CELL_SIZE, ROWS * CELL_SIZE, 15); ctx.fill();
            for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c]) grid[r][c].draw();
            requestAnimationFrame(animate);
        }

        window.onload = () => { 
            updateMuteUI(); updateUI(); updatePowerUI(); initGrid(); 
            requestAnimationFrame(animate); 
        };
    </script>
</body>
</html>
