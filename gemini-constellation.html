<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  #panel { position: fixed; top: 16px; left: 16px; z-index: 100; width: 260px; background: rgba(5, 5, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 16px; font-size: 11px; box-shadow: 0 12px 40px rgba(0,0,0,0.8); transition: opacity 0.4s; }

  .section-label { font-family: 'Space Grotesk'; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); margin: 12px 0 6px 0; }
  
  .btn { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; font-size: 10px; transition: 0.2s; font-family: inherit; outline: none; margin-bottom: 4px; }
  .btn:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
  
  .btn-anim { background: rgba(110, 198, 255, 0.1); border-color: rgba(110, 198, 255, 0.4); color: #6ec6ff; font-weight: bold; }
  .btn-anim:hover { background: rgba(110, 198, 255, 0.2); border-color: #6ec6ff; }

  select.btn { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 10px center; background-size: 12px; padding-right: 30px; }
  
  .btn-export { border-color: #7bed9f; color: #7bed9f; font-weight: bold; margin-top: 10px; background: rgba(123, 237, 159, 0.1); }

  #tooltip { position: fixed; z-index: 200; pointer-events: none; opacity: 0; background: rgba(15, 15, 30, 0.96); border: 2px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 12px 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.9); min-width: 100px; transition: opacity 0.15s; }
  #tooltip.visible { opacity: 1; }
  #tooltip.rainbow-complete { border-color: rgba(78, 205, 196, 0.6); box-shadow: 0 0 18px rgba(78, 205, 196, 0.2), 0 12px 40px rgba(0,0,0,0.9); }

  .tt-glyph { display: flex; justify-content: center; margin-bottom: 8px; }
  .tt-pips { display: flex; justify-content: center; gap: 3px; margin-top: 6px; }
  .tt-pip { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }
  .tt-pip.empty { background: rgba(255,255,255,0.1) !important; box-shadow: none; }
  .tt-perms { display: flex; justify-content: center; gap: 2px; margin-top: 4px; align-items: center; }
  .tt-perm { width: 6px; height: 6px; border-radius: 1px; transform: rotate(45deg); }
  .tt-perm.found { background: #67e8f9; box-shadow: 0 0 4px #67e8f9; }
  .tt-perm.empty { background: rgba(255,255,255,0.1); }
  .tt-perm-div { width: 1px; height: 6px; background: rgba(255,255,255,0.1); margin: 0 1px; transform: rotate(45deg); }
  .tt-count { font-size: 12px; text-align: center; color: rgba(255,255,255,0.5); font-weight: 700; margin-top: 5px; }
  .tt-label { font-size: 10px; text-align: center; color: rgba(255,255,255,0.3); margin-top: 2px; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
  
  #intro { position: fixed; inset: 0; z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; transition: opacity 0.8s ease; }
  #intro.hidden { opacity: 0; pointer-events: none; }
  
  #stats-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 20px; padding: 10px 24px; background: rgba(10, 10, 25, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; font-size: 11px; transition: opacity 0.4s; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="panel" class="hidden-ui">
  <div style="font-family:'Space Grotesk'; font-weight:600; color:#fff; font-size:15px; margin-bottom:12px; letter-spacing:1px">CONSTELLATION v5.5</div>
  <div class="stat-row"><span>Unique Shapes</span><span class="val" id="st-shapes">0</span></div>
  
  <div class="section-label">Sequential Discovery</div>
  <button class="btn btn-anim" onclick="triggerDiscoveryPulse()">Discovery Pulse Ripple</button>
  <button class="btn btn-anim" onclick="pulseVolume()">Popularity Pulse (N)</button>

  <div class="section-label">Projection</div>
  <select class="btn" id="projection-select" onchange="setProjection(this.value)">
    <option value="force" selected>Force Simulation</option>
    <option value="fibonacci">Fibonacci Sphere (Discovery)</option>
    <option value="lattice2d">2D Lattice (By Size)</option>
    <option value="lattice3d">3D Lattice (By Count)</option>
  </select>

  <div class="section-label">Color Palette</div>
  <select class="btn" id="color-mode-select" onchange="setColorMode(this.value)">
    <option value="spatial" selected>Spatial RGB (3D Map)</option>
    <option value="gradient">Shape Gradient (Local)</option>

    <option value="size">Complexity (By Size)</option>

  </select>

  <div class="section-label">Tools</div>

  <button class="btn btn-export" id="export-btn" onclick="exportBakedGLB()">Export Baked .glb</button>
  <button class="btn" style="margin-top:20px; border-color: rgba(255,100,100,0.3); color: #ff8888" onclick="returnToIntro()">Load New File</button>
</div>

<div id="tooltip">
  <div class="tt-glyph" id="tooltip-glyph"></div>
  <div class="tt-pips" id="tooltip-pips"></div>
  <div class="tt-perms" id="tooltip-perms"></div>
  <div class="tt-count" id="tooltip-count"></div>
  <div class="tt-label" id="tooltip-label"></div>
</div>

<div id="stats-bar" class="hidden-ui">
  <span style="color:rgba(255,255,255,0.5)">Shapes: <b style="color:#fff" id="sb-shapes">0</b></span>
  <span style="color:rgba(255,255,255,0.5)">Rainbows: <b style="color:#7bed9f" id="sb-rainbows">0</b></span>
</div>

<div id="intro">
  <h1 style="font-family:'Space Grotesk'; color:#fff; font-weight:300; letter-spacing:12px; margin-bottom:40px">CONSTELLATION</h1>
  <button class="btn" style="width:260px; height:60px; font-size:13px; background:#6ec6ff22; border-color: #6ec6ff; color: #fff" onclick="document.getElementById('file-input').click()">UPLOAD COLLECTION JSON</button>
  <button class="btn" style="width:260px; height:50px; font-size:12px; margin-top:10px; background:rgba(123,237,159,0.1); border-color:rgba(123,237,159,0.5); color:#7bed9f" onclick="pasteFromClipboard()">PASTE FROM CLIPBOARD</button>
  <p id="load-status" style="margin-top:20px; font-size:11px; color:#6ec6ff"></p>
  <input type="file" id="file-input" accept=".json" style="display:none">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>
const popcount = v => { v = v - ((v >> 1) & 0x55555555); v = (v & 0x33333333) + ((v >> 2) & 0x33333333); return ((v + (v >> 4) & 0x0F0F0F0F) * 0x01010101) >> 24; };

let scene, camera, renderer, controls, cubeInstances, rayPoints, constellation, sim;
let constellationReady = false, colorMode = 'spatial', projectionMode = 'force';
let defaultMaterial = null, vertexSpatialMaterial = null;

const BASE_CUBE_SCALE = 6.5;

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 1, 25000);
  camera.position.set(0, 500, 1200);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.getElementById('canvas-container').appendChild(renderer.domElement);
  
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const sun = new THREE.DirectionalLight(0xffffff, 1.2);
  sun.position.set(100, 400, 150);
  scene.add(sun);
  
  window.addEventListener('dblclick', () => { if (constellationReady) controls.autoRotate = !controls.autoRotate; });
  animate();
}

function hardReset() {
  constellationReady = false;
  const fileInput = document.getElementById('file-input');
  if (fileInput) fileInput.value = "";
  TWEEN.removeAll();

  if (cubeInstances) {
    scene.remove(cubeInstances);
    cubeInstances.geometry.dispose();
    cubeInstances = null;
  }
  if (defaultMaterial) { defaultMaterial.dispose(); defaultMaterial = null; }
  if (vertexSpatialMaterial) { vertexSpatialMaterial.dispose(); vertexSpatialMaterial = null; }
  if (rayPoints) {
    scene.remove(rayPoints);
    rayPoints.geometry.dispose();
    rayPoints.material.dispose();
    rayPoints = null;
  }
  sim = null;
  constellation = null;
}

function returnToIntro() {
  hardReset();
  document.getElementById('intro').classList.remove('hidden');
  document.getElementById('panel').classList.add('hidden-ui');
  document.getElementById('stats-bar').classList.add('hidden-ui');
}

function buildGraph(data) {
  const nodes = Object.entries(data).map(([sig, d]) => {
    const cells = sig.split('|').map(x => x.split(',').map(Number));
    const minR = Math.min(...cells.map(p=>p[0])), minC = Math.min(...cells.map(p=>p[1]));
    const norm = cells.map(p=>[p[0]-minR, p[1]-minC]).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
    
    return {
      id: sig, cells: norm, count: d.n, bits: d.b, size: norm.length,
      d: d.d || 0,
      x: (Math.random()-0.5)*1200, 
      y: (norm.length - 5) * 120,
      z: (Math.random()-0.5)*1200,
      vx: 0, vy: 0, vz: 0, 
      scale: BASE_CUBE_SCALE,
      color: new THREE.Color()
    };
  });
  return { nodes };
}

function buildScene() {
  const nodes = constellation.nodes;
  const totalCubes = nodes.reduce((s,n)=>s+n.size, 0);

  // ── Default Phong material ──
  defaultMaterial = new THREE.MeshPhongMaterial({ shininess: 80, specular: 0x444444 });

  const boxGeo = new THREE.BoxGeometry(1, 1, 1);
  cubeInstances = new THREE.InstancedMesh(boxGeo, defaultMaterial, totalCubes);
  cubeInstances.instanceColor = new THREE.InstancedBufferAttribute(new Float32Array(totalCubes * 3), 3);

  // ── Per-instance attributes for vertex spatial mode ──
  // Cell center in unit (scale-independent) space + shape AABB
  const cellUnitArr = new Float32Array(totalCubes * 3);
  const aabbMinArr  = new Float32Array(totalCubes * 3);
  const aabbMaxArr  = new Float32Array(totalCubes * 3);
  const HALF_W = 0.96 * 0.5;   // half cube width in unit space
  const HALF_H = 0.4  * 0.5;   // half cube height
  const CENTER_OFFSET = 1.2;   // matches updateFrame's (cell-1.2)

  let ai = 0;
  nodes.forEach(n => {
    // Compute this shape's AABB in unit space across all its cells + vertex extents
    let sMinX = Infinity, sMaxX = -Infinity;
    let sMinZ = Infinity, sMaxZ = -Infinity;
    const cellCenters = n.cells.map(cell => ({
      x: cell[1] - CENTER_OFFSET,
      z: cell[0] - CENTER_OFFSET
    }));
    cellCenters.forEach(cc => {
      if (cc.x - HALF_W < sMinX) sMinX = cc.x - HALF_W;
      if (cc.x + HALF_W > sMaxX) sMaxX = cc.x + HALF_W;
      if (cc.z - HALF_W < sMinZ) sMinZ = cc.z - HALF_W;
      if (cc.z + HALF_W > sMaxZ) sMaxZ = cc.z + HALF_W;
    });
    const aMin = [sMinX, -HALF_H, sMinZ];
    const aMax = [sMaxX,  HALF_H, sMaxZ];

    cellCenters.forEach(cc => {
      cellUnitArr[ai*3]   = cc.x;
      cellUnitArr[ai*3+1] = 0;
      cellUnitArr[ai*3+2] = cc.z;
      aabbMinArr[ai*3]    = aMin[0]; aabbMinArr[ai*3+1] = aMin[1]; aabbMinArr[ai*3+2] = aMin[2];
      aabbMaxArr[ai*3]    = aMax[0]; aabbMaxArr[ai*3+1] = aMax[1]; aabbMaxArr[ai*3+2] = aMax[2];
      ai++;
    });
  });

  boxGeo.setAttribute('aCellUnit', new THREE.InstancedBufferAttribute(cellUnitArr, 3));
  boxGeo.setAttribute('aAABBMin',  new THREE.InstancedBufferAttribute(aabbMinArr,  3));
  boxGeo.setAttribute('aAABBMax',  new THREE.InstancedBufferAttribute(aabbMaxArr,  3));

  // ── Vertex Spatial ShaderMaterial ──
  vertexSpatialMaterial = new THREE.ShaderMaterial({
    uniforms: {
      lightDir:    { value: new THREE.Vector3(100, 400, 150).normalize() },
      ambientStr:  { value: 0.35 },
      specColor:   { value: new THREE.Color(0x888888) },
      shininess:   { value: 64.0 },
    },
    vertexShader: [
      'attribute vec3 aCellUnit;',
      'attribute vec3 aAABBMin;',
      'attribute vec3 aAABBMax;',
      '',
      'varying vec3 vLocalColor;',
      'varying vec3 vWorldNormal;',
      'varying vec3 vViewDir;',
      '',
      'void main() {',
      '  // Vertex position in shape-local unit space (scale-independent)',
      '  vec3 localPos = aCellUnit + position * vec3(0.96, 0.4, 0.96);',
      '  vec3 range = max(aAABBMax - aAABBMin, vec3(0.001));',
      '  vLocalColor = clamp((localPos - aAABBMin) / range, 0.0, 1.0);',
      '',
      '  // Boost: saturate the raw RGB so it reads as vivid, not washed-out',
      '  // Slight power curve lifts midtones while preserving 0 and 1',
      '  vLocalColor = pow(vLocalColor, vec3(0.85));',
      '',
      '  // Standard instanced transform',
      '  vec4 worldPos = modelMatrix * instanceMatrix * vec4(position, 1.0);',
      '  vec4 mvPos = viewMatrix * worldPos;',
      '',
      '  // Normal: box faces are axis-aligned so simple transform is correct',
      '  vWorldNormal = normalize(mat3(modelMatrix) * mat3(instanceMatrix) * normal);',
      '  vViewDir = normalize(cameraPosition - worldPos.xyz);',
      '',
      '  gl_Position = projectionMatrix * mvPos;',
      '}',
    ].join('\n'),
    fragmentShader: [
      'uniform vec3  lightDir;',
      'uniform float ambientStr;',
      'uniform vec3  specColor;',
      'uniform float shininess;',
      '',
      'varying vec3 vLocalColor;',
      'varying vec3 vWorldNormal;',
      'varying vec3 vViewDir;',
      '',
      'void main() {',
      '  vec3 N = normalize(vWorldNormal);',
      '  vec3 L = normalize(lightDir);',
      '  vec3 V = normalize(vViewDir);',
      '  vec3 H = normalize(L + V);',
      '',
      '  float diff = max(dot(N, L), 0.0);',
      '  float spec = pow(max(dot(N, H), 0.0), shininess);',
      '',
      '  vec3 ambient  = vLocalColor * ambientStr;',
      '  vec3 diffuse  = vLocalColor * diff;',
      '  vec3 specular = specColor * spec;',
      '',
      '  vec3 color = ambient + diffuse + specular;',
      '',
      '  // Reinhard tone-map + gamma',
      '  color = color / (color + vec3(1.0));',
      '  color = pow(color, vec3(1.0 / 2.2));',
      '',
      '  gl_FragColor = vec4(color, 1.0);',
      '}',
    ].join('\n'),
  });

  updateNodeColors();
  scene.add(cubeInstances);

  const rGeo = new THREE.BufferGeometry();
  rGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(nodes.length*3), 3));
  rayPoints = new THREE.Points(rGeo, new THREE.PointsMaterial({ size: 25, transparent: true, opacity: 0 }));
  scene.add(rayPoints);
}

// ── Gradient ramp for per-shape local coloring ──
const GRADIENT_STOPS = [
  { t: 0.00, color: new THREE.Color(0.98, 0.35, 0.56) },  // hot rose
  { t: 0.22, color: new THREE.Color(1.00, 0.62, 0.26) },  // warm amber
  { t: 0.44, color: new THREE.Color(0.95, 0.85, 0.20) },  // gold
  { t: 0.58, color: new THREE.Color(0.20, 0.82, 0.65) },  // seafoam
  { t: 0.75, color: new THREE.Color(0.28, 0.58, 0.96) },  // sky blue
  { t: 1.00, color: new THREE.Color(0.60, 0.30, 0.92) },  // violet
];
const _gradOut = new THREE.Color();

function sampleGradient(t) {
  t = Math.max(0, Math.min(1, t));
  for (let i = 0; i < GRADIENT_STOPS.length - 1; i++) {
    const a = GRADIENT_STOPS[i], b = GRADIENT_STOPS[i + 1];
    if (t <= b.t) {
      const f = (t - a.t) / (b.t - a.t);
      _gradOut.lerpColors(a.color, b.color, f);
      return _gradOut;
    }
  }
  _gradOut.copy(GRADIENT_STOPS[GRADIENT_STOPS.length - 1].color);
  return _gradOut;
}

function updateNodeColors() {
  if (!cubeInstances || !constellation) return;
  if (colorMode === 'vertex_spatial') return; // shader handles colors
  const nodes = constellation.nodes;
  const colorAttr = cubeInstances.instanceColor;
  
  let sb = {
    minX: Math.min(...nodes.map(n => n.x)), maxX: Math.max(...nodes.map(n => n.x)),
    minY: Math.min(...nodes.map(n => n.y)), maxY: Math.max(...nodes.map(n => n.y)),
    minZ: Math.min(...nodes.map(n => n.z)), maxZ: Math.max(...nodes.map(n => n.z)),
  };

  let idx = 0;
  nodes.forEach(n => {
    if (colorMode === 'gradient') {
      // Per-cell color: normalize each cell within the shape's local AABB
      const maxR = Math.max(...n.cells.map(c => c[0]));
      const maxC = Math.max(...n.cells.map(c => c[1]));

      n.cells.forEach((cell) => {
        // Normalize to [0,1] within shape; 0.5 when axis is degenerate
        const u = maxC > 0 ? cell[1] / maxC : 0.5;
        const v = maxR > 0 ? cell[0] / maxR : 0.5;
        // Diagonal sweep: corner-to-corner gradient
        const t = (u + v) / 2;

        const gc = sampleGradient(t);
        colorAttr.setXYZ(idx, gc.r, gc.g, gc.b);
        idx++;
      });
    } else {
      // All other modes: one color per node, applied to all its cells
      let c = n.color;
      if (colorMode === 'size') {
        const pal = [null,'#ffd93d','#ffb347','#ff8a65','#ff6b6b','#e879a8','#c792ea','#9fa8da','#5f9ee9','#4dd0e1','#7bed9f'];
        c.set(pal[Math.min(n.size, 10)] || '#ffffff');
      } else if (colorMode === 'spectrum') {
        c.set(popcount(n.bits&0x1F)===5 ? '#00ffcc' : '#334455');
      } else if (colorMode === 'spatial') {
        c.setRGB(
          (n.x - sb.minX) / (sb.maxX - sb.minX || 1),
          (n.y - sb.minY) / (sb.maxY - sb.minY || 1),
          (n.z - sb.minZ) / (sb.maxZ - sb.minZ || 1)
        );
      }
      for(let i=0; i<n.size; i++) colorAttr.setXYZ(idx + i, c.r, c.g, c.b);
      idx += n.size;
    }
  });
  colorAttr.needsUpdate = true;
}

// ── NEW: Discovery Pulse Animation Ripple ──
function triggerDiscoveryPulse() {
  if (!constellationReady) return;
  
  constellation.nodes.forEach((n) => {
    // Discovery order based ripple
    new TWEEN.Tween(n)
      .to({ scale: BASE_CUBE_SCALE * 3.5 }, 400)
      .delay(n.d * 20) // Ripple sequenced by discovery time
      .easing(TWEEN.Easing.Quadratic.Out)
      .repeat(1)
      .yoyo(true)
      .start();
  });
}

// ── Pulse Volume Animation (By Found Count) ──
function pulseVolume() {
  if (!constellationReady) return;
  constellation.nodes.forEach(n => {
    const targetScale = BASE_CUBE_SCALE * (1 + Math.log10(n.count) * 1.8);
    new TWEEN.Tween(n)
      .to({ scale: targetScale }, 1200)
      .easing(TWEEN.Easing.Elastic.Out)
      .repeat(1)
      .yoyo(true)
      .start();
  });
}

const _m = new THREE.Matrix4(), _p = new THREE.Vector3(), _q = new THREE.Quaternion(), _s = new THREE.Vector3();
function updateFrame(time) {
  if (!constellationReady || !sim) return;

  const { nodes } = sim;
  if (sim.running && projectionMode === 'force') {
    const alpha = sim.alpha;
    for(let i=0; i<nodes.length; i++) {
      const a = nodes[i];
      for(let j=i+1; j<nodes.length; j++){
        const b = nodes[j];
        let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
        let d2 = dx*dx + dy*dy + dz*dz || 1;
        if (d2 < 6000) { 
          let f = -18.0 * alpha;
          a.vx += (dx/d2)*f; a.vy += (dy/d2)*f; a.vz += (dz/d2)*f;
          b.vx -= (dx/d2)*f; b.vy -= (dy/d2)*f; b.vz -= (dz/d2)*f;
        }
      }
      a.vx *= 0.94; a.vy *= 0.94; a.vz *= 0.94;
      a.x += a.vx; a.y += a.vy; a.z += a.vz;
    }
    sim.alpha *= 0.994;
    if (sim.alpha < 0.001) { sim.running = false; }
    if (colorMode === 'spatial') updateNodeColors();
  }

  let cIdx = 0; 
  nodes.forEach(n => {
    _q.setFromAxisAngle(new THREE.Vector3(0,1,0), time*0.3 + (n.size * 0.1));
    n.cells.forEach(cell => {
      _p.set((cell[1]-1.2)*n.scale, 0, (cell[0]-1.2)*n.scale).applyQuaternion(_q).add(new THREE.Vector3(n.x, n.y, n.z));
      _s.set(n.scale*0.96, n.scale*0.4, n.scale*0.96);
      _m.compose(_p, _q, _s);
      cubeInstances.setMatrixAt(cIdx++, _m);
    });
  });
  cubeInstances.instanceMatrix.needsUpdate = true;
  
  const gp = rayPoints.geometry.attributes.position.array;
  nodes.forEach((n,i)=>{ gp[i*3]=n.x; gp[i*3+1]=n.y; gp[i*3+2]=n.z; });
  rayPoints.geometry.attributes.position.needsUpdate = true;
}

function animate() {
  requestAnimationFrame(animate);
  TWEEN.update();
  updateFrame(performance.now()*0.001);
  controls.update();
  renderer.render(scene, camera);
}

async function loadData(data) {
  hardReset();
  document.getElementById('load-status').innerText = "RIPPLE CALIBRATION...";
  await new Promise(r => setTimeout(r, 300));
  
  constellation = buildGraph(data);
  sim = { alpha: 1.0, nodes: constellation.nodes, running: true };
  buildScene();
  
  document.getElementById('st-shapes').innerText = constellation.nodes.length;
  document.getElementById('sb-shapes').innerText = constellation.nodes.length;
  document.getElementById('sb-rainbows').innerText = constellation.nodes.filter(n=>popcount(n.bits&0x1F)===5).length;
  
  constellationReady = true;
  colorMode = 'spatial';
  document.getElementById('color-mode-select').value = 'spatial';
  projectionMode = 'force';
  document.getElementById('projection-select').value = 'force';
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('panel').classList.remove('hidden-ui');
  document.getElementById('stats-bar').classList.remove('hidden-ui');
  
  resetCamera();
  triggerDiscoveryPulse();
}

function resetCamera() {
  if (!constellationReady) return;
  const nodes = constellation.nodes;

  // Compute bounding box of current node positions
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const n of nodes) {
    if (n.x < minX) minX = n.x; if (n.x > maxX) maxX = n.x;
    if (n.y < minY) minY = n.y; if (n.y > maxY) maxY = n.y;
    if (n.z < minZ) minZ = n.z; if (n.z > maxZ) maxZ = n.z;
  }
  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2, cz = (minZ + maxZ) / 2;
  const span = Math.max(maxX - minX, maxY - minY, maxZ - minZ, 100);

  if (projectionMode === 'lattice2d') {
    // Top-down-ish angled view for 2D lattice
    new TWEEN.Tween(camera.position).to({ x: cx, y: cy + span * 0.2, z: cz + span * 1.1 }, 2000).easing(TWEEN.Easing.Quadratic.Out).start();
  } else {
    new TWEEN.Tween(camera.position).to({ x: cx, y: cy + span * 0.4, z: cz + span * 1.2 }, 2000).easing(TWEEN.Easing.Quadratic.Out).start();
  }
  new TWEEN.Tween(controls.target).to({ x: cx, y: cy, z: cz }, 2000).easing(TWEEN.Easing.Quadratic.Out).start();
}

function setColorMode(m) {
  const wasVertexSpatial = colorMode === 'vertex_spatial';
  colorMode = m;
  if (!constellationReady || !cubeInstances) return;

  if (m === 'vertex_spatial') {
    // Swap to custom ShaderMaterial — colors come from the vertex shader
    cubeInstances.material = vertexSpatialMaterial;
  } else {
    if (wasVertexSpatial) {
      // Swap back to Phong + instanceColor
      cubeInstances.material = defaultMaterial;
    }
    updateNodeColors();
  }
}

// ── Projection System ──

function computeProjectionTargets(mode) {
  const nodes = constellation.nodes;
  const N = nodes.length;
  const targets = new Map();
  const SPACING = BASE_CUBE_SCALE * 5;

  if (mode === 'fibonacci') {
    // Fibonacci sphere, ordered by discovery ID
    const sorted = [...nodes].sort((a, b) => a.d - b.d);
    const radius = Math.max(150, Math.sqrt(N) * SPACING * 0.8);
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));
    sorted.forEach((n, i) => {
      const y = 1 - (2 * i + 1) / N;
      const r = Math.sqrt(1 - y * y);
      const theta = goldenAngle * i;
      targets.set(n, {
        x: Math.cos(theta) * r * radius,
        y: y * radius,
        z: Math.sin(theta) * r * radius
      });
    });

  } else if (mode === 'lattice2d') {
    // 2D tiered lattice grouped by cell count (size)
    const bySize = {};
    nodes.forEach(n => {
      if (!bySize[n.size]) bySize[n.size] = [];
      bySize[n.size].push(n);
    });
    const sizes = Object.keys(bySize).map(Number).sort((a, b) => a - b);
    const tierSpacing = SPACING * 5;
    const totalHeight = (sizes.length - 1) * tierSpacing;

    sizes.forEach((sz, tierIdx) => {
      const group = bySize[sz];
      // Sort within tier by count descending for a nice layout
      group.sort((a, b) => b.count - a.count);
      const cols = Math.ceil(Math.sqrt(group.length * 2)); // wider than tall
      const y = (tierIdx * tierSpacing) - totalHeight / 2;

      group.forEach((n, i) => {
        const row = Math.floor(i / cols);
        const col = i % cols;
        // Center each row
        const rowCount = Math.min(cols, group.length - row * cols);
        const xOff = (col - (rowCount - 1) / 2) * SPACING;
        const zOff = (row - Math.floor(group.length / cols) / 2) * SPACING;
        targets.set(n, { x: xOff, y: y, z: zOff });
      });
    });

  } else if (mode === 'lattice3d') {
    // 3D lattice sorted by count (n)
    const sorted = [...nodes].sort((a, b) => a.count - b.count);
    const perSide = Math.ceil(Math.cbrt(N));
    sorted.forEach((n, i) => {
      const ix = i % perSide;
      const iy = Math.floor(i / perSide) % perSide;
      const iz = Math.floor(i / (perSide * perSide));
      targets.set(n, {
        x: (ix - (perSide - 1) / 2) * SPACING,
        y: (iy - (perSide - 1) / 2) * SPACING,
        z: (iz - (perSide - 1) / 2) * SPACING
      });
    });
  }

  return targets;
}

function setProjection(mode) {
  if (!constellationReady) return;
  projectionMode = mode;
  document.getElementById('projection-select').value = mode;

  // Kill any ongoing position tweens
  constellation.nodes.forEach(n => {
    if (n._posTween) { n._posTween.stop(); n._posTween = null; }
  });

  if (mode === 'force') {
    // Restart force sim from current positions
    sim.alpha = 1.0;
    sim.running = true;
    constellation.nodes.forEach(n => { n.vx = 0; n.vy = 0; n.vz = 0; });
    // Nudge Y back toward size-based layering
    constellation.nodes.forEach(n => {
      n.vy = ((n.size - 5) * 120 - n.y) * 0.01;
    });
    resetCamera();
    return;
  }

  // Stop force sim
  sim.running = false;

  const targets = computeProjectionTargets(mode);

  constellation.nodes.forEach(n => {
    const t = targets.get(n);
    if (!t) return;
    n.vx = 0; n.vy = 0; n.vz = 0;
    n._posTween = new TWEEN.Tween(n)
      .to({ x: t.x, y: t.y, z: t.z }, 1800)
      .easing(TWEEN.Easing.Quadratic.InOut)
      .start();
  });

  // Single color-update tween during transition (instead of per-node)
  if (colorMode === 'spatial') {
    const _dummy = { t: 0 };
    new TWEEN.Tween(_dummy).to({ t: 1 }, 1800)
      .onUpdate(() => updateNodeColors())
      .start();
  }

  // Fit camera after transition settles
  setTimeout(() => resetCamera(), 400);
}

function exportBakedGLB() {
  const btn = document.getElementById('export-btn');
  btn.innerText = "BAKING...";
  const bakeScene = new THREE.Scene();
  const geometry = new THREE.BoxGeometry(1, 1, 1);
  const matrix = new THREE.Matrix4();
  const color = new THREE.Color();

  for (let i = 0; i < cubeInstances.count; i++) {
    cubeInstances.getMatrixAt(i, matrix);
    cubeInstances.getColorAt(i, color);
    const m = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ color: color.clone() }));
    m.applyMatrix4(matrix);
    bakeScene.add(m);
  }

  new THREE.GLTFExporter().parse(bakeScene, (res) => {
    const blob = new Blob([res], { type: 'application/octet-stream' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `constellation_pulse_baked_${Date.now()}.glb`;
    a.click();
    btn.innerText = "✓ EXPORTED";
    setTimeout(() => btn.innerText = "Export Baked .glb", 2000);
  }, { binary: true });
}

const GAME_COLORS = ['#ff6b6b', '#7bed9f', '#5f9ee9', '#c792ea', '#ffd93d'];
const COLOR_BITS = 0, PERM_BITS = 5, COLOR_MASK = 0x001F;

const _proj = new THREE.Vector3();
let hoveredNode = null;

window.addEventListener('mousemove', (e) => {
  if (!constellationReady || !constellation) return;
  const mx = e.clientX, my = e.clientY;
  const w = window.innerWidth, h = window.innerHeight;
  const div = document.getElementById('tooltip');

  // Screen-space picking: project every node to 2D and find the closest to the mouse
  let bestDist = Infinity, bestNode = null;
  const PICK_RADIUS = 40; // pixels

  for (const n of constellation.nodes) {
    _proj.set(n.x, n.y, n.z).project(camera);
    // Skip nodes behind the camera
    if (_proj.z > 1) continue;
    const sx = (_proj.x * 0.5 + 0.5) * w;
    const sy = (-_proj.y * 0.5 + 0.5) * h;
    const dx = sx - mx, dy = sy - my;
    const dist = dx * dx + dy * dy;
    if (dist < bestDist) { bestDist = dist; bestNode = n; }
  }

  const withinRadius = bestDist < PICK_RADIUS * PICK_RADIUS;

  if (withinRadius && bestNode) {
    hoveredNode = bestNode;
    const n = bestNode;

    // Position tooltip near mouse, clamped to viewport
    let tx = mx + 18, ty = my - 30;
    // Clamp so it doesn't overflow off-screen
    const tw = 130, th = 160; // rough tooltip size
    if (tx + tw > w - 10) tx = mx - tw - 14;
    if (ty + th > h - 10) ty = h - th - 10;
    if (ty < 10) ty = 10;
    div.style.left = tx + 'px';
    div.style.top = ty + 'px';

    // Rainbow border glow if all 5 colors found
    const hasAllColors = popcount(n.bits & COLOR_MASK) === 5;
    div.classList.toggle('rainbow-complete', hasAllColors);
    div.classList.add('visible');

    // Render polyomino glyph
    const cells = n.cells;
    const maxR = Math.max(...cells.map(c => c[0])) + 1;
    const maxC = Math.max(...cells.map(c => c[1])) + 1;
    const svgDim = 56;
    const gridCells = Math.max(maxR, maxC, 3);
    const bs = svgDim / gridCells;
    const glyphColor = '#c792ea';
    const rects = cells.map(([r,c]) =>
      `<rect x="${c*bs}" y="${r*bs}" width="${bs-2}" height="${bs-2}" fill="${glyphColor}" rx="3"/>`
    ).join('');
    document.getElementById('tooltip-glyph').innerHTML =
      `<svg width="${svgDim}" height="${svgDim}" viewBox="0 0 ${svgDim} ${svgDim}">${rects}</svg>`;

    // Color pips
    let pipsHtml = '';
    for (let i = 0; i < 5; i++) {
      const found = (n.bits >> (COLOR_BITS + i)) & 1;
      if (found) {
        pipsHtml += `<span class="tt-pip" style="color:${GAME_COLORS[i]}; background:${GAME_COLORS[i]}"></span>`;
      } else {
        pipsHtml += `<span class="tt-pip empty"></span>`;
      }
    }
    document.getElementById('tooltip-pips').innerHTML = pipsHtml;

    // Permutation pips
    let permHtml = '';
    for (let i = 0; i < 8; i++) {
      if (i === 4) permHtml += '<span class="tt-perm-div"></span>';
      const found = (n.bits >> (PERM_BITS + i)) & 1;
      permHtml += `<span class="tt-perm ${found ? 'found' : 'empty'}"></span>`;
    }
    document.getElementById('tooltip-perms').innerHTML = permHtml;

    // Count + label
    document.getElementById('tooltip-count').textContent = `×${n.count}`;
    document.getElementById('tooltip-label').textContent = `${n.size}-cell family`;
  } else {
    hoveredNode = null;
    div.classList.remove('visible');
    div.classList.remove('rainbow-complete');
  }
});

async function pasteFromClipboard() {
  const status = document.getElementById('load-status');
  try {
    const text = await navigator.clipboard.readText();
    const data = JSON.parse(text);
    const keys = Object.keys(data);
    if (keys.length === 0) { status.innerText = 'EMPTY DATA'; return; }
    // Validate it looks like v4 collection (keys contain pipe-separated coords)
    if (!keys[0].includes(',')) { status.innerText = 'INVALID FORMAT'; return; }
    loadData(data);
  } catch (err) {
    status.innerText = 'PASTE FAILED — check clipboard permissions';
    console.log('Paste error:', err);
  }
}

init();
document.getElementById('file-input').onchange = (e) => {
  if (e.target.files.length > 0) {
    const reader = new FileReader();
    reader.onload = (ev) => loadData(JSON.parse(ev.target.result));
    reader.readAsText(e.target.files[0]);
  }
};
