<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nested Strata v3 — Forensic Multi-Scale 3D</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; color: #ccc; font-family: 'Consolas', 'SF Mono', monospace; overflow: hidden; }
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    
    #panel {
        position: fixed; top: 16px; left: 16px; z-index: 10;
        background: rgba(10, 10, 15, 0.95); border: 1px solid rgba(0, 255, 255, 0.2);
        border-radius: 8px; padding: 18px; width: 320px;
        backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(0,0,0,0.8);
        max-height: calc(100vh - 32px); overflow-y: auto;
    }

    h1 { font-size: 14px; font-weight: 700; color: #7af; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    .sub-h1 { font-size: 9px; color: #558; margin-bottom: 15px; }

    .group-label { font-size: 9px; color: #446; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }

    .ctrl { margin-bottom: 12px; }
    .ctrl label { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 4px; }
    .ctrl label span.val { color: #0ff; font-weight: bold; }
    
    input[type=range] { width: 100%; height: 4px; cursor: pointer; accent-color: #0ff; -webkit-appearance: none; appearance: none; background: #112;}
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 10px; border-radius: 50%; background: #0ff; }

    .btn-row { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
    button { flex: 1; padding: 7px; font-size: 10px; background: #0a0a1a; border: 1px solid #114; color: #558; cursor: pointer; border-radius: 4px; font-family: inherit; transition: 0.2s; }
    button:hover { border-color: #0ff; color: #0ff; }
    button.active { background: #035; color: #0ff; border-color: #0ff; box-shadow: 0 0 10px rgba(0,255,255,0.2); }

    .file-input-wrapper { margin-bottom: 15px; }
    .file-btn { width: 100%; background: #0ff; color: #000; font-weight: bold; border: none; padding: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-radius: 6px; }
    .file-btn:hover { background: #fff; }

    .stats { font-size: 10px; color: #446; border-top: 1px solid #113; padding-top: 10px; line-height: 1.5; }
    b { color: #7af; }

    #dropZone {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
        display: none; background: rgba(0,0,0,0.8); justify-content: center; align-items: center;
        border: 4px dashed #0ff; pointer-events: none;
    }
</style>
</head>
<body>

<div id="dropZone"><h1 style="color:#0ff">DROP BINARY</h1></div>

<div id="panel">
    <h1>Nested Strata</h1>
    <div class="sub-h1">Hierarchical Forensic Probe</div>

    <div class="file-input-wrapper">
        <button class="file-btn" onclick="document.getElementById('fIn').click()">Open File</button>
        <input type="file" id="fIn" style="display:none" onchange="handleFile(this.files)">
    </div>

    <div class="group-label">Data Interpretation</div>
    <div class="btn-row">
        <button id="type8" onclick="setDataType('uint8')">8-bit</button>
        <button id="type16" onclick="setDataType('uint16')">16-bit</button>
        <button id="type32" class="active" onclick="setDataType('uint32')">32-bit</button>
    </div>
    <div class="btn-row">
        <button id="leBtn" class="active" onclick="setEndian(true)">Little Endian</button>
        <button id="beBtn" onclick="setEndian(false)">Big Endian</button>
    </div>

    <div class="ctrl">
        <label>Macro Gap <span class="val" id="vG0">0.25</span></label>
        <input type="range" id="sG0" min="0" max="2" step="0.01" value="0.25">
    </div>
    <div class="ctrl">
        <label>Meso Gap <span class="val" id="vG1">0.10</span></label>
        <input type="range" id="sG1" min="0" max="2" step="0.01" value="0.10">
    </div>
    <div class="ctrl">
        <label>Micro Gap <span class="val" id="vG2">0.05</span></label>
        <input type="range" id="sG2" min="0" max="2" step="0.01" value="0.05">
    </div>

    <div class="group-label">Demos</div>
    <div class="btn-row">
        <button onclick="loadDemo('lorenz')">Lorenz</button>
        <button onclick="loadDemo('thomas')">Thomas</button>
        <button onclick="loadDemo('noise')">Random</button>
    </div>

    <div id="stats" class="stats">Awaiting data...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script>

// --- STATE ---
let state = {
    dataType: 'uint32',
    isLE: true,
    gaps: [0.25, 0.1, 0.05],
    currentBuffer: null,
    fileName: "Internal",
    ptSize: 2.5
};

const bitTable = new Uint32Array(1 << 25); // 30-bit dedup

/**
 * STRATA PIPELINE
 * Dynamically handles uint8, 16, 32 and maps them to the 3-tier strata.
 */
function processStrata(buffer) {
    const view = new DataView(buffer);
    const wordSize = state.dataType === 'uint32' ? 4 : (state.dataType === 'uint16' ? 2 : 1);
    const readMethod = state.dataType === 'uint32' ? 'getUint32' : (state.dataType === 'uint16' ? 'getUint16' : 'getUint8');
    const tupleSize = wordSize * 3;
    const tupleCount = Math.floor(buffer.byteLength / tupleSize);
    
    bitTable.fill(0);
    const p0 = new Float32Array(tupleCount * 3);
    const p1 = new Float32Array(tupleCount * 3);
    const p2 = new Float32Array(tupleCount * 3);
    const colors = new Float32Array(tupleCount * 3);
    let outCount = 0;

    for (let i = 0; i <= buffer.byteLength - tupleSize; i += tupleSize) {
        const rx = view[readMethod](i, state.isLE);
        const ry = view[readMethod](i + wordSize, state.isLE);
        const rz = view[readMethod](i + wordSize * 2, state.isLE);

        let ix0, iy0, iz0, ix1, iy1, iz1, ix2, iy2, iz2, dx, dy, dz;

        if (state.dataType === 'uint32') {
            // High 12 bits: [31-28][27-24][23-20]
            ix0 = (rx >>> 28) & 0xF; iy0 = (ry >>> 28) & 0xF; iz0 = (rz >>> 28) & 0xF;
            ix1 = (rx >>> 24) & 0xF; iy1 = (ry >>> 24) & 0xF; iz1 = (rz >>> 24) & 0xF;
            ix2 = (rx >>> 20) & 0xF; iy2 = (ry >>> 20) & 0xF; iz2 = (rz >>> 20) & 0xF;
            dx = (rx >>> 22) & 0x3FF; dy = (ry >>> 22) & 0x3FF; dz = (rz >>> 22) & 0x3FF;
        } else if (state.dataType === 'uint16') {
            // High 12 bits: [15-12][11-8][7-4]
            ix0 = (rx >>> 12) & 0xF; iy0 = (ry >>> 12) & 0xF; iz0 = (rz >>> 12) & 0xF;
            ix1 = (rx >>> 8) & 0xF;  iy1 = (ry >>> 8) & 0xF;  iz1 = (rz >>> 8) & 0xF;
            ix2 = (rx >>> 4) & 0xF;  iy2 = (ry >>> 4) & 0xF;  iz2 = (rz >>> 4) & 0xF;
            dx = (rx >>> 6) & 0x3FF; dy = (ry >>> 6) & 0x3FF; dz = (rz >>> 6) & 0x3FF;
        } else {
            // uint8: Only has 8 bits, so we fill Tier 0 and Tier 1
            ix0 = (rx >>> 4) & 0xF; iy0 = (ry >>> 4) & 0xF; iz0 = (rz >>> 4) & 0xF;
            ix1 = rx & 0xF;         iy1 = ry & 0xF;         iz1 = rz & 0xF;
            ix2 = 0; iy2 = 0; iz2 = 0;
            dx = rx; dy = ry; dz = rz; // Just use raw byte for color
        }

        const key = (dz << 20) | (dy << 10) | dx;
        if ((bitTable[key >>> 5] & (1 << (key & 0x1F))) === 0) {
            bitTable[key >>> 5] |= (1 << (key & 0x1F));
            const idx = outCount * 3;
            p0[idx] = ix0; p0[idx+1] = iy0; p0[idx+2] = iz0;
            p1[idx] = ix1; p1[idx+1] = iy1; p1[idx+2] = iz1;
            p2[idx] = ix2; p2[idx+1] = iy2; p2[idx+2] = iz2;
            
            // Color normalized by depth of type
            const div = state.dataType === 'uint8' ? 255.0 : 1023.0;
            colors[idx] = dx / div; colors[idx+1] = dy / div; colors[idx+2] = dz / div;
            outCount++;
        }
    }
    return { p0: p0.subarray(0, outCount*3), p1: p1.subarray(0, outCount*3), p2: p2.subarray(0, outCount*3), colors: colors.subarray(0, outCount*3), count: outCount };
}

// --- RENDERER ---
let scene, camera, renderer, controls, pointsMesh;

function init() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x020204);
    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(4, 4, 4);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    animate();
}

function updateView() {
    if (!state.currentBuffer) return;
    const res = processStrata(state.currentBuffer);
    if (pointsMesh) { scene.remove(pointsMesh); pointsMesh.geometry.dispose(); pointsMesh.material.dispose(); }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(res.p0, 3));
    geo.setAttribute('tier1', new THREE.BufferAttribute(res.p1, 3));
    geo.setAttribute('tier2', new THREE.BufferAttribute(res.p2, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(res.colors, 3));

    const g = state.gaps;
    const s2 = 1.0;
    const s1 = (16.0 + 15.0 * g[2]) * (1.0 + g[1]);
    const s0 = (16.0 * s1 + 15.0 * s1 * g[1]) * (1.0 + g[0]);
    const maxExtent = 15.0 * s0 + 15.0 * s1 + 15.0 * s2;

    const mat = new THREE.ShaderMaterial({
        vertexShader: `
            attribute vec3 tier1; attribute vec3 tier2; attribute vec3 color;
            uniform float uStep[3]; uniform vec3 uCenter; uniform float uScale;
            varying vec3 vCol;
            void main() {
                vCol = color;
                vec3 pos = position * uStep[0] + tier1 * uStep[1] + tier2 * uStep[2];
                vec4 mvPosition = modelViewMatrix * vec4((pos - uCenter) * uScale, 1.0);
                gl_PointSize = 3.5 * (1.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `varying vec3 vCol; void main() { if(dot(gl_PointCoord-0.5, gl_PointCoord-0.5)>0.25)discard; gl_FragColor=vec4(vCol + 0.1, 1.0); }`,
        transparent: true,
        uniforms: {
            uStep: { value: [s0, s1, s2] },
            uCenter: { value: new THREE.Vector3(maxExtent/2, maxExtent/2, maxExtent/2) },
            uScale: { value: 6.0 / maxExtent }
        }
    });

    pointsMesh = new THREE.Points(geo, mat);
    pointsMesh.frustumCulled = false;
    scene.add(pointsMesh);

    document.getElementById('stats').innerHTML = `
        Source: <b>${state.fileName}</b><br>
        Nodes: <b>${res.count.toLocaleString()}</b><br>
        Interpretation: <b>${state.dataType} (${state.isLE ? 'LE' : 'BE'})</b>
    `;
}

function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

// --- UI HANDLERS ---
function setDataType(t) {
    state.dataType = t;
    ['8','16','32'].forEach(v => document.getElementById('type'+v).classList.toggle('active', 'uint'+v===t));
    updateView();
}
function setEndian(le) {
    state.isLE = le;
    document.getElementById('leBtn').classList.toggle('active', le);
    document.getElementById('beBtn').classList.toggle('active', !le);
    updateView();
}
function handleFile(files) {
    const f = files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => { state.currentBuffer = ev.target.result; state.fileName = f.name; updateView(); };
    r.readAsArrayBuffer(f);
}
['sG0', 'sG1', 'sG2'].forEach((id, i) => {
    document.getElementById(id).oninput = e => {
        state.gaps[i] = parseFloat(e.target.value);
        document.getElementById('vG'+i).innerText = e.target.value;
        updateView();
    };
});

// --- ATTRACTOR DEMOS ---
function loadDemo(type) {
    const num = 120000;
    const buf = new ArrayBuffer(num * 12);
    const v = new DataView(buf);
    let x=0.1, y=0.1, z=0.1;
    state.fileName = "DEMO: " + type.toUpperCase();
    for (let i = 0; i < num; i++) {
        let dx, dy, dz;
        if (type === 'lorenz') {
            dx = 10 * (y - x); dy = x * (28 - z) - y; dz = x * y - (8/3) * z;
            x += dx * 0.005; y += dy * 0.005; z += dz * 0.005;
            v.setUint32(i*12, (x+25)/50 * 4294967295, true);
            v.setUint32(i*12+4, (y+30)/60 * 4294967295, true);
            v.setUint32(i*12+8, (z)/50 * 4294967295, true);
        } else if (type === 'thomas') {
            const b = 0.208;
            dx = Math.sin(y) - b*x; dy = Math.sin(z) - b*y; dz = Math.sin(x) - b*z;
            x += dx * 0.1; y += dy * 0.1; z += dz * 0.1;
            v.setUint32(i*12, (x+3)/6 * 4294967295, true);
            v.setUint32(i*12+4, (y+3)/6 * 4294967295, true);
            v.setUint32(i*12+8, (z+3)/6 * 4294967295, true);
        } else {
            v.setUint32(i*12, Math.random() * 4294967295, true);
            v.setUint32(i*12+4, Math.random() * 4294967295, true);
            v.setUint32(i*12+8, Math.random() * 4294967295, true);
        }
    }
    state.currentBuffer = buf;
    state.dataType = 'uint32';
    setDataType('uint32');
}

// Drag & Drop
const dz = document.getElementById('dropZone');
document.addEventListener('dragenter', e => { e.preventDefault(); dz.style.display='flex'; });
document.addEventListener('dragover', e => e.preventDefault());
dz.addEventListener('dragleave', e => { e.preventDefault(); dz.style.display='none'; });
document.addEventListener('drop', e => { e.preventDefault(); dz.style.display='none'; handleFile(e.dataTransfer.files); });

init();
loadDemo('lorenz');

</script>
</body>
</html>
